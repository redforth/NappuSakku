<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SF6 OVERLAY · EDITOR</title>

<!-- Favicon: bracket-strike glyph (matches the header logo) -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%2306070a'/><path d='M9 6 L4 16 L9 26' stroke='%23f0eee6' stroke-width='3' fill='none' stroke-linecap='square' stroke-linejoin='miter'/><path d='M23 6 L28 16 L23 26' stroke='%23f0eee6' stroke-width='3' fill='none' stroke-linecap='square' stroke-linejoin='miter'/><path d='M22 4 L10 28' stroke='%23e7223a' stroke-width='3' stroke-linecap='square'/></svg>">

<!-- Distinctive type pairing: Bebas Neue (display, fight-poster), JetBrains Mono (data),
     Inter Tight (body) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&family=Saira+Stencil+One&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: {
          display: ['"Bebas Neue"', 'Impact', 'sans-serif'],
          body: ['"Inter Tight"', 'system-ui', 'sans-serif'],
          mono: ['"JetBrains Mono"', 'Consolas', 'monospace'],
        },
        colors: {
          ink: { DEFAULT: '#06070a', deep: '#0a0c11', card: '#10131a', edge: '#1a1f2b' },
          line: { DEFAULT: '#1f2532', strong: '#2c3445', accent: '#3a455a' },
          paper: { DEFAULT: '#f0eee6', mute: '#9aa3b2', dim: '#5b6478' },
          // Bloodline red, lifted from the SF6 logo
          blood: { DEFAULT: '#e7223a', deep: '#9a0f1f', soft: '#ff3a52', glow: '#ff5566' },
          gold:  { DEFAULT: '#f5c518', deep: '#9a7c0a' },
          good: '#22c55e',
        },
      },
    },
  };
</script>

<style>
  :root {
    --blood: #e7223a;
    --blood-glow: #ff5566;
    /* Electric blue — used for card hover highlights & reflections.
       Bright, slightly cyan-leaning so it pops against the near-black
       background without bleeding into the red accent system. */
    --volt: #00b8ff;
    --volt-glow: #4dd0ff;
    --gold: #f5c518;
    --paper: #f0eee6;
    --ink: #06070a;
  }

  html, body { background: var(--ink); }
  body {
    color: var(--paper);
    font-family: 'Inter Tight', system-ui, sans-serif;
    /* Subtle film-grain + faint scanline atmosphere */
    background-image:
      radial-gradient(ellipse 90% 60% at 50% -10%, rgba(231,34,58,0.12), transparent 60%),
      radial-gradient(ellipse 60% 40% at 100% 100%, rgba(245,197,24,0.05), transparent 70%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px);
  }

  ::selection { background: var(--blood); color: white; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: #06070a; }
  ::-webkit-scrollbar-thumb { background: #1f2532; border-radius: 0; }
  ::-webkit-scrollbar-thumb:hover { background: var(--blood-deep, #9a0f1f); }

  /* Loading spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes sf6caretblink {
    0%   { opacity: 1; }
    50%  { opacity: 0; }
    100% { opacity: 1; }
  }
  .spin { animation: spin 0.7s linear infinite; }

  /* ── Fight-card hero divider ──────────────────────────
     Electric blue diagonal stripe with neon illumination.
     Two layered drop-shadows create the bloom: the inner one is
     tight + bright (cyan core), the outer one is wide + softer
     (azure halo). filter: drop-shadow respects the alpha of the
     stripe pattern, so the glow only emanates from the colored
     diagonals — not the transparent gaps. */
  .slash-divider {
    position: relative;
    background-image: repeating-linear-gradient(
      135deg,
      var(--volt) 0px, var(--volt) 8px,
      transparent 8px, transparent 16px
    );
    height: 6px;
    filter:
      drop-shadow(0 0 4px var(--volt-glow))
      drop-shadow(0 0 10px rgba(0, 184, 255, 0.55));
    overflow: hidden;
  }
  /* Electricity pulse layer — overlays the divider, normally idle.
     A bright cyan/white streak with soft falloff edges sweeps
     right-to-left across the entire divider when a hover event
     fires. The pulse is on a ::before pseudo-element so we don't
     have to add another DOM node; it's positioned absolutely
     within the divider container.
     `mix-blend-mode: screen` makes the streak additively brighten
     the underlying dashed pattern — the dashes flash white-cyan as
     the pulse passes over them, instead of being overpainted by a
     uniform horizontal band (which would look like a solid bar). */
  .slash-divider::before {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: linear-gradient(
      90deg,
      transparent 0%,
      transparent 30%,
      rgba(180, 240, 255, 0.0) 38%,
      rgba(180, 240, 255, 0.7) 47%,
      rgba(255, 255, 255, 1.0) 50%,    /* peak — pure white-hot */
      rgba(180, 240, 255, 0.7) 53%,
      rgba(180, 240, 255, 0.0) 62%,
      transparent 70%,
      transparent 100%
    );
    background-size: 200% 100%;
    background-position: -100% 50%;
    background-repeat: no-repeat;
    mix-blend-mode: screen;
    /* Off by default — only animates when .pulse class is applied */
    opacity: 0;
  }
  /* Trigger class added/removed by React effect on hover change.
     animation runs once and the layer fades out via the keyframes. */
  .slash-divider.pulse::before {
    animation: dividerPulse 800ms cubic-bezier(.25, .8, .25, 1) forwards;
  }
  @keyframes dividerPulse {
    0% {
      /* Streak starts off-screen on the RIGHT (positive 200% = past
         the right edge given background-size: 200%). Opacity ramps
         up quickly so the streak fades in rather than popping. */
      background-position: 200% 50%;
      opacity: 0;
    }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% {
      /* Ends off-screen LEFT — the streak has traveled the full
         viewport width during the cycle. Linear-feeling motion via
         the cubic-bezier (slight ease-out at the end). */
      background-position: -100% 50%;
      opacity: 0;
    }
  }

  /* ── Character card hover choreography ──────────────── */
  /* Card: lifts, accent bar grows, portrait flies in from right
     with parallax scale, name shifts slightly + gets underlined. */
  .char-card {
    position: relative;
    overflow: hidden;
    isolation: isolate;
    transition: transform 320ms cubic-bezier(.2,.7,.2,1),
                box-shadow 320ms cubic-bezier(.2,.7,.2,1),
                border-color 200ms;
    will-change: transform;
  }
  .char-card::before {
    /* diagonal accent sweep on hover */
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(115deg,
      transparent 40%,
      rgba(0,184,255,0.22) 50%,
      transparent 60%);
    opacity: 0;
    transform: translateX(-30%);
    transition: opacity 400ms, transform 700ms cubic-bezier(.2,.7,.2,1);
    pointer-events: none;
    z-index: 1;
  }
  .char-card:hover::before { opacity: 1; transform: translateX(0); }

  .char-card:hover {
    transform: translateY(-2px);
    box-shadow:
      0 0 0 1px var(--volt),
      0 16px 40px -16px rgba(0,184,255,0.55),
      0 4px 12px rgba(0,0,0,0.6);
  }

  /* ── Trapezoid lean (top edge shifted right of bottom edge) ───
     clip-path crops the rectangle into a right-leaning quad.
     Border + outer box-shadow get clipped off the visible region,
     so we restore the border with inset box-shadow on the base
     state and replace the hover glow with an inner accent halo. */
  .char-card {
    clip-path: polygon(14px 0, 100% 0, calc(100% - 14px) 100%, 0 100%);
    border: none;
    background-color: #10131a;
    box-shadow: inset 0 0 0 1px #1f2532;
  }
  .char-card:hover {
    box-shadow:
      inset 0 0 0 1px var(--volt),
      inset 0 0 28px -8px rgba(0,184,255,0.55);
    z-index: 5;  /* lift above neighbors so the inset border isn't clipped */
  }

  /* Staircase layout via CSS variable per row.
     The cardIn animation reads --row-offset and ends at translateX(var()),
     so the animation's final transform IS the staircase position — no
     conflict between animation and static rules. */
  .roster-grid {
    column-gap: 0.75rem !important;
    row-gap: 0.75rem;
    padding-left: 100px;
  }
  .roster-grid > .char-card { --row-offset: 0px; }

  /* lg: 5 columns (default desktop) */
  @media (min-width: 1024px) {
    .roster-grid > .char-card:nth-child(n+6):nth-child(-n+10)   { --row-offset: -14px; }
    .roster-grid > .char-card:nth-child(n+11):nth-child(-n+15)  { --row-offset: -28px; }
    .roster-grid > .char-card:nth-child(n+16):nth-child(-n+20)  { --row-offset: -42px; }
    .roster-grid > .char-card:nth-child(n+21):nth-child(-n+25)  { --row-offset: -56px; }
    .roster-grid > .char-card:nth-child(n+26):nth-child(-n+30)  { --row-offset: -70px; }
    .roster-grid > .char-card:nth-child(n+31):nth-child(-n+35)  { --row-offset: -84px; }
  }
  /* md: 4 columns */
  @media (min-width: 768px) and (max-width: 1023px) {
    .roster-grid > .char-card:nth-child(n+5):nth-child(-n+8)    { --row-offset: -14px; }
    .roster-grid > .char-card:nth-child(n+9):nth-child(-n+12)   { --row-offset: -28px; }
    .roster-grid > .char-card:nth-child(n+13):nth-child(-n+16)  { --row-offset: -42px; }
    .roster-grid > .char-card:nth-child(n+17):nth-child(-n+20)  { --row-offset: -56px; }
    .roster-grid > .char-card:nth-child(n+21):nth-child(-n+24)  { --row-offset: -70px; }
    .roster-grid > .char-card:nth-child(n+25):nth-child(-n+28)  { --row-offset: -84px; }
    .roster-grid > .char-card:nth-child(n+29):nth-child(-n+32)  { --row-offset: -98px; }
  }
  /* sm: 3 columns */
  @media (min-width: 640px) and (max-width: 767px) {
    .roster-grid > .char-card:nth-child(n+4):nth-child(-n+6)    { --row-offset: -14px; }
    .roster-grid > .char-card:nth-child(n+7):nth-child(-n+9)    { --row-offset: -28px; }
    .roster-grid > .char-card:nth-child(n+10):nth-child(-n+12)  { --row-offset: -42px; }
  }

  /* Hover: lift slightly while preserving the row offset */
  .char-card:hover {
    transform: translate(var(--row-offset), -2px) !important;
  }

  /* Hide the yellow status dot inside cards (it's still used in header
     for serverOk indicator — only scope the hide to .char-card). */
  .char-card .status-dot { display: none; }

  /* Push the character name rightward inside the tile. The card body uses
     `p-3` (12px padding); positive margin nudges the name further inward.
     +12px reads as "tucked away from the left edge". Adjust between
     +6px (subtle) and +24px (aggressive). */
  .char-card .char-name { margin-left: 12px; }

  /* Name styling on hover — italic for futuristic forward-motion feel */
  .char-name {
    position: relative;
    font-style: italic;
    transition: color 220ms, transform 320ms cubic-bezier(.2,.7,.2,1), letter-spacing 320ms;
    z-index: 2;
  }
  .char-card:hover .char-name {
    color: var(--paper);
    transform: translateX(2px);
    letter-spacing: 0.04em;
  }
  .char-name::after {
    content: '';
    position: absolute;
    left: 0; bottom: -4px;
    height: 2px;
    width: 0;
    background: var(--volt);
    transition: width 360ms cubic-bezier(.2,.7,.2,1);
  }
  .char-card:hover .char-name::after { width: 28px; }

  /* Italic for major display headings — same forward-lean motif */
  .display-italic { font-style: italic; }

  /* ── Roster focus mode ──────────────────────────────────
     When ANY card is hovered, the grid container gets data-focus="true".
     Non-hovered cards dim + desaturate; hovered card stays sharp.
     Coordinated by React (hoveredChar state) so we get a proper enter/
     exit delay and no strobe between adjacent cards.

     Note: !important here defeats the .char-card:hover transform/shadow
     rules cleanly — without it the browser merges hover + focus styles
     unpredictably mid-debounce. */
  .roster-grid[data-focus="true"] > .char-card {
    opacity: 0.18 !important;
    filter: saturate(0.4) blur(0.5px);
    transition: opacity 280ms ease-out, filter 280ms ease-out;
  }
  .roster-grid[data-focus="true"] > .char-card[data-hovered="true"] {
    opacity: 1 !important;
    filter: none;
    z-index: 6;
  }

  /* Hero band fade — when ANY character card is hovered, the title
     band drops to semi-transparent so it doesn't compete with the
     character portrait that's now flying in behind it. Whole band
     fades together (eyebrow + title + bottom border) so the layout
     stays cohesive — fading just the h1 would leave a sharp divider
     line floating below ghost text, which looks broken. */
  .hero-band {
    opacity: 1;
    transition: opacity 280ms ease-out;
  }
  .hero-band[data-focus="true"] {
    opacity: 0.25;
  }

  /* Full-screen character backdrop — fixed layer behind the grid.
     React mounts/unmounts this; CSS handles the cinematic fly-in. */
  .bg-art-stage {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 5;            /* above body bg, below header (z-30) */
    overflow: hidden;
  }
  .bg-art-stage::after {
    /* dark vignette so cards stay legible on top of the art */
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 50%, transparent 0%, rgba(6,7,10,0.55) 60%, rgba(6,7,10,0.85) 100%),
      linear-gradient(to top, rgba(6,7,10,0.95), transparent 30%);
    z-index: 2;
  }
  .bg-art-layer {
    position: absolute;
    inset: 0;
    opacity: 0;
    transform: translateX(-40px);
    transition: opacity 520ms cubic-bezier(.2,.7,.2,1), transform 900ms cubic-bezier(.2,.7,.2,1);
    z-index: 1;
  }
  .bg-art-layer.in {
    opacity: 0.55;
    transform: translateX(0);
  }
  /* When cross-fading between two characters, use a faster opacity
     transition so the swap doesn't feel sluggish during sweeps. */
  .bg-art-layer.fast {
    transition: opacity 200ms ease-out, transform 600ms cubic-bezier(.2,.7,.2,1);
  }
  .bg-art-layer img,
  .bg-art-layer svg {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 25%;
    filter: grayscale(15%) contrast(1.05) saturate(0.85);
  }

  /* Status pill text + meta on hover */
  .char-meta { transition: color 220ms; z-index: 2; position: relative; }
  .char-card:hover .char-meta { color: rgba(240,238,230,0.85); }

  /* Card index number — large translucent backdrop digit */
  .char-index {
    position: absolute;
    right: 10px; top: 6px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px;
    line-height: 1;
    color: rgba(255,255,255,0.04);
    transition: color 320ms;
    z-index: 1;
    pointer-events: none;
  }
  .char-card:hover .char-index { color: rgba(0,184,255,0.22); }

  /* Status dot */
  .status-dot {
    width: 8px; height: 8px; border-radius: 999px;
    box-shadow: 0 0 0 2px rgba(0,0,0,0.5);
  }
  .status-dot.on  { background: var(--gold); box-shadow: 0 0 8px rgba(245,197,24,0.6), 0 0 0 2px rgba(0,0,0,0.5); }
  .status-dot.off { background: #2c3445; }

  /* Tab nav animated underline */
  .tab-btn { position: relative; }
  .tab-btn::after {
    content: '';
    position: absolute;
    left: 12px; right: 12px;
    bottom: -1px;
    height: 2px;
    background: var(--blood);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 260ms cubic-bezier(.2,.7,.2,1);
  }
  .tab-btn[data-active="true"]::after { transform: scaleX(1); }

  /* Page-load fly-in: card streaks in from far left, decelerates hard,
     then locks at its row's staircase offset (var(--row-offset)). The
     0%→85% range covers the fast travel; 85%→100% is the snap/settle.
     Final transform = translateX(var(--row-offset)) so the staircase
     position is the resting state — animation and layout don't fight. */
  @keyframes cardIn {
    0%   { opacity: 0; transform: translateX(calc(var(--row-offset) - 320px)) skewX(-8deg); }
    70%  { opacity: 1; }
    85%  { transform: translateX(calc(var(--row-offset) + 6px)) skewX(0deg); }  /* tiny overshoot */
    100% { opacity: 1; transform: translateX(var(--row-offset)) skewX(0deg); }   /* lock */
  }
  .card-in {
    animation: cardIn 620ms cubic-bezier(.18, .9, .25, 1) both;
    /* Hide the contents (name etc) until the card lands, then reveal
       via the etched-name animation below. */
  }

  /* Etched-name reveal: clip-path wipe from left to right, slight blur
     unblur, mimics being engraved/etched into the card surface after
     the card has come to rest. animation-delay set per-card via the
     card's :nth-child stagger plus the cardIn duration. */
  @keyframes etchIn {
    0%   { clip-path: inset(0 100% 0 0); opacity: 0; filter: blur(2px); letter-spacing: 0.4em; }
    40%  { opacity: 1; }
    100% { clip-path: inset(0 0    0 0); opacity: 1; filter: blur(0);   letter-spacing: 0.04em; }
  }
  /* Apply only on the roster page cards (not header) */
  .char-card .char-name {
    animation: etchIn 520ms cubic-bezier(.2,.7,.2,1) both;
    /* Delay = card's flight time (620ms) + small gap. Per-card stagger
       inherits from parent's animation-delay via custom property below. */
    animation-delay: calc(var(--card-delay, 0ms) + 620ms);
  }
  /* The card sets --card-delay from inline animationDelay style.
     Since we can't read inline style into a CSS var directly, we
     duplicate the stagger logic as a per-nth-child rule. */
  .char-card:nth-child(1)  .char-name { animation-delay: calc(0ms    + 620ms); }
  .char-card:nth-child(2)  .char-name { animation-delay: calc(60ms   + 620ms); }
  .char-card:nth-child(3)  .char-name { animation-delay: calc(120ms  + 620ms); }
  .char-card:nth-child(4)  .char-name { animation-delay: calc(180ms  + 620ms); }
  .char-card:nth-child(5)  .char-name { animation-delay: calc(240ms  + 620ms); }
  .char-card:nth-child(6)  .char-name { animation-delay: calc(300ms  + 620ms); }
  .char-card:nth-child(7)  .char-name { animation-delay: calc(360ms  + 620ms); }
  .char-card:nth-child(8)  .char-name { animation-delay: calc(420ms  + 620ms); }
  .char-card:nth-child(9)  .char-name { animation-delay: calc(480ms  + 620ms); }
  .char-card:nth-child(10) .char-name { animation-delay: calc(540ms  + 620ms); }
  .char-card:nth-child(11) .char-name { animation-delay: calc(600ms  + 620ms); }
  .char-card:nth-child(12) .char-name { animation-delay: calc(660ms  + 620ms); }
  .char-card:nth-child(13) .char-name { animation-delay: calc(720ms  + 620ms); }
  .char-card:nth-child(14) .char-name { animation-delay: calc(780ms  + 620ms); }
  .char-card:nth-child(15) .char-name { animation-delay: calc(840ms  + 620ms); }
  .char-card:nth-child(16) .char-name { animation-delay: calc(900ms  + 620ms); }
  .char-card:nth-child(17) .char-name { animation-delay: calc(960ms  + 620ms); }
  .char-card:nth-child(18) .char-name { animation-delay: calc(1020ms + 620ms); }
  .char-card:nth-child(19) .char-name { animation-delay: calc(1080ms + 620ms); }
  .char-card:nth-child(20) .char-name { animation-delay: calc(1140ms + 620ms); }
  .char-card:nth-child(21) .char-name { animation-delay: calc(1200ms + 620ms); }
  .char-card:nth-child(22) .char-name { animation-delay: calc(1260ms + 620ms); }
  .char-card:nth-child(23) .char-name { animation-delay: calc(1320ms + 620ms); }
  .char-card:nth-child(24) .char-name { animation-delay: calc(1380ms + 620ms); }
  .char-card:nth-child(25) .char-name { animation-delay: calc(1440ms + 620ms); }
  .char-card:nth-child(26) .char-name { animation-delay: calc(1500ms + 620ms); }
  .char-card:nth-child(27) .char-name { animation-delay: calc(1560ms + 620ms); }
  .char-card:nth-child(28) .char-name { animation-delay: calc(1620ms + 620ms); }
  .char-card:nth-child(29) .char-name { animation-delay: calc(1680ms + 620ms); }

  /* Card exit: slide left + fade. Diagonal stagger driven by inline
     animation-delay so top-left leaves first, bottom-right last. */
  @keyframes cardOut {
    0%   { opacity: 1; transform: translateX(0)     scale(1)    rotate(0); filter: blur(0); }
    60%  { opacity: 0.4; }
    100% { opacity: 0; transform: translateX(-160px) scale(0.92) rotate(-2deg); filter: blur(2px); }
  }
  .card-out { animation: cardOut 420ms cubic-bezier(.5,0,.7,.2) both; }

  /* Folder-open expand: the PICKED card morphs from its grid rect
     into a fullscreen rectangle, mimicking a folder being opened.
     Drives off three CSS custom properties (--fx-tx, --fy-ty,
     --fx-sx, --fx-sy) set inline at click time from
     getBoundingClientRect(). Scale is computed in JS:
       sx = viewportW / cardW, sy = viewportH / cardH
     The transform-origin is locked to the card's own top-left so the
     scale grows OUT from the card's position, not from the viewport
     center. Brief lift + rotate at the midpoint sells the "lid
     opening" feel before the surface flattens to fill the screen. */
  @keyframes folderExpand {
    /* Two keyframes only — start and end. Browser interpolates
       translate, scale, and rotation in one continuous curve with
       no intermediate waypoints to create speed discontinuities.
       Any "speed bump" in this animation has historically been
       caused by an intermediate keyframe that wasn't perfectly
       proportional to the final state. Keeping it to 2 keyframes
       guarantees a single, smooth motion. */
    0% {
      opacity: 1;
      transform: translate(0, 0) scale(1) rotateZ(0);
      filter: brightness(1) blur(0);
    }
    100% {
      opacity: 0.85;
      transform: translate(var(--fx-tx, 0px), var(--fx-ty, 0px))
                 scale(var(--fx-sx, 1), var(--fx-sy, 1))
                 rotateZ(180deg);
      filter: brightness(0.55) blur(3px);
    }
  }
  .card-expand {
    /* Override the standard card-out path entirely for the picked
       card. Position promoted so it can fly across the layout
       without affecting siblings, and z-index lifted so it sits
       above other exiting cards.
       transform-origin is the CARD'S CENTER (50% 50%) so both scale
       and rotation pivot around the middle of the card. The JS-
       computed --fx-tx/--fx-ty values move the card's center to
       the viewport's center, so the final state is fullscreen and
       centered.
       Curve: ease-out (no slow-start, smooth deceleration). */
    position: fixed !important;
    z-index: 50;
    pointer-events: none;
    animation: folderExpand 900ms cubic-bezier(.25, .1, .25, 1) both;
    transform-origin: 50% 50%;
    will-change: transform, opacity, filter;
  }

  /* Folder backdrop wash — a full-viewport dim that fades up under
     the expanding card so the busy roster grid doesn't show through
     the gaps. Mounted only during the 'exiting' phase. */
  @keyframes folderBackdrop {
    0%   { opacity: 0; }
    40%  { opacity: 0.75; }
    100% { opacity: 1; }
  }
  .folder-backdrop {
    position: fixed; inset: 0; z-index: 40; pointer-events: none;
    background: radial-gradient(circle at center, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.92) 80%);
    animation: folderBackdrop 520ms ease-out both;
    animation-delay: 100ms;
  }

  /* Detail-page enter choreography. Each chunk gets a class +
     inline animation-delay for sequencing. */
  @keyframes chunkUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes chunkRight {
    from { opacity: 0; transform: translateX(-24px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes chunkScale {
    from { opacity: 0; transform: scale(0.96); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes barWipe {
    from { transform: scaleX(0); }
    to   { transform: scaleX(1); }
  }

  /* Portrait glide-in: fast initial impulse, then a long slow drift to rest.
     The cubic-bezier is an "expo-out" curve — ~75% of the motion completes
     in the first ~25% of the duration, leaving a perceptible trailing settle.
     Combined with a longer duration (1400ms) and a compound transform
     (mask wipe + horizontal drift + subtle scale relax) so the eye has
     multiple things still in motion during the slow tail. */
  @keyframes portraitGlide {
    0%   { transform: translateX(-48px) scaleX(0)    scale(1.04); opacity: 0; }
    25%  { opacity: 1; }
    100% { transform: translateX(0)     scaleX(1)    scale(1);    opacity: 1; }
  }
  /* Perpetual portrait motion — two compounded behaviors:
     1. Horizontal slide: travels right-to-left across a wide range, then
        snaps back invisibly. Combined with the mask, the snap is hidden
        and the eye reads continuous one-direction drift.
     2. Persistent zoom-out: starts zoomed in heavily (1.40), slowly
        relaxes toward 1.05 over the cycle, then snaps back to 1.40.
        Always shrinking — never reverses direction.
     Different cycle lengths (8s slide / 11s zoom) prevent visual sync.
     8s is short enough that you'll see motion within a couple seconds. */
  @keyframes portraitSlide {
    0%   { transform: translateX(-80px); }
    100% { transform: translateX(0); }
  }
  @keyframes portraitZoomOut {
    0%   { transform: scale(1.40); }
    100% { transform: scale(1.05); }
  }
  /* Compose both on the img. The browser composites multiple animations
     by adding their transforms together — but only when applied to
     different keyframe properties via separate transforms is safe.
     Here we use a wrapper-on-wrapper trick via a single class that
     animates both at once with a calc-style additive approach. */
  @keyframes portraitKenBurns {
    0%   { transform: scale(1.40) translateX(-80px); }
    100% { transform: scale(1.05) translateX(0); }
  }

  .anim-up    { animation: chunkUp    520ms cubic-bezier(.2,.7,.2,1) both; }
  .anim-right { animation: chunkRight 520ms cubic-bezier(.2,.7,.2,1) both; }
  .anim-scale { animation: chunkScale 460ms cubic-bezier(.2,.7,.2,1) both; }
  .anim-wipe  { animation: barWipe    600ms cubic-bezier(.2,.7,.2,1) both; transform-origin: left; }
  .anim-portrait-glide {
    animation: portraitGlide 1400ms cubic-bezier(.05,.7,.1,1) both;
    transform-origin: left center;
  }
  .anim-portrait-kenburns {
    animation: portraitKenBurns 8s linear infinite;
    transform-origin: center center;
    will-change: transform;
  }
  /* Roster page hover backdrop — compound horizontal drift + zoom-out.
     Both axes animate on the SAME timeline with the SAME easing curve,
     so they front-load together and trail off together — no axis lags
     behind, no perceptual "pause" between zoom settling and drift starting.
     Single-axis monotonic motion in both X and scale: no direction
     reversals = no bounce. The radial vignette and edge mask hide the
     snap-back when the cycle restarts at 27s.

     All scale is on the img (the layer's .in state is now translate-only).
     Img starts at scale(1.15) so the entry feels zoomed-in, then drifts
     to scale(1.0) — its natural fill state — over the full cycle.
     The cubic-bezier is front-loaded: ~55% of motion in the first ~15%
     of time, so by the time the 900ms layer fly-in completes, both the
     drift AND the zoom-out are already perceptibly underway. */
  @keyframes bgKenBurns {
    0%   { transform: scale(1.15) translateX(0); }
    100% { transform: scale(1.00) translateX(80px); }
  }
  .anim-bg-kenburns {
    animation: bgKenBurns 27s cubic-bezier(.15,.55,.4,1) infinite;
    transform-origin: center center;
    will-change: transform;
  }

  /* ── Hero title cinematic intro ─────────────────────────
     Two effects fire on first paint:
       1. WIPE REVEAL (1100ms): clip-path animates from fully clipped
          on the right to fully revealed. A red blade rides along the
          wipe edge for a fight-card "censor bar pulled away" feel.
       2. RGB-SPLIT GLITCH STUTTER (kicks in around 70% of the wipe,
          finishes ~200ms after wipe completes): two pseudo-element
          ghost copies of the text in cyan/red shift ±3px and flicker
          opacity in a stutter pattern. Reads as a brief CRT glitch.
     The pseudo-element copies need the text in a data-text attribute
     so they can be drawn via content: attr(data-text). They sit
     pointer-events:none and aria-hidden via being decorative.
     The clip-path on the wrapping span clips ALL three layers
     (real text + both ghosts) in lockstep — the glitch only becomes
     visible inside the already-revealed area. */
  .hero-title-wrap {
    position: relative;
    display: inline-block;
    /* clip-path inset(top right bottom left) — start fully clipped on
       the right, then animate right inset down to 0. Tiny vertical
       padding (-0.1em) prevents font descender clipping. */
    clip-path: inset(-0.1em 100% -0.1em 0);
    animation: heroWipe 2000ms cubic-bezier(.2,.7,.1,1) 200ms forwards;
  }
  @keyframes heroWipe {
    0%   { clip-path: inset(-0.1em 100% -0.1em 0); }
    100% { clip-path: inset(-0.1em 0     -0.1em 0); }
  }
  /* Red blade riding the wipe edge. Positioned via the same animation
     timing — slides across with the reveal then fades out. */
  .hero-title-wrap::before {
    content: '';
    position: absolute;
    top: -0.05em; bottom: -0.05em;
    width: 8px;
    background: var(--blood);
    box-shadow: 0 0 18px 2px rgba(231,34,58,0.7);
    left: 0;
    transform: translateX(0);
    opacity: 0;
    animation: heroBlade 2000ms cubic-bezier(.2,.7,.1,1) 200ms forwards;
    pointer-events: none;
    z-index: 2;
  }
  @keyframes heroBlade {
    0%   { left: 0;     opacity: 0; }
    8%   { opacity: 1; }
    /* The blade sits at the right edge of the revealed area
       throughout the wipe. CSS calc inside left: doesn't animate
       reliably across browsers, so we use right offset positioning
       via a single moving anchor instead. */
    100% { left: 100%; opacity: 0; }
  }
  /* ── Hero title resting treatment ──────────────────────
     Brushed metal look with environmental reflection tints picked up
     from the page's atmosphere:
       - Top edge catches a subtle cool cyan reflection from the neon
         divider directly above the title
       - Highlight band sits ~25% from the top — the brightest specular
         line, mimicking how brushed steel catches overhead light
       - Mid-tone is a neutral pewter
       - Bottom edge picks up a warm gold/orange tint from the ember
         field drifting around the page

     ANIMATION: two layered backgrounds on the same element.
       1. BASE LAYER (bottom): static vertical metallic gradient. Does
          not move — preserves the metal "banding" structure that sells
          the surface as polished steel.
       2. SHIMMER LAYER (top): a thin diagonal bright streak that sweeps
          across the title horizontally, mimicking light raking across
          brushed steel. background-position animates from -150% to
          150% over a slow cycle. background-blend-mode: overlay
          composites the streak on top of the metallic base, only
          brightening (not replacing) the underlying gradient. */
  .hero-title-text {
    /* Override the inherited Bebas Neue from .font-display on the
       parent <h1>. Saira Stencil One is the NOBULL-style industrial
       cut-letter face used only here; the rest of the UI keeps
       Bebas Neue as the global display font. Note: Saira Stencil
       One ships in a single weight only. */
    font-family: 'Saira Stencil One', 'Bebas Neue', Impact, sans-serif;
    font-weight: 400;
    background-image:
      /* Top layer: deep red specular shimmer streak (animated).
         Saturated bloodline-red peaks against the blue base create
         a strong color shift — when the streak passes, that section
         flashes deep red. The streak alpha is high (1.0) at peak
         with broad falloff for a more dramatic transition. */
      linear-gradient(
        100deg,
        transparent 28%,
        rgba(154, 15, 31, 0.0) 36%,        /* var(--blood-deep) at 0 alpha */
        rgba(231, 34, 58, 0.7) 44%,         /* var(--blood) ramp-in */
        rgba(255, 60, 80, 1.0) 50%,         /* peak: bright saturated red */
        rgba(231, 34, 58, 0.7) 56%,         /* var(--blood) ramp-out */
        rgba(154, 15, 31, 0.0) 64%,        /* var(--blood-deep) at 0 alpha */
        transparent 72%
      ),
      /* Base layer: electric blue with depth banding. Vertical
         gradient that gives a "polished blue chrome" feel:
         pale top edge (sky reflection), bright cyan body, deeper
         blue mid-shadow, dark navy at the bottom for weight. */
      linear-gradient(
        180deg,
        #b8e8ff 0%,             /* pale cyan highlight at top */
        #4dd0ff 18%,             /* electric blue (var --volt-glow) */
        #00b8ff 38%,             /* core electric blue (var --volt) */
        #0088cc 60%,             /* deeper saturated blue */
        #004f7a 82%,             /* dark blue mid-shadow */
        #002030 100%             /* near-black navy at bottom */
      );
    background-size:
      300% 100%,
      100% 100%;
    background-position:
      -150% 50%,
      0 0;
    background-repeat: no-repeat, no-repeat;
    /* normal blend mode for the streak — paints the saturated red
       directly over the blue base instead of additively brightening
       toward magenta (which the previous screen blend produced).
       Result: the streak reads as a clear, deep red wash passing
       across the blue, with a brief crimson moment where the streak
       peaks. */
    background-blend-mode: normal, normal;
    -webkit-background-clip: text;
            background-clip: text;
    -webkit-text-fill-color: transparent;
            color: transparent;
    /* Soft outer drop-shadow for legibility, plus a subtle blue
       halo glow that picks up the title color into the surrounding
       atmosphere. */
    text-shadow:
      0 4px 14px rgba(0, 0, 0, 0.55),
      0 0 24px rgba(0, 184, 255, 0.25);
    /* Animation set in the merged rule further down. */
  }
  @keyframes heroMetalSweep {
    /* Animate background-position of the FIRST background layer
       (the sweep streak). The metallic base stays at 0,0.
       Two-value list = one position per layer.
       Streak travels from -150% (off left) to 150% (off right) so
       the visible streak passes across once per cycle. */
    0%   { background-position: -150% 50%, 0 0; }
    100% { background-position:  150% 50%, 0 0; }
  }
  /* hero-title-treatment is a marker class on the <h1> for any future
     enhancements at that level. Currently unused. */
  .hero-title-treatment { /* intentionally empty */ }
  /* Reduced-motion: pause the sweep, keep static metallic look */
  @media (prefers-reduced-motion: reduce) {
    .hero-title-text { animation: none !important; }
  }
  /* Reduced-motion: stop the shimmer */
  @media (prefers-reduced-motion: reduce) {
    .hero-title-text { animation: none !important; }
  }
  .hero-title-text {
    position: relative;
    display: inline-block;
    /* Two simultaneous animations:
         1. heroMetalSweep (perpetual, 6s linear) — slides the specular
            highlight streak across the metallic gradient. The metal
            base layer doesn't move; only the sweep streak's
            background-position animates.
         2. heroGlitchSlice (one-shot, 2650ms) — fires once during the
            wipe reveal, animates clip-path/transform/filter for the
            datamosh slice glitch effect, then settles to the static
            "no slice" final keyframe via forwards.
       The two animations never touch the same CSS properties, so they
       compose cleanly when run in parallel. */
    animation:
      heroMetalSweep 6s linear infinite,
      heroGlitchSlice 2650ms steps(1, end) 300ms forwards;
  }
  .hero-title-text::before,
  .hero-title-text::after {
    content: attr(data-text);
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    /* Inherit display font properties so ghosts match exactly */
    font: inherit;
    letter-spacing: inherit;
    text-transform: inherit;
    /* Reset the holographic background-clip treatment from the parent
       <h1>. Without these resets, the cyan/red ghost colors below
       would be invisible because background-clip: text + transparent
       fill-color would propagate, leaving the ghost text empty. */
    background: none;
    -webkit-background-clip: border-box;
            background-clip:  border-box;
    -webkit-text-fill-color: currentColor;
            text-fill-color:  currentColor;
    /* Skew matches the .display-italic styling from the parent */
  }
  .hero-title-text::before {
    color: #00e5ff;             /* cyan ghost */
    transform: translate(-3px, 0);
    mix-blend-mode: screen;
    text-shadow: 0 0 6px rgba(0, 229, 255, 0.5);
    animation: heroGlitchCyan 2650ms steps(28, end) 300ms forwards;
  }
  .hero-title-text::after {
    color: #ff2a4d;             /* red/magenta ghost */
    transform: translate(3px, 0);
    mix-blend-mode: screen;
    text-shadow: 0 0 6px rgba(255, 42, 77, 0.5);
    animation: heroGlitchRed 2650ms steps(28, end) 300ms forwards;
  }
  /* Stutter: opacity flickers via discrete steps, with brief offset
     bursts to reinforce the CRT-glitch read. Both channels share the
     same timeline but with slightly different offsets so the colors
     desync — that's what creates the "RGB split" perception.
     Cranked: larger offsets (up to ±14px), more flicker events,
     occasional skew jolts for that "torn signal" look. */
  @keyframes heroGlitchCyan {
    0%   { opacity: 0;   transform: translate(-3px,  0)   skewX(0); }
    6%   { opacity: 1;   transform: translate(-12px,-2px) skewX(-4deg); }
    11%  { opacity: 0;   transform: translate(-3px,  0)   skewX(0); }
    17%  { opacity: 0.95;transform: translate(-8px,  3px) skewX(2deg); }
    22%  { opacity: 0.4; transform: translate(-14px,-1px) skewX(-2deg); }
    28%  { opacity: 0;   transform: translate(-3px,  0)   skewX(0); }
    34%  { opacity: 1;   transform: translate(-10px, 2px) skewX(3deg); }
    40%  { opacity: 0;   transform: translate(-3px,  0)   skewX(0); }
    47%  { opacity: 0.85;transform: translate(-6px, -3px) skewX(-3deg); }
    53%  { opacity: 0.3; transform: translate(-12px, 1px) skewX(0); }
    60%  { opacity: 0;   transform: translate(-3px,  0)   skewX(0); }
    68%  { opacity: 0.7; transform: translate(-9px,  0)   skewX(2deg); }
    75%  { opacity: 0;   transform: translate(-3px,  0)   skewX(0); }
    100% { opacity: 0;   transform: translate(-3px,  0)   skewX(0); }
  }
  @keyframes heroGlitchRed {
    0%   { opacity: 0;   transform: translate(3px,   0)   skewX(0); }
    8%   { opacity: 0.4; transform: translate(8px,   2px) skewX(2deg); }
    13%  { opacity: 1;   transform: translate(14px,  1px) skewX(-3deg); }
    19%  { opacity: 0;   transform: translate(3px,   0)   skewX(0); }
    25%  { opacity: 0.95;transform: translate(10px, -3px) skewX(4deg); }
    31%  { opacity: 0.5; transform: translate(6px,   2px) skewX(0); }
    37%  { opacity: 0;   transform: translate(3px,   0)   skewX(0); }
    44%  { opacity: 1;   transform: translate(12px, -1px) skewX(-2deg); }
    51%  { opacity: 0;   transform: translate(3px,   0)   skewX(0); }
    58%  { opacity: 0.8; transform: translate(8px,   3px) skewX(3deg); }
    66%  { opacity: 0.3; transform: translate(14px,  0)   skewX(0); }
    72%  { opacity: 0;   transform: translate(3px,   0)   skewX(0); }
    100% { opacity: 0;   transform: translate(3px,   0)   skewX(0); }
  }
  /* Datamosh: slice the real text into horizontal bands and offset
     them sideways briefly. clip-path with polygon defines the visible
     band; transform shifts only the visible band horizontally.
     steps(1, end) gives instantaneous jumps between states — no smooth
     interpolation — for that "broken signal" digital tear. */
  @keyframes heroGlitchSlice {
    0%, 100% {
      clip-path: none;
      transform: translateX(0);
      filter: none;
    }
    7% {
      clip-path: polygon(0 18%, 100% 18%, 100% 32%, 0 32%);
      transform: translateX(8px);
      filter: brightness(1.2);
    }
    9% { clip-path: none; transform: translateX(0); filter: none; }
    18% {
      clip-path: polygon(0 55%, 100% 55%, 100% 65%, 0 65%);
      transform: translateX(-12px);
      filter: brightness(1.4) contrast(1.2);
    }
    20% { clip-path: none; transform: translateX(0); filter: none; }
    32% {
      clip-path: polygon(0 5%, 100% 5%, 100% 22%, 0 22%);
      transform: translateX(14px);
      filter: brightness(0.7) contrast(1.5);
    }
    34% { clip-path: none; transform: translateX(0); filter: none; }
    45% {
      clip-path: polygon(0 70%, 100% 70%, 100% 88%, 0 88%);
      transform: translateX(-9px);
      filter: brightness(1.3);
    }
    48% { clip-path: none; transform: translateX(0); filter: none; }
    58% {
      clip-path: polygon(0 35%, 100% 35%, 100% 50%, 0 50%);
      transform: translateX(11px);
      filter: brightness(1.5) saturate(0.5);
    }
    60% { clip-path: none; transform: translateX(0); filter: none; }
    70% {
      clip-path: polygon(0 80%, 100% 80%, 100% 100%, 0 100%);
      transform: translateX(-6px);
      filter: brightness(1.2);
    }
    72% { clip-path: none; transform: translateX(0); filter: none; }
  }

  /* Respect reduced-motion preference */
  @media (prefers-reduced-motion: reduce) {
    .card-out, .anim-up, .anim-right, .anim-scale, .anim-wipe,
    .anim-portrait-glide, .anim-portrait-kenburns, .anim-bg-kenburns,
    .hero-title-wrap, .hero-title-wrap::before,
    .hero-title-text, .hero-title-text::before, .hero-title-text::after,
    .card-in, .card-expand, .folder-backdrop {
      animation: none !important;
    }
    /* card-expand reverts to a simple fade so the picked card still
       looks "different" but doesn't lurch across the screen. */
    .card-expand { opacity: 0.6; }
    .hero-title-wrap { clip-path: none !important; }
    .hero-title-text { clip-path: none !important; transform: none !important; filter: none !important; }
  }

  /* Buttons that look like fight-card buttons */
  .fc-btn {
    font-family: 'Inter Tight', sans-serif;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-size: 11px;
    transition: transform 140ms, background 200ms, color 200ms, border-color 200ms, box-shadow 200ms;
  }
  .fc-btn:active { transform: translateY(1px); }

  /* Diagonal corner notch for "primary action" buttons */
  .clip-notch {
    clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
  }

  /* Subtle skew on hover for primary action buttons */
  .fc-primary:hover { box-shadow: 0 0 0 1px var(--blood), 0 6px 20px -6px rgba(231,34,58,0.55); }

  /* Card name row — right padding so the big 01–29 digit doesn't
     overlap. Hand-rolled instead of Tailwind's pr-14 because the
     CDN compiler occasionally misses classes that only appear
     inside React.createElement strings. */
  .char-name-row {
    padding-right: 56px;
    min-width: 0;
  }
  .char-name-row .char-name { min-width: 0; }

  /* Card focus + picked-during-exit highlight — electric blue,
     hand-rolled because Tailwind's focus:border-blood doesn't apply
     to the volt token without extending its config, and the CDN
     compiler is unreliable about picking up arbitrary classes. */
  .char-card:focus-visible { outline: none; border-color: var(--volt); }
  .char-card.is-picked { border-color: var(--volt); }

  /* Roster header big text */
  .hero-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 110px;
    line-height: 0.85;
    color: transparent;
    -webkit-text-stroke: 1px rgba(231,34,58,0.45);
  }

  /* ════════════════════════════════════════════════════════
     CHARACTER PAGE — cyberpunk treatment
     Layered backdrop: animated red grid + faint character art +
     vignette gradient. Buttons get stacked-shadow 3D bevels with
     real press states. Inputs get inset shadows + bracket corners.
     ════════════════════════════════════════════════════════ */

  /* ── Backdrop layers (z-stack: grid → art → vignette → ui) */
  .cp-page { position: relative; }
  .cp-grid-bg {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(231,34,58,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(231,34,58,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridDrift 20s linear infinite;
    pointer-events: none; z-index: 0;
  }
  @keyframes gridDrift {
    from { background-position: 0 0, 0 0; }
    to   { background-position: 40px 40px, 40px 40px; }
  }
    .cp-art-bg {
    position: fixed; inset: 0;
    background-repeat: no-repeat;
    /* Anchored to the left, vertically centered. With the smaller
       100% zoom, the old -200px x-offset would leave a visible gap;
       0 keeps the image flush. */
    background-position: left center;
    /* 100% of viewport height = ~50% zoom-out vs the old 200% value.
       More of the source art is now visible at once instead of
       cropping to the center band. Tune this number to taste:
       lower = wider/smaller image; higher = closer/cropped. */
    background-size: auto 120%;
    opacity: 0.45;
    filter: saturate(0.95) contrast(1.05);
    pointer-events: none; z-index: 1;
    /* Fade the left edge of the image so it dissolves into the
       backdrop rather than ending in a hard rectangle. The right
       side stays at full opacity. */
    -webkit-mask-image: linear-gradient(to left, black 0%, black 60%, transparent 100%);
    mask-image: linear-gradient(to left, black 0%, black 60%, transparent 100%);
    transition: opacity 600ms ease-out, background-image 0ms;
  }
  .cp-vignette {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(231,34,58,0.15), transparent 60%),
      radial-gradient(ellipse 60% 40% at 100% 100%, rgba(231,34,58,0.08), transparent 70%),
      /* Stronger left-side darken to anchor UI legibility; right side
         left mostly clear so the character art reads cleanly. */
      linear-gradient(to right, rgba(6,7,10,0.88) 0%, rgba(6,7,10,0.4) 40%, transparent 70%);
    pointer-events: none; z-index: 2;
  }
  /* Lift the actual content above all backdrop layers */
  .cp-page > main { position: relative; z-index: 3; }

  /* ── Section labels with red strike ───────────────── */
  .cp-label {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.2em; color: #9aa3b2; text-transform: uppercase;
    margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
  }
  .cp-label::before {
    content: ''; width: 14px; height: 1px; background: var(--blood);
    display: inline-block;
  }

  /* ── Inputs/textareas — inset shadow + bracket corners */
  .cp-input-wrap { position: relative; }
  .cp-input-wrap > input,
  .cp-input-wrap > textarea {
    width: 100%; background: #0a0c11;
    border: 1px solid #1f2532; padding: 12px 16px;
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    color: #f0eee6; outline: none;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
    transition: border-color 150ms, box-shadow 150ms;
  }
  .cp-input-wrap > input:focus,
  .cp-input-wrap > textarea:focus {
    border-color: var(--blood);
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.5),
                0 0 0 1px var(--blood),
                0 0 16px rgba(231,34,58,0.2);
  }
  .cp-input-wrap::before,
  .cp-input-wrap::after,
  .cp-input-wrap > .cp-bk-bl,
  .cp-input-wrap > .cp-bk-br {
    content: ''; position: absolute; width: 8px; height: 8px;
    pointer-events: none; opacity: 0; transition: opacity 200ms;
  }
  .cp-input-wrap::before {
    top: -1px; left: -1px;
    border-top: 2px solid var(--blood); border-left: 2px solid var(--blood);
  }
  .cp-input-wrap::after {
    top: -1px; right: -1px;
    border-top: 2px solid var(--blood); border-right: 2px solid var(--blood);
  }
  .cp-input-wrap > .cp-bk-bl {
    bottom: -1px; left: -1px;
    border-bottom: 2px solid var(--blood); border-left: 2px solid var(--blood);
  }
  .cp-input-wrap > .cp-bk-br {
    bottom: -1px; right: -1px;
    border-bottom: 2px solid var(--blood); border-right: 2px solid var(--blood);
  }
  .cp-input-wrap:focus-within::before,
  .cp-input-wrap:focus-within::after,
  .cp-input-wrap:focus-within > .cp-bk-bl,
  .cp-input-wrap:focus-within > .cp-bk-br { opacity: 1; }

  /* ── Sequence box ─────────────────────────────────── */
  .cp-seq {
    background: #0a0c11; border: 1px solid #1f2532;
    padding: 14px 16px; min-height: 64px;
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
  }

  /* ════════════════════════════════════════════════════════
     3D BUTTON SYSTEM — stacked shadows, hover lift, press sink
     ════════════════════════════════════════════════════════ */
  .cp-btn3d {
    cursor: pointer;
    transition: transform 90ms ease-out, filter 90ms ease-out,
                box-shadow 90ms ease-out, border-color 150ms;
    font-family: 'JetBrains Mono', monospace; font-weight: 700;
    border-radius: 0; position: relative;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.18),
      inset 0 -2px 0 rgba(0,0,0,0.4),
      0 1px 0 rgba(0,0,0,0.7),
      0 2px 0 rgba(0,0,0,0.55),
      0 3px 0 rgba(0,0,0,0.4),
      0 6px 8px rgba(0,0,0,0.5);
  }
  .cp-btn3d:hover {
    filter: brightness(1.18);
    transform: translateY(-1px);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.22),
      inset 0 -2px 0 rgba(0,0,0,0.4),
      0 1px 0 rgba(0,0,0,0.7),
      0 2px 0 rgba(0,0,0,0.55),
      0 3px 0 rgba(0,0,0,0.4),
      0 4px 0 rgba(0,0,0,0.3),
      0 8px 14px rgba(0,0,0,0.6);
  }
  .cp-btn3d:active {
    transform: translateY(3px);
    box-shadow:
      inset 0 2px 4px rgba(0,0,0,0.5),
      inset 0 -1px 0 rgba(255,255,255,0.05);
    filter: brightness(0.92);
  }
  .cp-btn3d:disabled {
    cursor: default; opacity: 0.45;
    transform: none !important; filter: none !important;
  }

  .cp-btn-numpad {
    width: 46px; height: 46px;
    background: linear-gradient(180deg, #242b3c 0%, #161a26 50%, #0a0d14 100%);
    border: 1px solid #2c3445; color: #f0eee6; font-size: 14px;
  }
  .cp-btn-numpad:hover { border-color: var(--blood); color: #ff3a52; }
  .cp-btn-motion {
    width: 66px; height: 46px;
    background: linear-gradient(180deg, #242b3c 0%, #161a26 50%, #0a0d14 100%);
    border: 1px solid #2c3445; color: #f0eee6; font-size: 11px;
  }
  .cp-btn-motion:hover { border-color: var(--blood); color: #ff3a52; }

  /* Round attack buttons — Sanwa OBSF-30 style.
     Two-layer composition: outer bezel (the black plunger housing, on
     the button itself) + inner colored dome (a child span). The dome
     depresses on click while the bezel stays put — same physical
     motion as a real arcade button. The signature curved highlight
     on the dome's upper-half is the ::before pseudo-element on the
     dome span; the soft bottom reflection is its ::after.
     NOTE: attack buttons intentionally do NOT use .cp-btn3d — that
     class's inset bevels would fight the Sanwa look. */
  .cp-btn-attack {
    width: 50px; height: 50px;
    border-radius: 50%;
    border: none; padding: 0;
    background: transparent;
    cursor: pointer;
    position: relative;
    transition: transform 80ms ease-out;
    color: white; font-size: 11px; font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
  }
  /* Outer bezel — black plunger housing with subtle top-edge bevel */
  .cp-btn-attack::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 35%, #2a2e38 0%, #0a0c11 75%, #000 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.18),
      inset 0 -2px 2px rgba(0,0,0,0.6),
      0 2px 0 rgba(0,0,0,0.6),
      0 4px 8px rgba(0,0,0,0.55);
    transition: box-shadow 80ms ease-out;
  }
  /* Colored dome — child span. Inset 5px so the bezel is visible. */
  .cp-btn-attack-dome {
    position: absolute; inset: 5px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: white;
    text-shadow: 0 -1px 0 rgba(0,0,0,0.5), 0 1px 1px rgba(0,0,0,0.3);
    overflow: hidden;
    box-shadow:
      inset 0 -4px 6px rgba(0,0,0,0.45),
      inset 0 0 0 1px rgba(0,0,0,0.4),
      0 1px 1px rgba(0,0,0,0.6);
    transition: transform 70ms ease-out, box-shadow 70ms ease-out, filter 70ms ease-out;
  }
  /* The signature curved highlight — the moon-shaped reflection
     on the dome's upper half. This is the visual giveaway of a
     Sanwa button. */
  .cp-btn-attack-dome::before {
    content: '';
    position: absolute;
    top: 8%; left: 12%;
    width: 76%; height: 60%;
    border-radius: 50%;
    background: radial-gradient(ellipse at 50% 0%,
      rgba(255,255,255,0.85) 0%,
      rgba(255,255,255,0.5) 25%,
      rgba(255,255,255,0.15) 55%,
      rgba(255,255,255,0) 80%);
    pointer-events: none;
  }
  /* Soft counter-reflection at the bottom — ambient light bouncing
     up off the panel back onto the dome. */
  .cp-btn-attack-dome::after {
    content: '';
    position: absolute;
    bottom: 8%; left: 20%;
    width: 60%; height: 30%;
    border-radius: 50%;
    background: radial-gradient(ellipse at 50% 100%,
      rgba(255,255,255,0.18) 0%,
      rgba(255,255,255,0) 70%);
    pointer-events: none;
  }
  /* Label text — sits above all the gloss layers */
  .cp-btn-attack-label {
    position: relative;
    z-index: 2;
  }
  .cp-btn-attack:hover .cp-btn-attack-dome {
    filter: brightness(1.12);
    transform: translateY(-1px);
  }
  .cp-btn-attack:active .cp-btn-attack-dome {
    transform: translateY(2px);
    box-shadow:
      inset 0 4px 6px rgba(0,0,0,0.55),
      inset 0 0 0 1px rgba(0,0,0,0.5),
      0 0 0 rgba(0,0,0,0);
    filter: brightness(0.88);
  }
  .cp-btn-attack:active::before {
    box-shadow:
      inset 0 2px 3px rgba(0,0,0,0.7),
      inset 0 -1px 0 rgba(255,255,255,0.05);
  }

  /* Separator between standard punches/kicks and system buttons.
     Spans all 3 columns of the attacks grid; a thin red strike
     with breathing room above and below to visually segment the
     palette without breaking grid flow. */
  .cp-attack-sep {
    grid-column: 1 / -1;
    height: 1px;
    background: linear-gradient(to right,
      transparent 0%,
      rgba(231,34,58,0.5) 20%,
      rgba(231,34,58,0.5) 80%,
      transparent 100%);
    margin: 6px 0;
  }

  /* SA buttons — gold beveled */
  .cp-btn-sa {
    width: 66px; height: 42px;
    background: linear-gradient(180deg, #6a5200 0%, #3a2a00 50%, #1a1200 100%);
    border: 1px solid #CCAA00;
    color: #FFDD55; font-size: 11px;
    text-shadow: 0 1px 0 rgba(0,0,0,0.6);
    box-shadow:
      inset 0 1px 0 rgba(255,221,85,0.4),
      inset 0 -2px 0 rgba(0,0,0,0.5),
      0 1px 0 rgba(0,0,0,0.7),
      0 2px 0 rgba(0,0,0,0.55),
      0 3px 0 rgba(0,0,0,0.4),
      0 6px 8px rgba(0,0,0,0.5);
  }

  /* Hero link buttons (Wiki / Frame Data) */
  .cp-btn-link {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 0.15em; padding: 10px 16px; cursor: pointer;
    background: linear-gradient(180deg, rgba(231,34,58,0.18) 0%, rgba(231,34,58,0.04) 100%);
    border: 1px solid #9a0f1f; color: #ff3a52;
    text-transform: uppercase; transition: all 100ms ease-out;
    box-shadow:
      inset 0 1px 0 rgba(255,90,110,0.4),
      inset 0 -2px 0 rgba(0,0,0,0.3),
      0 2px 0 rgba(0,0,0,0.5),
      0 4px 8px rgba(0,0,0,0.4);
    text-decoration: none;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .cp-btn-link:hover {
    background: linear-gradient(180deg, var(--blood) 0%, #9a0f1f 100%);
    color: white;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.3),
      inset 0 -2px 0 rgba(0,0,0,0.4),
      0 2px 0 rgba(0,0,0,0.5),
      0 4px 16px rgba(231,34,58,0.5);
  }
  .cp-btn-link:active {
    transform: translateY(2px);
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
  }

  /* Ghost buttons (backspace/clear/remove/add) */
  .cp-btn-ghost {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.15em; padding: 8px 14px; cursor: pointer;
    background: linear-gradient(180deg, #1a1f2b 0%, #0a0c11 100%);
    border: 1px solid #1f2532; color: #9aa3b2;
    text-transform: uppercase; transition: all 100ms ease-out;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.06),
      inset 0 -1px 0 rgba(0,0,0,0.3),
      0 2px 0 rgba(0,0,0,0.5);
  }
  .cp-btn-ghost:hover:not(:disabled) {
    border-color: var(--blood); color: #ff3a52;
    background: linear-gradient(180deg, rgba(231,34,58,0.15) 0%, rgba(231,34,58,0.04) 100%);
  }
  .cp-btn-ghost:active:not(:disabled) {
    transform: translateY(2px);
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
  }
  .cp-btn-ghost:disabled { opacity: 0.4; cursor: default; }

  /* Save (primary) button */
  .cp-btn-save {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 0.15em; padding: 10px 18px; cursor: pointer;
    background: linear-gradient(180deg, #ff3a52 0%, #9a0f1f 100%);
    border: 1px solid #9a0f1f; color: white;
    text-transform: uppercase; font-weight: 700;
    transition: all 100ms ease-out;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.4),
      inset 0 -2px 0 rgba(0,0,0,0.4),
      0 3px 0 rgba(0,0,0,0.6),
      0 5px 12px rgba(231,34,58,0.3);
  }
  .cp-btn-save:hover:not(:disabled) {
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.5),
      inset 0 -2px 0 rgba(0,0,0,0.4),
      0 3px 0 rgba(0,0,0,0.6),
      0 6px 24px rgba(231,34,58,0.6);
  }
  .cp-btn-save:active:not(:disabled) {
    transform: translateY(3px);
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
  }
  .cp-btn-save:disabled {
    background: linear-gradient(180deg, #1a1f2b 0%, #0a0c11 100%);
    border-color: #1f2532; color: #5b6478; cursor: default;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 1px 0 rgba(0,0,0,0.3);
  }

  /* Token pills (in sequence box) — chunkier with inset highlight */
  .cp-token {
    display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; padding: 0;
    border-radius: 50%;
    font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700;
    color: white; border: 1px solid rgba(0,0,0,0.3);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.3),
      inset 0 -2px 4px rgba(0,0,0,0.25),
      0 1px 2px rgba(0,0,0,0.5);
  }
  /* Numpad and xx tokens stay rectangular — they hold multi-char text
     (e.g. "236", "xx", "[4]6") that doesn't fit a 30px circle. The
     base .cp-token rules are overridden here. */
  .cp-token-numpad {
    width: auto; height: 30px; padding: 0 10px; min-width: 36px;
    border-radius: 4px;
    background: #1a1f2b; color: #f0eee6;
    border: 1px solid #2c3445;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 1px 2px rgba(0,0,0,0.4);
  }
  .cp-token-xx {
    width: auto; height: 30px; padding: 0 10px; min-width: 36px;
    border-radius: 15px;
    background: #1a1f2b; color: #9aa3b2;
    border: 1px solid #2c3445;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .cp-token-fk {
    width: auto; height: 30px; padding: 0 10px; min-width: 50px;
    border-radius: 15px;
    background: linear-gradient(180deg, #ff3a52 0%, #9a0f1f 100%);
    border: 1px solid #9a0f1f;
  }

  /* Side card top stripe */
  .cp-side-card { position: relative; }
  .cp-side-card::before {
    content: ''; position: absolute; left: 0; top: 0; right: 0; height: 2px;
    background: linear-gradient(to right, var(--blood), transparent);
  }

  /* ════════════════════════════════════════════════════════
     COMBO TAB FLY-IN — stamp-in animation (scale-down + blur-off).
     Each .flyin element gets a randomized animationDelay assigned by
     React on mount (see useShuffleKey + flyDelay helper). The
     sequence box and its label use .flyin-slow for a 1280ms
     duration so the box visibly "develops" after the rest of the
     UI has already stamped in.
     ════════════════════════════════════════════════════════ */
  @keyframes stampIn {
    from { opacity: 0; transform: scale(1.6); filter: blur(3px); }
    to   { opacity: 1; transform: scale(1); filter: blur(0); }
  }
  .flyin {
    animation: stampIn 320ms cubic-bezier(.4,0,.2,1) both;
  }
  .flyin-slow {
    /* 320ms × 4 = 1280ms — sequence box settles ~1 sec after the
       other elements have already finished. Important uses of
       !important: needed to override the duration on the shared
       .flyin animation shorthand. */
    animation-duration: 1280ms !important;
  }

  /* Pause backdrop animation + skip fly-ins if user prefers reduced motion */
  @media (prefers-reduced-motion: reduce) {
    .cp-grid-bg { animation: none; }
    .flyin, .flyin-slow {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
      filter: none !important;
    }
  }
</style>
</head>
<body>
<div id="root">
  <div class="min-h-screen flex items-center justify-center text-paper-mute font-mono text-sm">
    <span class="inline-block w-3 h-3 mr-3 spin border-2 border-blood border-t-transparent rounded-full"></span>
    BOOTING EDITOR&hellip;
  </div>
</div>

<script type="module">
import React, { useState, useEffect, useMemo, useCallback, useRef } from 'https://esm.sh/react@18.3.1';
import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client';

// ── API ────────────────────────────────────────────────────
// Same endpoints as the original — server contract unchanged.
const API = {
  health: () => fetch('/api/health').then(r => r.json()),
  roster: () => fetch('/api/roster').then(r => r.json()),
  character: (name) => fetch(`/api/character/${encodeURIComponent(name)}`).then(r => r.json()),
  // Lightweight mtime-only endpoint used by the character page's
  // live-refresh poll. Returns { combos, combos_modern, notes } —
  // file mtimes as floats. The poll compares against the last-seen
  // mtimes (captured on initial fetch / previous refresh) and only
  // refetches /api/character/{name} when a value changes AND the
  // matching scheme isn't dirty in the editor.
  characterMtime: (name) => fetch(`/api/character/${encodeURIComponent(name)}/mtime`).then(r => r.json()),
  saveNotes: (name, body) => fetch(`/api/character/${encodeURIComponent(name)}/notes`, {
    method: 'PUT', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  }).then(r => r.json()),
  saveCombos: (name, body) => fetch(`/api/character/${encodeURIComponent(name)}/combos`, {
    method: 'PUT', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  }).then(r => r.json()),
  // Modern combos write to moderncombonotes.json — same payload shape
  // as saveCombos, different endpoint. Each character keeps Classic
  // and Modern combo sets independently so flipping the per-character
  // control_scheme doesn't lose either set.
  saveCombosModern: (name, body) => fetch(`/api/character/${encodeURIComponent(name)}/combos_modern`, {
    method: 'PUT', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  }).then(r => r.json()),
  setFolder: (path) => fetch('/api/settings/folder', {
    method: 'PUT', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ path }),
  }).then(r => r.json()),
  // Save the per-profile hotkey configuration. Server writes to
  // <reframework data folder>/sf6_hotkeys.json. Body shape:
  //   { version: 2, active: <profile name>, profiles: {...} }
  // Returns { ok: true, path } on success, { ok: false, error } on
  // failure. Caller handles dirty-flag clearing on ok=true.
  saveHotkeys: (body) => fetch('/api/hotkeys', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  }).then(r => r.json()),
};

// ── Settings ───────────────────────────────────────────────
// Persisted across two stores by size:
//   - Small prefs (notation, flags, volume, source, bundled key, URL)
//     → localStorage as JSON (synchronous, simple)
//   - Custom uploaded audio data (potentially MB-sized base64 data URL)
//     → IndexedDB (async, much larger quota — won't blow up like
//       localStorage, which caps at ~5MB per origin)
//
// Bumping the version key invalidates old settings cleanly when the
// shape changes — old keys remain but are ignored.
const SETTINGS_KEY = 'sf6_editor_settings_v3';
const AUDIO_DB_NAME = 'sf6_editor_audio';
const AUDIO_DB_STORE = 'blobs';
const AUDIO_DB_KEY = 'custom';

const SETTINGS_DEFAULTS = {
  notation: 'numpad',         // 'numpad' | 'letters'
  musicEnabled: false,        // default OFF per user request
  audioSource: 'url',         // 'custom' | 'url'  (bundled removed)
  audioCustomName: '',        // original filename for display (data lives in IndexedDB)
  audioUrl: 'https://www.youtube.com/watch?v=lfYlWkGByxQ',  // default; user can change in Settings
  audioVolume: 0.5,           // 0.0–1.0
  // (Hotkeys moved to per-profile storage on the gamepad store —
  //  see GamepadProfilesPanel. Each profile has its own modifier
  //  and bindings so different controllers can have different layouts.)
};

// Bundled track support removed — only File upload and URL sources remain.

function loadSettings() {
  try {
    const raw = localStorage.getItem(SETTINGS_KEY);
    if (!raw) return { ...SETTINGS_DEFAULTS };
    const merged = { ...SETTINGS_DEFAULTS, ...JSON.parse(raw) };
    // Migrate legacy 'arrows' notation (removed in favor of 'letters'
    // because REFramework menus can't render arrow glyphs reliably).
    if (merged.notation === 'arrows') merged.notation = 'letters';
    return merged;
  } catch { return { ...SETTINGS_DEFAULTS }; }
}
// Throws on failure so the caller can surface the error to the user.
// localStorage setItem throws QuotaExceededError when the serialized
// JSON exceeds the per-origin quota (~5MB). Without throwing, a
// previous version silently swallowed the error and the user saw
// "Settings saved" while nothing was actually persisted.
function saveSettings(s) {
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
}

// IndexedDB helpers for custom audio data. Promisified async API.
function openAudioDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(AUDIO_DB_NAME, 1);
    req.onupgradeneeded = () => {
      req.result.createObjectStore(AUDIO_DB_STORE);
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function setCustomAudio(dataUrl) {
  const db = await openAudioDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(AUDIO_DB_STORE, 'readwrite');
    tx.objectStore(AUDIO_DB_STORE).put(dataUrl, AUDIO_DB_KEY);
    tx.oncomplete = () => { db.close(); resolve(); };
    tx.onerror = () => { db.close(); reject(tx.error); };
  });
}
async function getCustomAudio() {
  const db = await openAudioDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(AUDIO_DB_STORE, 'readonly');
    const r = tx.objectStore(AUDIO_DB_STORE).get(AUDIO_DB_KEY);
    r.onsuccess = () => { db.close(); resolve(r.result || null); };
    r.onerror   = () => { db.close(); reject(r.error); };
  });
}
async function clearCustomAudio() {
  const db = await openAudioDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(AUDIO_DB_STORE, 'readwrite');
    tx.objectStore(AUDIO_DB_STORE).delete(AUDIO_DB_KEY);
    tx.oncomplete = () => { db.close(); resolve(); };
    tx.onerror = () => { db.close(); reject(tx.error); };
  });
}

const SettingsCtx = React.createContext(SETTINGS_DEFAULTS);
const useSettings = () => React.useContext(SettingsCtx);

// Parse a URL string and extract a YouTube video ID if present.
// Handles all common YouTube URL forms:
//   - https://www.youtube.com/watch?v=ID&list=...
//   - https://youtu.be/ID
//   - https://youtube.com/embed/ID
//   - https://m.youtube.com/watch?v=ID
//   - https://youtube.com/shorts/ID
//   - https://music.youtube.com/watch?v=ID
// Returns null if the URL isn't a recognized YouTube form.
function parseYouTubeId(url) {
  if (!url || typeof url !== 'string') return null;
  let u;
  try { u = new URL(url.trim()); } catch { return null; }
  const host = u.hostname.replace(/^www\./, '');
  // Short youtu.be links: ID is the first path segment
  if (host === 'youtu.be') {
    const id = u.pathname.slice(1).split('/')[0];
    return /^[A-Za-z0-9_-]{11}$/.test(id) ? id : null;
  }
  // youtube.com / m.youtube.com / music.youtube.com / youtube-nocookie.com
  if (host.endsWith('youtube.com') || host === 'youtube-nocookie.com') {
    // /watch?v=ID
    if (u.pathname === '/watch') {
      const id = u.searchParams.get('v');
      return id && /^[A-Za-z0-9_-]{11}$/.test(id) ? id : null;
    }
    // /embed/ID, /shorts/ID, /v/ID
    const m = u.pathname.match(/^\/(embed|shorts|v)\/([A-Za-z0-9_-]{11})/);
    if (m) return m[2];
  }
  return null;
}

// Resolve the active audio source from current settings.
// Returns a descriptor {kind, value} or null:
//   - {kind: 'audio',   value: <url>}      → play via <audio> element
//   - {kind: 'youtube', value: <video_id>} → play via YouTube IFrame API
// Callers (AudioPlayer) branch on kind. Centralizing the type detection
// here means the rest of the audio pipeline doesn't need to know which
// source the user picked, just how to play it.
function resolveAudioSrc(s, customDataUrl) {
  if (s.audioSource === 'custom') {
    return customDataUrl ? { kind: 'audio', value: customDataUrl } : null;
  }
  // Default (and any legacy 'bundled' value): treat as URL source.
  if (!s.audioUrl) return null;
  const ytId = parseYouTubeId(s.audioUrl);
  if (ytId) return { kind: 'youtube', value: ytId };
  // Otherwise treat as a direct media URL (mp3/ogg/m4a/wav/etc)
  return { kind: 'audio', value: s.audioUrl };
}

// Numpad-to-arrow map. Standard FGC convention:
//   7 8 9      ↖ ↑ ↗
//   4 5 6  =>  ← • →
//   1 2 3      ↙ ↓ ↘
// Direction & motion notation conversion. Mirrors the Lua overlay
// (SF6_Overlay.lua, NOTATION CONVERSION section) so HTML and in-game
// HUD render identically — important because REFramework menus can't
// render arrow glyphs reliably, only ASCII letters.
//
// Stored tokens always use numpad digits (1-9, "236", "[4]6" etc).
// Conversion happens at render time only.
const NUM_TO_LETTER = {
  '1':'DB', '2':'D',  '3':'DF',
  '4':'B',  '5':'N',  '6':'F',
  '7':'UB', '8':'U',  '9':'UF',
};
// Whole-motion substitutions (run BEFORE per-digit fallback).
// Same set as Lua MOTION_NAMES.
const MOTION_NAMES = {
  '2141236': 'SPD',    // 720
  '41236':   'HCF',
  '63214':   'HCB',
  // 360F/360B: passed through unchanged (the Lua handles these via raw=true)
  '623':     'DP',
  '421':     'RDP',
  '236':     'QCF',
  '214':     'QCB',
  '[4]6':    '[B]F',   // charge back→forward
  '[2]8':    '[D]U',   // charge down→up
  '46':      '[B]F',
  '28':      '[D]U',
  '22':      'DD',
  '66':      'FF',     // dash forward
  '44':      'BB',     // dash backward
};
// Convert a token's display value to letter notation.
// 'numpad' setting → return raw. 'letters' setting → translate.
function toLetterNotation(v) {
  if (typeof v !== 'string') return v;
  // Pass-through for non-translatable tokens
  if (v === 'x2' || v === '360F' || v === '360B' || v === '720') return v;
  // Whole-motion match first (gives QCF, DP, HCB, etc.)
  if (MOTION_NAMES[v]) return MOTION_NAMES[v];
  // Per-digit fallback for anything not in the table
  // (e.g. plain "2", "6", or motions not in MOTION_NAMES)
  return v.replace(/[1-9]/g, d => NUM_TO_LETTER[d] || d);
}

// ── Tokens ─────────────────────────────────────────────────
function tokenForCell(label, palette, counter) {
  if (palette === 'numpad') return { t: 'dir', v: label };
  if (palette === 'motion') {
    if (label === 'x2') return { t: 'dir', v: 'x2' };
    return { t: 'dir', v: label };
  }
  if (palette === 'attack') {
    if (label === 'xx') return { t: 'btn', v: 'xx' };
    // F.Kill mirrors Oki — bakes the slot counter into the token at
    // insert time. Stored as { t:'fk', v:'+5' } (or '-3' / '0').
    // Legacy tokens with no v field still render correctly via the
    // fallback in the renderer.
    if (label === 'F.Kill') {
      const n = counter || 0;
      const prefix = n > 0 ? '+' + n : (n < 0 ? String(n) : '0');
      return { t: 'fk', v: prefix };
    }
    // Oki bakes the current counter into the token, matching the Lua
    // overlay format: [+5:Oki] / [-3:Oki] / [0:Oki]. The counter value
    // is captured AT INSERT TIME — changing the counter later does not
    // retro-edit existing Oki tokens (same as the Lua behavior).
    if (label === 'Oki') {
      const n = counter || 0;
      const prefix = n > 0 ? '+' + n : (n < 0 ? String(n) : '0');
      return { t: 'btn', v: '[' + prefix + ':Oki]' };
    }
    return { t: 'btn', v: label };
  }
  if (palette === 'sa') return { t: 'btn', v: label };
  return { t: 'btn', v: label };
}

// ── Motion detection (port of SF6_Overlay.lua dir_buffer matchers) ─
// Operates on a buffer of direction transitions: [{ dir, frame }, ...]
// where dir is 1-9 numpad (5 = neutral) and frame is a monotonic counter.
// The editor has no facing-left concept, so patterns are right-facing
// canonical only; output is always the canonical numpad string.
//
// Window is wider than the Lua's 28F (~470ms) — the Lua needs precision
// for in-game move detection, but the editor is for authoring combos
// and benefits from generous tolerance. 45F (~750ms) at 60Hz lets
// users complete motions at a comfortable, deliberate pace. DP gets
// 2x window (90F, ~1.5s) to accommodate shortcut variants.
const DIR_BUFFER_WINDOW = 45;

// Strict matcher: the seq's last dir must appear within the recent
// staleness window (not necessarily as the literal last buffer entry),
// and each prior seq dir must appear (in order, possibly with intermediates)
// within DIR_BUFFER_WINDOW. Walks the buffer newest-to-oldest.
//
// Why the terminal dir isn't required to be `buf[last]`:
//   On a DualSense (and other thumb-sticks with a circular gate), a
//   QCF physically forces the stick through a brief "neutral" reading
//   between the diagonal `3` and the cardinal `6` — both axes drop
//   under the deadzone simultaneously as the stick rolls across the
//   top of the gate. After the player completes the motion, the stick
//   visits `6` for only 1–2 frames before they release into `5`. By
//   the time the attack button press is registered, the buffer's last
//   entry is `5`, not `6`. Requiring last-entry-equals-terminal made
//   motion detection impossible on circular-gate sticks.
//
//   Confirmed in trace: clean QCF on DualSense produces sequence
//   `2,3,2,5,6,5` with `6` persisting for ~1 frame.
//
// MOTION_STALE_FRAMES (25 ≈ 415ms at 60Hz) bounds how recently the
// terminal direction was held. Wider than the original 15F since the
// stick may have already moved past the terminal direction by press
// time; we still want to count the motion as fresh.
function motionInBuffer(seq, buf, currentFrame) {
  if (!buf.length) return -1;
  const MOTION_STALE_FRAMES = 25;
  const terminalDir = seq[seq.length - 1];
  // Find the most recent occurrence of the terminal direction within
  // the staleness window. Walk newest-to-oldest; stop at the staleness
  // boundary.
  let terminalIdx = -1;
  for (let i = buf.length - 1; i >= 0; i--) {
    if ((currentFrame - buf[i].frame) > MOTION_STALE_FRAMES) break;
    if (buf[i].dir === terminalDir) { terminalIdx = i; break; }
  }
  if (terminalIdx < 0) return -1;
  // Walk backwards from terminalIdx, looking for the rest of seq in
  // reverse order. Each match consumes one seq position; intermediates
  // (including neutral 5) are allowed between matches. Earliest match
  // must fall within DIR_BUFFER_WINDOW of the current frame.
  let si = seq.length - 1;
  let startIdx = -1;
  const earliest = currentFrame - DIR_BUFFER_WINDOW;
  for (let i = terminalIdx; i >= 0; i--) {
    const e = buf[i];
    if (e.frame < earliest) break;
    if (e.dir === seq[si]) {
      si--;
      if (si < 0) { startIdx = i; break; }
    }
  }
  return startIdx;
}

// DP matcher: relaxed waypoint check on 6→2→3 (or shortcut ending on 6).
// Extended window (2x). Same DualSense-friendly fix as motionInBuffer —
// the terminal direction (3 or 6) doesn't need to be the literal last
// buffer entry, since circular-gate sticks transit through neutral
// between cardinals. Returns the buffer index where the motion begins
// on success, or -1 on no match.
function dpInBuffer(buf, currentFrame) {
  if (!buf.length) return -1;
  const DP_STALE_FRAMES = 30;   // slightly wider than QCF — DP shortcut variants benefit
  // Find the most recent terminal direction (3 or 6) within the window.
  let terminalIdx = -1;
  let terminalDir = 0;
  for (let i = buf.length - 1; i >= 0; i--) {
    if ((currentFrame - buf[i].frame) > DP_STALE_FRAMES) break;
    if (buf[i].dir === 3 || buf[i].dir === 6) {
      terminalIdx = i; terminalDir = buf[i].dir; break;
    }
  }
  if (terminalIdx < 0) return -1;
  const earliest = currentFrame - DIR_BUFFER_WINDOW * 2;
  let foundFd = false, foundD = false, foundF = false;
  let startIdx = terminalIdx;
  let matchStart = -1;
  // If the terminal direction was 6, skip past it and start scanning
  // for the 3→2→6 sub-pattern from the entry before. (When terminal is
  // 3, the 3 itself is the first waypoint we want.)
  if (terminalDir === 6) startIdx = startIdx - 1;
  for (let i = startIdx; i >= 0; i--) {
    const e = buf[i];
    if (e.frame < earliest) break;
    if (!foundFd && e.dir === 3) foundFd = true;
    else if (foundFd && !foundD && e.dir === 2) foundD = true;
    else if (foundFd && foundD && !foundF && e.dir === 6) {
      foundF = true; matchStart = i; break;
    }
  }
  return matchStart;
}

// Motion patterns checked in priority order (most-specific first, so a
// 41236 isn't claimed as a 236, etc.). Each entry: [name, sequence].
// Names match the canonical motion strings already in MOTIONS array.
const MOTION_PATTERNS = [
  ['63214', [6,3,2,1,4]],   // HCB
  ['41236', [4,1,2,3,6]],   // HCF
  // DP handled separately (relaxed matcher); slotted between half-circles
  // and the simple QCs in priority order.
  ['421',   [4,2,1]],       // RDP
  ['236',   [2,3,6]],       // QCF
  ['214',   [2,1,4]],       // QCB
];

// Strict adjacent-tail matcher for the on-screen palette path. The
// gamepad path uses time-windowed buffers (motionInBuffer/dpInBuffer),
// but palette clicks have no timing component — a user can click as
// slowly as they want. So this matcher requires literal adjacency:
// the last N tokens before the cursor must be single-digit dir tokens
// matching one of the patterns exactly, with no other tokens between.
//
// DP is included here as a strict 6→2→3 sequence. The gamepad's
// dpInBuffer relaxes this with a 2x window because real stick inputs
// transit neutral between cardinals; palette clicks don't have that
// problem, so strict is fine and the user typing 6→2→3 explicitly
// intends a DP.
//
// Returns { name, n } where n is the number of tokens to consume, or
// null if no match. Patterns checked longest-first so a 41236 isn't
// mis-claimed as a 236.
const TAIL_PATTERNS = [
  ['63214', ['6','3','2','1','4']],   // HCB (5)
