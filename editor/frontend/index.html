  ['41236', ['4','1','2','3','6']],   // HCF (5)
  ['421',   ['4','2','1']],           // RDP (3)
  ['623',   ['6','2','3']],           // DP  (3)  — strict, palette-only
  ['236',   ['2','3','6']],           // QCF (3)
  ['214',   ['2','1','4']],           // QCB (3)
];
function detectTailMotionAtCursor(tokens, cursorIdx) {
  const i = Math.max(0, Math.min(cursorIdx, tokens.length));
  if (i === 0) return null;
  for (const [name, seq] of TAIL_PATTERNS) {
    const n = seq.length;
    if (i < n) continue;
    let ok = true;
    for (let k = 0; k < n; k++) {
      const t = tokens[i - n + k];
      // Must be a dir token with single-char value matching exactly.
      // Single-char guard prevents matching against an already-collapsed
      // motion token (whose v is multi-char like '236').
      if (!t || t.t !== 'dir' || typeof t.v !== 'string' || t.v.length !== 1 || t.v !== seq[k]) {
        ok = false; break;
      }
    }
    if (ok) return { name, n };
  }
  return null;
}

// Set of btn-token values that should NOT trigger motion collapse.
// Mirrors the gamepad's SYSTEM_BUTTONS exclusion (line ~3152) so palette
// and controller behavior stay aligned. xx is a cancel marker, not an
// attack; DR/DRC/MW/DI/DP/Throw/Auto are system actions; CH/PC/SHM are
// post-hit annotations. F.Kill and Oki ride on separate token shapes
// ('fk' and bracketed '[+N:Oki]' btns), handled by the value-prefix
// guard in the collapse callsites.
const NON_COLLAPSING_BTN_VALUES = new Set([
  'xx', 'DI', 'DR', 'DRC', 'DP', 'MW',
  'Throw', 'Auto',
  'CH', 'PC', 'SHM',
]);
function isCollapsingAttackToken(tok) {
  if (!tok) return false;
  if (tok.t !== 'btn') return false;
  if (typeof tok.v !== 'string') return false;
  // Oki bakes into '[+N:Oki]' / '[0:Oki]' / '[-N:Oki]'. Reject anything
  // starting with '[' so future bracketed annotations are also excluded
  // without needing a code change here.
  if (tok.v.charAt(0) === '[') return false;
  if (NON_COLLAPSING_BTN_VALUES.has(tok.v)) return false;
  return true;
}

// Run the matcher chain. Returns { name, startIdx } or null.
function detectMotion(buf, currentFrame) {
  // Halfcircles first.
  for (const name of ['63214', '41236']) {
    const seq = MOTION_PATTERNS.find(p => p[0] === name)[1];
    const idx = motionInBuffer(seq, buf, currentFrame);
    if (idx >= 0) return { name, startIdx: idx };
  }
  // DP next (relaxed matcher).
  const dpIdx = dpInBuffer(buf, currentFrame);
  if (dpIdx >= 0) return { name: '623', startIdx: dpIdx };
  // Then RDP / QCF / QCB.
  for (const name of ['421', '236', '214']) {
    const seq = MOTION_PATTERNS.find(p => p[0] === name)[1];
    const idx = motionInBuffer(seq, buf, currentFrame);
    if (idx >= 0) return { name, startIdx: idx };
  }
  return null;
}

// ── Gamepad input system ───────────────────────────────────
// Browser Gamepad API. Polled at ~60Hz via requestAnimationFrame while
// CombosTab is mounted. Mapping is hardware-tied (not part of editor
// settings) so it lives under its own localStorage key. Cleared
// independently and survives editor settings resets.
//
// Architecture:
//   Calibration → captures button index per logical input + axis layout
//   Polling     → reads gamepad state, derives numpad direction from
//                 stick/D-pad, fires onToken() on rising edges
//   Tokens      → routed through tokenForCell() so output is identical
//                 to clicking the on-screen palette buttons
// Storage uses a profile registry. Each profile is one named mapping
// for one specific controller (matched by gamepad.id when available,
// falling back to padIndex). Bumped from v2 → v3 because the schema
// changed from `{ buttons, dpad, axisDirs, padIndex }` at the root
// to `{ activeProfileId, profiles: { [id]: profile } }`.
const GAMEPAD_MAP_KEY = 'sf6_gamepad_map_v3';
// Per-profile hotkey defaults. Modifier UNSET so the user is prompted
// to pick one explicitly (legend in the in-game editor will show
// "not configured" until set). Action bindings populated with sensible
// defaults so once the user picks a modifier, everything just works.
//
// bindings  → Classic-scheme SHIFT bindings (keyed by Classic attack
//             button labels: LP, MP, HP, LK, MK, HK).
// bindings_modern → Modern-scheme SHIFT bindings (keyed by Modern
//             labels: LIGHT, MEDIUM, HARD, SP, AUTO, THROW, DI, DP).
//
// Modern starts empty — the user must configure their own since
// Modern has 8 attack buttons available as SHIFT targets vs Classic's
// 6, and the user's preferences likely differ between schemes.
const DEFAULT_HOTKEYS = () => ({
  modifier: '',
  bindings: {
    sep:       'LP',
    xx:        'MP',
    backspace: 'LK',
    clear:     'HK',
    undo:      'MK',
  },
  bindings_modern: {},
});

// Build the v2 sf6_hotkeys.json payload from the gamepad store.
// Used by both the "Save" (POST to backend) and "Export JSON"
// (download) flows so the format stays consistent. The active
// marker names the profile the Lua should pick up; profile keys
// are profile names (not IDs) since the Lua-side schema uses names.
function buildHotkeysPayload(gamepadStore) {
  const payload = {
    version: 2,
    active: gamepadStore.activeProfileId
      ? (gamepadStore.profiles[gamepadStore.activeProfileId]?.name || 'default')
      : 'default',
    profiles: {},
  };
  for (const id of Object.keys(gamepadStore.profiles || {})) {
    const p = gamepadStore.profiles[id];
    const hk = p.hotkeys || DEFAULT_HOTKEYS();
    // Three modifier formats coexist:
    //   modifier_index: raw button index — preferred (works for ANY button)
    //   modifier_axis : { index, sign } — for axis-as-modifier (rare)
    //   modifier      : label string — legacy / readable shorthand
    // The Lua loader prefers _index/_axis when present, falls back to
    // the label-based modifier for older profiles.
    payload.profiles[p.name || id] = {
      modifier: hk.modifier || '',
      modifier_index: hk.modifier_index ?? null,
      modifier_axis: hk.modifier_axis || null,
      modifier_label: hk.modifier_label || '',
      bindings: hk.bindings || {},
      // Modern-scheme bindings. Lua side does not yet read this; web
      // editor uses it to route SHIFT+button on Modern-active chars
      // to the right action. Persisted for future Lua support.
      bindings_modern: hk.bindings_modern || {},
    };
  }
  return payload;
}
// Calibration sequence — order shown to user.
// Each entry: { label, kind, optional?, description? }
//   kind        = 'btn' (single button) or 'dir' (axis/dpad direction)
//   optional    = step is skippable (the user may not want to bind it)
//   description = extra prompt text shown above the press instruction
//                 — used to explain non-obvious bindings (BACKSPACE, CLEAR)
// We capture 4 cardinal directions; diagonals are derived at runtime.
// DI (HP+HK) and Drive Parry (MP+MK) are detected as button combinations
// at runtime — no separate calibration needed.
const GP_CALIBRATION_STEPS = [
  { label: 'UP',    kind: 'dir' },
  { label: 'DOWN',  kind: 'dir' },
  { label: 'LEFT',  kind: 'dir' },
  { label: 'RIGHT', kind: 'dir' },
  { label: 'LP',    kind: 'btn' },
  { label: 'MP',    kind: 'btn' },
  { label: 'HP',    kind: 'btn' },
  { label: 'LK',    kind: 'btn' },
  { label: 'MK',    kind: 'btn' },
  { label: 'HK',    kind: 'btn' },
  // Utility bindings — optional. If skipped, the action stays
  // accessible only via the on-screen buttons in the editor.
  { label: 'BACKSPACE', kind: 'btn', optional: true,
    description: 'Removes the most recent input from the active combo slot — same as the on-screen ← BACKSPACE button. Pick something easy to reach but not used for combos (e.g. SELECT, BACK, or a shoulder button).' },
  { label: 'CLEAR',     kind: 'btn', optional: true,
    description: 'Wipes ALL inputs from the active combo slot. Same as the CLEAR button. Pick a button that\'s hard to hit by accident.' },
  // SHIFT modifier — the in-game combo editor uses this as the "hold
  // to enable hotkeys" button. Can be ANY physical button on the
  // controller — doesn't need to match one of the 10 game buttons.
  // Stored as a raw button index (so SELECT, START, paddles, side
  // buttons, etc. all work). Optional: if skipped, the user can
  // configure it later by re-running calibration.
  { label: 'SHIFT', kind: 'shift', optional: true,
    description: 'Hold this button in-game while pressing other buttons to fire combo-editor hotkeys (insert >, xx, undo, etc.). Pick any button you don\'t use during normal play — SELECT, START, a back paddle, a side button. It does NOT need to be one of the buttons you calibrated above. Configure the per-action bindings in Settings → Gamepad → SHIFT CONFIG.' },
];

// Modern controls calibration sequence. Same 4 cardinal directions
// as classic, then the 8 Modern action buttons. Optional editor
// bindings (BACKSPACE/CLEAR) and SHIFT modifier are identical to
// classic so the in-game hotkey system works the same way regardless
// of control scheme.
//
// Modern buttons (per Capcom's official mapping):
//   Light  — context-sensitive light attack
//   Medium — context-sensitive medium attack
//   Hard   — context-sensitive heavy attack
//   SP     — Special — combined with directions to fire specials
//   Auto   — Auto-combo trigger
//   Throw  — single-button throw (LP+LK in classic)
//   DI     — Drive Impact (HP+HK in classic)
//   DP     — Drive Parry (MP+MK in classic)
const GP_CALIBRATION_STEPS_MODERN = [
  { label: 'UP',     kind: 'dir' },
  { label: 'DOWN',   kind: 'dir' },
  { label: 'LEFT',   kind: 'dir' },
  { label: 'RIGHT',  kind: 'dir' },
  { label: 'LIGHT',  kind: 'btn' },
  { label: 'MEDIUM', kind: 'btn' },
  { label: 'HARD',   kind: 'btn' },
  { label: 'SP',     kind: 'btn' },
  { label: 'AUTO',   kind: 'btn' },
  { label: 'THROW',  kind: 'btn' },
  { label: 'DI',     kind: 'btn' },
  { label: 'DP',     kind: 'btn' },
  // Optional editor bindings — same flow as classic.
  { label: 'BACKSPACE', kind: 'btn', optional: true,
    description: 'Removes the most recent input from the active combo slot — same as the on-screen ← BACKSPACE button. Pick something easy to reach but not used for combos (e.g. SELECT, BACK, or a shoulder button).' },
  { label: 'CLEAR',     kind: 'btn', optional: true,
    description: 'Wipes ALL inputs from the active combo slot. Same as the CLEAR button. Pick a button that\'s hard to hit by accident.' },
  { label: 'SHIFT', kind: 'shift', optional: true,
    description: 'Hold this button in-game while pressing other buttons to fire combo-editor hotkeys (insert >, xx, undo, etc.). Pick any button you don\'t use during normal play — SELECT, START, a back paddle, a side button. It does NOT need to be one of the buttons you calibrated above. Configure the per-action bindings in Settings → Gamepad → SHIFT CONFIG.' },
];

// Resolve which step list to use for a controlType. Defaults to
// classic for unknown values (covers legacy profiles + safety).
function gpStepsFor(controlType) {
  return controlType === 'modern' ? GP_CALIBRATION_STEPS_MODERN : GP_CALIBRATION_STEPS;
}

// Extract just the calibration mapping fields from a profile, used
// when reading per-scheme data out of profile.calibrations[scheme].
// Returns null if the calibration slot is empty/uninitialized.
function calibrationIsPresent(c) {
  return !!(c && c.buttons && Object.keys(c.buttons).length > 0);
}

const GP_DEADZONE = 0.4;

// Generate a short random ID for new profiles
function gpProfileId() {
  return Math.random().toString(36).slice(2, 10);
}

// Friendly device name from gamepad.id. Recognizes well-known
// fightstick/leverless firmware and emulation profiles, collapsing
// them to a generic label. The original gamepad.id is still used
// for profile↔device matching — this only affects display.
//
// Returns { label, kind } where kind is one of:
//   'standard'   — well-known consumer pad (Xbox/PS/Switch)
//   'fightstick' — emulating a known fightstick profile (good for browser)
//   'native'     — raw firmware HID (often misbehaves; warn the user)
//   'unknown'    — nothing matched, fall back to cleaned id
function friendlyDeviceName(rawId) {
  if (!rawId) return { label: 'Controller', kind: 'unknown' };
  const id = rawId.toLowerCase();

  // ── Native open-source firmware (raw HID — often unreliable) ────
  // GP2040-CE (Pico-based leverless: Hautepad, Flatbox, etc.),
  // OpenStickCommunity firmware. These boards usually also expose
  // an emulation profile (Panthera/PS4/Xbox); recommend that one.
  if (/gp2040|openstick|flatbox/i.test(rawId)) {
    return { label: 'Generic Pad (native firmware)', kind: 'native' };
  }
  // Brook native mode (UFB / Wingman). Usually well-supported but
  // identifies as a unique device — collapse to generic for clarity.
  if (/brook\s+(ufb|wingman)/i.test(rawId)) {
    return { label: 'Generic Pad (Brook)', kind: 'native' };
  }

  // ── Fightstick emulation profiles (well-supported, recommended) ──
  // These IDs may come from real sticks OR from leverless boards
  // running an emulation profile. Either way, browsers handle them
  // through Standard Gamepad layout — preferred for our use case.
  if (/razer\s+panthera/i.test(rawId)) return { label: 'Generic Pad (Panthera profile)', kind: 'fightstick' };
  if (/hori.*fighting\s*stick|hori\s+fc|hori.*alpha/i.test(rawId)) return { label: 'Generic Pad (Hori Fighting Stick)', kind: 'fightstick' };
  if (/qanba/i.test(rawId)) return { label: 'Generic Pad (Qanba)', kind: 'fightstick' };
  if (/mayflash|f300|f500/i.test(rawId)) return { label: 'Generic Pad (Mayflash)', kind: 'fightstick' };
  if (/madcatz|mad\s*catz|te2|tournament\s+edition/i.test(rawId)) return { label: 'Generic Pad (Mad Catz TE)', kind: 'fightstick' };
  if (/victrix\s+pro/i.test(rawId)) return { label: 'Generic Pad (Victrix Pro)', kind: 'fightstick' };

  // ── Consumer pads ────────────────────────────────────────────────
  if (/dualsense|ps5\s+controller|wireless\s+controller.*054c/i.test(rawId)) return { label: 'PlayStation 5 DualSense', kind: 'standard' };
  if (/dualshock|ps4\s+controller/i.test(rawId)) return { label: 'PlayStation 4 DualShock', kind: 'standard' };
  if (/xbox\s+(one|series|elite)/i.test(rawId)) return { label: 'Xbox Series Controller', kind: 'standard' };
  if (/xbox\s*360|xinput/i.test(rawId)) return { label: 'Xbox 360 Controller', kind: 'standard' };
  if (/switch\s+pro|nintendo/i.test(rawId)) return { label: 'Nintendo Switch Pro', kind: 'standard' };
  if (/8bitdo/i.test(rawId)) return { label: '8BitDo Controller', kind: 'standard' };

  // ── Fallback: strip the parenthesized vendor/product detail ──────
  const cleaned = rawId.replace(/\s*\([^)]*\)\s*/g, '').trim();
  return { label: cleaned || rawId.slice(0, 40), kind: 'unknown' };
}

// Default profile registry — empty
function emptyGamepadStore() {
  return { activeProfileId: null, profiles: {} };
}

function loadGamepadStore() {
  try {
    const raw = localStorage.getItem(GAMEPAD_MAP_KEY);
    let store;
    if (!raw) {
      store = emptyGamepadStore();
    } else {
      const parsed = JSON.parse(raw);
      if (!parsed || typeof parsed !== 'object' || !parsed.profiles) {
        store = emptyGamepadStore();
      } else {
        store = parsed;
      }
    }
    // ── v2 → v3 migration ──────────────────────────────────────
    // Old layout (sf6_gamepad_map_v2) was a single flat mapping with
    // no profile registry; the new store nests mappings under
    // profiles[id]. If v3 is empty AND a v2 blob still exists, lift
    // it into a profile so the user's prior calibration survives.
    if (store.profiles && Object.keys(store.profiles).length === 0) {
      try {
        const legacyRaw = localStorage.getItem('sf6_gamepad_map_v2');
        if (legacyRaw) {
          const legacy = JSON.parse(legacyRaw);
          if (legacy && legacy.buttons) {
            // Best-effort device id from currently connected pads at
            // this slot. If unplugged at load time, leave blank — the
            // panel's fingerprint matcher will still light it up green
            // once the controller is reconnected and a manual recal
            // re-binds it. The deviceId field is required to avoid
            // tripping isProfileLive's null-guard.
            let deviceId = '';
            let deviceName = 'Imported Controller';
            try {
              const pads = navigator.getGamepads ? navigator.getGamepads() : [];
              const slot = pads[legacy.padIndex || 0];
              if (slot && slot.id) {
                deviceId = slot.id;
                deviceName = friendlyDeviceName(slot.id).label;
              }
            } catch { /* getGamepads can throw before user gesture */ }
            const id = 'gp_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
            store = {
              activeProfileId: id,
              profiles: {
                [id]: {
                  id,
                  name: deviceName,
                  deviceId,
                  buttons: legacy.buttons || {},
                  dpad: legacy.dpad || {},
                  axisDirs: legacy.axisDirs || {},
                  padIndex: legacy.padIndex || 0,
                  shiftIndex: null,
                  shiftAxis: null,
                  shiftLabel: '',
                  hotkeys: (typeof DEFAULT_HOTKEYS === 'function') ? DEFAULT_HOTKEYS() : {},
                  // Mirror into the new per-scheme structure so the
                  // post-load migration below treats this profile as
                  // already-converted (rather than re-wrapping the
                  // root fields a second time).
                  calibrations: {
                    classic: {
                      buttons: legacy.buttons || {},
                      dpad: legacy.dpad || {},
                      axisDirs: legacy.axisDirs || {},
                      shiftIndex: null,
                      shiftAxis: null,
                      shiftLabel: '',
                    },
                    modern: null,
                  },
                },
              },
            };
            // Persist immediately so subsequent loads skip migration.
            localStorage.setItem(GAMEPAD_MAP_KEY, JSON.stringify(store));
          }
        }
      } catch { /* migration is best-effort; never block load */ }
    }
    // ── Per-profile calibrations migration ─────────────────────
    // Older profiles store one calibration at the profile root
    // (`buttons`, `dpad`, `axisDirs`, etc). The new model stores
    // both Classic and Modern under `calibrations`:
    //   profile.calibrations = { classic: {...} | null, modern: {...} | null }
    // Root-level fields are kept (the runtime reads from them) and
    // mirror whichever scheme is currently "wired" for runtime —
    // for now that's always Classic, since the per-character M/C
    // switch isn't built yet.
    //
    // Migration is non-destructive: if a profile already has
    // `calibrations`, we leave it alone. Otherwise we lift the
    // root-level mapping into `calibrations.classic` and set
    // `calibrations.modern = null`.
    if (store.profiles) {
      let migrated = false;
      for (const id of Object.keys(store.profiles)) {
        const p = store.profiles[id];
        if (!p || p.calibrations) continue;
        p.calibrations = {
          classic: (p.buttons && Object.keys(p.buttons).length > 0)
            ? {
                buttons: p.buttons || {},
                dpad: p.dpad || {},
                axisDirs: p.axisDirs || {},
                shiftIndex: p.shiftIndex ?? null,
                shiftAxis: p.shiftAxis || null,
                shiftLabel: p.shiftLabel || '',
              }
            : null,
          modern: null,
        };
        migrated = true;
      }
      if (migrated) {
        try { localStorage.setItem(GAMEPAD_MAP_KEY, JSON.stringify(store)); }
        catch { /* persist is best-effort */ }
      }
    }
    return store;
  } catch { return emptyGamepadStore(); }
}
function saveGamepadStore(store) {
  localStorage.setItem(GAMEPAD_MAP_KEY, JSON.stringify(store));
}

// Find the best profile for the currently connected gamepads:
//   1. If there's an active profile, prefer it (look up its device by id)
//   2. Otherwise, fall back to any profile whose deviceId matches
//      a connected pad
// Returns the resolved mapping object (with padIndex pointing to the
// current slot) or null if nothing matches.
// Extract a "fingerprint" from a gamepad ID string for fuzzy match
// across browser sessions. Browsers report controllers in varied
// formats but USB VID:PID hex is usually present:
//   "DualSense Wireless Controller (Vendor: 054c Product: 0ce6)"
//   "Wireless Controller (STANDARD GAMEPAD Vendor: 054c Product: 0ce6)"
//   "054c-0ce6-DualSense Wireless Controller"
// Returns "054c:0ce6" or null if no VID:PID-shaped pair is found.
// Used everywhere we need to match a saved deviceId against the
// current live gamepad list — Chrome updates have been known to
// change ID formatting which would otherwise break exact-match.
function gpFingerprint(id) {
  if (!id) return null;
  const m = id.match(/([0-9a-f]{4})[^0-9a-f]+([0-9a-f]{4})/i);
  return m ? (m[1].toLowerCase() + ':' + m[2].toLowerCase()) : null;
}

// Find a connected gamepad slot for a saved deviceId. Two-tier match:
// exact id → VID:PID fingerprint. Returns -1 when no pad matches.
//
// IMPORTANT: we do NOT fall back to "first non-null pad" anymore. That
// felt forgiving but broke things badly: with two profiles saved and
// only one controller connected, the OTHER profile's lookup would
// happily return the wrong controller's slot. Mappings for both
// profiles claimed to be live, button indices got crossed, and inputs
// silently dropped because the calibrated indices didn't match the
// physical controller. Better to return -1 and let the caller decide
// (skip polling, show "controller not connected", whatever).
function findGamepadIdx(pads, deviceId) {
  // 1. Exact id match
  let idx = pads.findIndex(p => p && p.id === deviceId);
  if (idx >= 0) return idx;
  // 2. Fingerprint match — same physical controller, different ID format
  const fp = gpFingerprint(deviceId);
  if (fp) {
    idx = pads.findIndex(p => p && gpFingerprint(p.id) === fp);
    if (idx >= 0) return idx;
  }
  return -1;
}

function resolveActiveMapping(store) {
  if (!store || !store.profiles) return null;
  const pads = navigator.getGamepads ? Array.from(navigator.getGamepads()) : [];
  // Try active profile first
  const active = store.activeProfileId && store.profiles[store.activeProfileId];
  if (active) {
    // Keyboard profiles don't need a connected gamepad — they're
    // always available as long as the page has focus. Return the
    // profile directly without a padIndex.
    if (active.type === 'keyboard') {
      return { ...active };
    }
    const matchedIdx = findGamepadIdx(pads, active.deviceId);
    if (matchedIdx >= 0) {
      return { ...active, padIndex: matchedIdx };
    }
    // Active profile selected but its device not connected. Don't
    // silently fall back to a different profile's controller — the
    // user explicitly picked this profile, so respect that choice.
    // Return null; useGamepadInput will skip polling.
    return null;
  }
  // No active profile — pick the first profile whose device IS
  // currently connected. Useful when the user has multiple profiles
  // saved and just plugged in one of them; we pick that one
  // automatically rather than requiring an explicit ACTIVATE click.
  // Skip keyboard profiles in this auto-pick — they have no device
  // presence, so we don't want to pick them silently. User must
  // explicitly activate via the profile list.
  for (const id of Object.keys(store.profiles)) {
    const p = store.profiles[id];
    if (p.type === 'keyboard') continue;
    const idx = findGamepadIdx(pads, p.deviceId);
    if (idx >= 0) return { ...p, padIndex: idx };
  }
  return null;
}

// Convert raw axis x/y into numpad cell (1-9). 5 = neutral.
//   7 8 9
//   4 5 6
//   1 2 3
//
// Polar implementation: classify by magnitude + angle, NOT by independent
// per-axis deadzones. Per-axis thresholding has a well-known failure mode
// on circular-gate sticks (DualSense, Xbox): a fast roll from 2 to 6 may
// sample at intermediate positions where x has crossed 0.4 but y has too,
// producing transient diagonals — or worse, drop briefly to NEUTRAL when
// the stick rolls through angles where BOTH axes momentarily sit between
// 0.3 and 0.4. Empirically (DualSense trace) this caused the QCF buffer
// sequence `2,3,2,5,6,...` where a player held a clean ↓→↘→→ roll.
//
// Polar avoids that entirely: any position with magnitude > dz lands in
// exactly one of 8 angular sectors, picked by the stick's actual angle.
// Each sector is 45° wide and centered on its cardinal/diagonal, giving
// ~22° of tolerance around each direction.
//
// HYSTERESIS + RELEASE LOCKOUT: two-layer defense against unintended
// duplicate emits:
//
//   1. Magnitude hysteresis. Once committed to a non-neutral direction,
//      the function holds that direction until magnitude drops below
//      EXIT_DZ (0.6 * dz = 0.24). This catches threshold-band flicker
//      where a stick at the edge of the deadzone produces alternating
//      neutral/direction reads frame-to-frame.
//
//   2. Same-direction release lockout. After a direction releases to
//      neutral, the SAME direction is suppressed for RELEASE_LOCKOUT
//      frames (10 ≈ 167ms at 60Hz). This catches a real-world DualSense
//      symptom: pushing forward then releasing produced TWO `6` emits.
//      The cause is the thumb re-touching the stick briefly during the
//      lift-off — a physical event, not software. The lockout window
//      is chosen to swallow that bounce without blocking legitimate
//      fast inputs (most fighting-game double-taps are >150ms apart).
//      A DIFFERENT direction within the lockout window is still allowed
//      (e.g. 6 → release → 4 fires immediately, supporting fast
//      direction changes like dash cancels).
//
// State is module-scoped — there's only one stick polled at a time
// in this editor.
//
// Coordinate convention: browser Gamepad API y-axis is INVERTED relative
// to math convention — positive y means DOWN. atan2(y,x) returns angles
// in (-180°, 180°] which we normalize to [0°, 360°). So:
//   0°   = right (6)
//   90°  = down  (2)        (because +y is down)
//   180° = left  (4)
//   270° = up    (8)
let _axesNumpadCommittedDir = 5;
let _axesNumpadReleasedDir = 5;        // the direction we last released from
let _axesNumpadReleaseFrame = -9999;   // monotonic frame counter at release time
let _axesNumpadFrameCounter = 0;       // ticks each call — independent of game frame
const _AXES_RELEASE_LOCKOUT = 10;
function axesToNumpad(x, y, dz) {
  _axesNumpadFrameCounter++;
  const mag = Math.sqrt(x * x + y * y);
  const EXIT_DZ = dz * 0.6;   // 0.24 when dz = 0.4

  // Already at neutral → require magnitude > dz to commit to a direction.
  if (_axesNumpadCommittedDir === 5) {
    if (mag < dz) return 5;
    // fall through to angle classification + commit
  } else {
    // Currently committed to a direction → only release if magnitude
    // drops below the LOWER exit threshold. A brief spike above dz
    // while still above EXIT_DZ is treated as continuation of the
    // current direction, NOT a fresh commit.
    if (mag < EXIT_DZ) {
      _axesNumpadReleasedDir = _axesNumpadCommittedDir;
      _axesNumpadReleaseFrame = _axesNumpadFrameCounter;
      _axesNumpadCommittedDir = 5;
      return 5;
    }
    // Still held — but the player may have rolled to a new direction
    // (e.g. QCF 2→3→6). Fall through to re-classify by angle.
  }

  let ang = Math.atan2(y, x) * 180 / Math.PI;
  if (ang < 0) ang += 360;
  // 8-way sector lookup, 45° each, centered on the canonical direction:
  //   6 (right)      sector  337.5° – 22.5°   (wraps 360°)
  //   3 (down-right) sector   22.5° – 67.5°
  //   2 (down)       sector   67.5° – 112.5°
  //   1 (down-left)  sector  112.5° – 157.5°
  //   4 (left)       sector  157.5° – 202.5°
  //   7 (up-left)    sector  202.5° – 247.5°
  //   8 (up)         sector  247.5° – 292.5°
  //   9 (up-right)   sector  292.5° – 337.5°
  let newDir;
  if (ang < 22.5  || ang >= 337.5) newDir = 6;
  else if (ang < 67.5)  newDir = 3;
  else if (ang < 112.5) newDir = 2;
  else if (ang < 157.5) newDir = 1;
  else if (ang < 202.5) newDir = 4;
  else if (ang < 247.5) newDir = 7;
  else if (ang < 292.5) newDir = 8;
  else                  newDir = 9;

  // Release lockout: if we just released this same direction recently,
  // suppress the re-commit. The stick is treated as still at neutral
  // until either (a) the lockout window expires, or (b) a DIFFERENT
  // direction is pressed (which legitimately cancels the lockout).
  if (_axesNumpadCommittedDir === 5
      && newDir === _axesNumpadReleasedDir
      && (_axesNumpadFrameCounter - _axesNumpadReleaseFrame) < _AXES_RELEASE_LOCKOUT) {
    return 5;
  }
  // Any new commit (same dir after lockout, or different dir) clears
  // the released-dir tracking so it doesn't accidentally suppress a
  // future input.
  _axesNumpadReleasedDir = 5;
  _axesNumpadCommittedDir = newDir;
  return newDir;
}

// Read combined direction state from a gamepad given the saved mapping.
// Mapping records which axis indexes belong to the stick AND which
// button indexes belong to the D-pad (whichever the user pressed during
// calibration). We OR the two sources so D-pad and stick both work.
// Read combined direction state from a gamepad given the saved mapping.
// Uses axisDirs (per-direction index + sign) for stick input and dpad
// (per-direction button index) for D-pad input. OR's both sources so
// either control surface works.
//
// The per-direction sign approach handles arbitrary controller layouts:
// inverted Y axes, swapped X/Y, and PS5 hat-axis encodings (which use
// fractional values like ±0.43 for cardinals on a single axis) all
// just work as long as calibration captured each direction.
// Read direction state from a gamepad given the saved mapping.
//
// Two encoding styles for analog input must be handled:
//
// 1. Analog stick (most controllers): X axis swings -1..+1 for L/R,
//    Y axis swings -1..+1 for U/D. Each direction sits on its OWN axis
//    index, distinguished by sign. Calibration captures one (index, sign)
//    pair per direction — sign-based detection works perfectly.
//
// 2. Hat-axis (PS4-style D-pads — also produced by GP2040-CE in Panthera
//    or PS4 mode, real DualShocks, Razer Pantheras, etc.): all 8 D-pad
//    positions packed onto ONE axis index with distinct fractional
//    values, plus a far-from-zero "neutral" reading (often +3.29).
//    Sign-of-delta from neutral is the same for all four directions —
//    detection by sign collapses them. We have to detect by VALUE
//    proximity to what was captured during calibration.
//
// Strategy: if axisDirs entries include a `value` field (new format —
// captured at calibration time as the axis reading at the moment the
// direction was held), match by closest-distance to that value. If
// only the legacy { index, sign } form is present, fall back to the
// old sign-based path (which works fine for analog sticks).
function readDirection(gp, map) {
  let x = 0, y = 0;
  const dirs = map.axisDirs || {};

  // Detect whether axisDirs uses the new value-based format. If ANY of
  // the four directions has a `value` field, treat the whole thing as
  // value-based (mixed-mode profiles aren't a thing — calibration sets
  // them all together).
  const hasValueFormat = ['UP','DOWN','LEFT','RIGHT'].some(
    k => dirs[k] && typeof dirs[k].value === 'number'
  );

  if (hasValueFormat) {
    // Two physical input topologies share the value-format calibration:
    //
    //   1. Analog stick: each axis index hosts a continuous range
    //      [-1.0, +1.0]. UP and DOWN typically share axis 1 with values
    //      of opposite sign; LEFT and RIGHT share axis 0 the same way.
    //
    //   2. Hat axis (PS4-style D-pads, GP2040-CE Panthera mode, etc):
    //      ALL FOUR directions packed onto ONE axis with distinct
    //      fractional values, all on the same side of zero.
    //
    // The two need DIFFERENT detection strategies. Sticks want
    // "axis * sign > deadzone" (sign-based) — robust against any captured
    // calibration value as long as the sign is correct, which handles
    // under-pushed calibration (e.g. user captured DOWN at +0.47 but the
    // stick now reads +1.0). Hat axes need "|live - calVal| < tolerance"
    // (value-tolerance) because multiple directions sit on the same axis
    // distinguished only by their fractional value.
    //
    // Classify per-axis: group directions sharing an axis index, then
    // check if ALL grouped entries have the same sign. Same-sign group
    // on one axis → hat axis. Opposite-sign pair → analog stick.
    // Singleton (only one direction on the axis) → analog stick treatment
    // is safe (a single direction with sign-based gating).

    // Group entries by axis index so we evaluate each axis once.
    const byAxis = {};   // index -> [{dir, calVal, restVal, sign}]
    for (const dir of ['UP','DOWN','LEFT','RIGHT']) {
      const d = dirs[dir];
      if (!d || d.index == null || typeof d.value !== 'number') continue;
      if (!byAxis[d.index]) byAxis[d.index] = [];
      byAxis[d.index].push({
        dir,
        calVal: d.value,
        restVal: d.rest || 0,
        sign: d.sign || (d.value >= 0 ? 1 : -1),
      });
    }

    const VALUE_TOLERANCE = 0.30;   // ±0.30 covers diagonal hat positions

    for (const [axisIdxStr, entries] of Object.entries(byAxis)) {
      const axisIdx = Number(axisIdxStr);
      const live = gp.axes[axisIdx];
      if (live == null) continue;

      // Determine topology: are all entries on this axis on the same side
      // of zero (hat) or opposite sides (analog stick)?
      const signs = entries.map(e => e.sign);
      const allSameSign = signs.every(s => s === signs[0]);
      const isAnalogStick = !allSameSign;   // opposite signs → continuous range

      if (isAnalogStick) {
        // Sign-based detection: axis * sign > deadzone counts as held.
        // Accumulate the SIGNED MAGNITUDE so axesToNumpad sees a proper
        // polar coordinate, not a discretized ±1. This is what lets the
        // polar function do real angle math instead of operating on
        // pre-bucketed values (which loses all the corner information
        // needed for clean QCF/HCF detection).
        for (const e of entries) {
          const signedMag = live * e.sign;
          if (signedMag <= GP_DEADZONE) continue;   // not held in this direction
          // Add the analog magnitude to the appropriate output axis.
          // Don't clamp here — we want the real magnitude to reach the
          // polar function. Final clamp happens after all axes processed.
          if (e.dir === 'UP')    y -= signedMag;
          if (e.dir === 'DOWN')  y += signedMag;
          if (e.dir === 'LEFT')  x -= signedMag;
          if (e.dir === 'RIGHT') x += signedMag;
        }
      } else {
        // Hat axis: same-sign group → distinguish by VALUE proximity.
        // Skip if live reading is near rest (no direction held).
        const restVal = entries[0].restVal;
        if (Math.abs(live - restVal) < VALUE_TOLERANCE) continue;
        for (const e of entries) {
          if (Math.abs(live - e.calVal) < VALUE_TOLERANCE) {
            // Hat axes are inherently digital — use ±1 since there's
            // no meaningful magnitude information.
            if (e.dir === 'UP')    y -= 1;
            if (e.dir === 'DOWN')  y += 1;
            if (e.dir === 'LEFT')  x -= 1;
            if (e.dir === 'RIGHT') x += 1;
          }
        }
      }
    }
  } else {
    // Legacy sign-based detection — preserved for analog-stick profiles
    // calibrated before the value-format change. Works correctly when
    // each direction is on its own axis index.
    function axisActive(d) {
      if (!d || d.index == null || gp.axes[d.index] == null) return 0;
      const v = gp.axes[d.index] * (d.sign || 1);
      return v > GP_DEADZONE ? v : 0;
    }
    // Note: pass through analog magnitudes (axisActive returns the
    // signed magnitude, not just ±1), same as the analog-stick branch
    // above. This preserves polar information for axesToNumpad.
    const upMag    = axisActive(dirs.UP);
    const downMag  = axisActive(dirs.DOWN);
    const leftMag  = axisActive(dirs.LEFT);
    const rightMag = axisActive(dirs.RIGHT);
    if (upMag)    y -= upMag;
    if (downMag)  y += downMag;
    if (leftMag)  x -= leftMag;
    if (rightMag) x += rightMag;
  }

  // D-pad buttons (digital) — OR'd with axis input regardless of format.
  // D-pad is inherently digital so we add ±1 (not magnitude). Combining
  // with analog stick is safe: the final clamp caps total to ±1, and
  // a full D-pad press dominates a partial stick deflection — desired.
  if (map.dpad) {
    if (map.dpad.up    != null && gp.buttons[map.dpad.up]   ?.pressed) y -= 1;
    if (map.dpad.down  != null && gp.buttons[map.dpad.down] ?.pressed) y += 1;
    if (map.dpad.left  != null && gp.buttons[map.dpad.left] ?.pressed) x -= 1;
    if (map.dpad.right != null && gp.buttons[map.dpad.right]?.pressed) x += 1;
  }
  // Clamp combined input to [-1, 1]. Without this, an analog stick at
  // full deflection (magnitude 1) plus simultaneous D-pad (1) could
  // produce 2.0 on an axis, which axesToNumpad would still classify
  // correctly by angle but with inflated magnitude — harmless but odd.
  x = Math.max(-1, Math.min(1, x));
  y = Math.max(-1, Math.min(1, y));
  return axesToNumpad(x, y, GP_DEADZONE);
}

// Polling hook. Mounts a rAF loop that fires onToken() for each
// detected input. Buffers direction so attack-button-press emits
// motion+button as a single sequence (matching the editor's existing
// grammar where direction precedes button).
//
// Behavior:
//   - Direction held: tracked but does NOT emit on its own
//   - Attack pressed: queues for COMBO_WINDOW frames; if a paired
//     button arrives in that window, emit DI (HP+HK) or DR (MP+MK)
//     instead of the individual buttons
//   - Direction tap (press + release within ~20 frames with no
//     attack): emits direction token alone
// Press-to-capture: polls connected gamepads and resolves the first
// button or directional input pressed into a calibrated label
// (e.g. "LP", "MK", "LEFT") using the profile's saved calibration.
//
// We don't gate on "is this profile's controller live?" — the user
// already configured the profile in Windows / their game, so the
// calibration is the source of truth. We poll EVERY connected pad
// and try to match through the profile's calibration. If they
// pressed a button matching one of the calibrated labels, capture.
//
// Usage:
//   const cap = useGamepadCapture(profile);
//   <button onClick={() => cap.start(label => setX(label))}>
//     {cap.capturing ? 'Press any button…' : 'Bind'}
//   </button>
//
// The callback fires exactly once per `start()` call. start() during
// an existing capture cancels it before re-arming. cancel() bails
// out (no callback fires).
function useGamepadCapture(profile) {
  const [capturing, setCapturing] = useState(false);
  const callbackRef = useRef(null);
  const profileRef  = useRef(profile);
  useEffect(() => { profileRef.current = profile; }, [profile]);

  // Snapshot of currently-held inputs at the moment capture starts.
  // We only emit on rising-edge transitions AFTER this snapshot, so
  // "I'm already holding the modifier when I click bind" doesn't
  // immediately fire.
  const initialStateRef = useRef(null);

  useEffect(() => {
    if (!capturing) return;
    let raf = 0;

    function tick() {
      raf = requestAnimationFrame(tick);
      const p = profileRef.current;
      if (!p) return;
      const pads = navigator.getGamepads ? navigator.getGamepads() : [];
      // Walk all connected pads and read state through this profile's
      // calibration. We don't require the deviceId to match — the user
      // told us "this profile is the one I want to configure," so we
      // trust them and just listen on any pad. If they happen to have
      // multiple controllers connected, the first to register a press
      // wins; in practice nearly every user has exactly one.
      const cur = {};
      const buttons = p.buttons || {};
      const dpad    = p.dpad    || {};
      const axisDirs = p.axisDirs || {};
      const DPAD_LABELS = { up: 'UP', down: 'DOWN', left: 'LEFT', right: 'RIGHT' };

      for (const gp of pads) {
        if (!gp) continue;
        // Attack buttons via calibrated indices
        for (const label of Object.keys(buttons)) {
          const idx = buttons[label];
          if (typeof idx !== 'number') continue;
          if (gp.buttons[idx] && gp.buttons[idx].pressed) cur[label] = true;
        }
        // D-pad (digital)
        for (const k of Object.keys(dpad)) {
          const idx = dpad[k];
          if (typeof idx !== 'number') continue;
          if (gp.buttons[idx] && gp.buttons[idx].pressed) {
            cur[DPAD_LABELS[k] || k.toUpperCase()] = true;
          }
        }
        // Axis directions: prefer value-based matching (hat-axis safe),
        // fall back to legacy sign-based for older profiles. Same logic
        // as readDirection — see comment there.
        const hasValueFormat = ['UP','DOWN','LEFT','RIGHT'].some(
          k => axisDirs[k] && typeof axisDirs[k].value === 'number'
        );
        if (hasValueFormat) {
          const VALUE_TOLERANCE = 0.30;
          for (const dir of ['UP','DOWN','LEFT','RIGHT']) {
            const d = axisDirs[dir];
            if (!d || d.index == null || typeof d.value !== 'number') continue;
            const live = gp.axes[d.index];
            if (live == null) continue;
            if (Math.abs(live - d.value) < VALUE_TOLERANCE) cur[dir] = true;
          }
        } else {
          for (const dir of ['UP','DOWN','LEFT','RIGHT']) {
            const d = axisDirs[dir];
            if (!d || d.index == null) continue;
            const v = (gp.axes[d.index] || 0) * (d.sign || 1);
            if (v > GP_DEADZONE) cur[dir] = true;
          }
        }
      }

      // First frame after start: snapshot what's currently held so we
      // ignore those inputs as "already pressed" — only NEW presses count.
      if (initialStateRef.current === null) {
        initialStateRef.current = { ...cur };
        return;
      }
      // Look for any label that wasn't pressed in the snapshot but IS now.
      const init = initialStateRef.current;
      for (const label of Object.keys(cur)) {
        if (cur[label] && !init[label]) {
          const cb = callbackRef.current;
          callbackRef.current = null;
          initialStateRef.current = null;
          setCapturing(false);
          if (cb) cb(label);
          return;
        }
      }
    }
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [capturing]);

  return {
    capturing,
    start: (cb) => {
      callbackRef.current = cb || null;
      initialStateRef.current = null;
      setCapturing(true);
    },
    cancel: () => {
      callbackRef.current = null;
      initialStateRef.current = null;
      setCapturing(false);
    },
  };
}


// Two factories that produce objects implementing the input-source
// contract consumed by useGamepadInput's polling loop:
//
//   source.refresh(map)            — called once per frame; returns
//                                    false to skip the frame.
//   source.getRawDirection(map)    — numpad 1-9 from current state.
//   source.isLabelPressed(map, lbl)— true if the calibrated button
//                                    bound to `lbl` is held.
//   source.isShiftHeld(map)        — true if the SHIFT modifier
//                                    (hotkeys.modifier_*) is held.
//
// The state machine in useGamepadInput doesn't care which factory
// produced the source — it asks the same questions either way. The
// factory selection happens once per useEffect mount based on the
// active mapping's `type` field; switching the active profile
// re-runs the effect and rebuilds the source from scratch.

// Gamepad source: reads from navigator.getGamepads() each frame.
// `map.buttons[label]` is expected to be a numeric gamepad button
// index. `map.axisDirs` / `map.dpad` carry the stick calibration
// consumed by readDirection().
function createGamepadSource() {
  let gp = null;
  return {
    type: 'gamepad',
    refresh(map) {
      const pads = navigator.getGamepads ? navigator.getGamepads() : [];
      gp = pads[map.padIndex || 0];
      return !!gp;
    },
    getRawDirection(map) {
      return readDirection(gp, map);
    },
    isLabelPressed(map, label) {
      const idx = map.buttons?.[label];
      if (typeof idx !== 'number') return false;
      return !!gp?.buttons?.[idx]?.pressed;
    },
    isShiftHeld(map) {
      const hk = map.hotkeys || {};
      if (typeof hk.modifier_index === 'number' && hk.modifier_index >= 0) {
        return !!gp?.buttons?.[hk.modifier_index]?.pressed;
      }
      if (hk.modifier_axis && typeof hk.modifier_axis.index === 'number') {
        const axVal = gp?.axes?.[hk.modifier_axis.index] || 0;
        const sign = hk.modifier_axis.sign || 1;
        return (axVal * sign) > GP_DEADZONE;
      }
      return false;
    },
    cleanup() { /* no-op for gamepad */ },
  };
}

// Keyboard source: reads from a global keysHeld map maintained by
// keydown/keyup listeners. Profile shape: `map.keys[label]` is a
// KeyboardEvent.code string ('KeyJ', 'ArrowUp', 'ShiftLeft', etc).
// Direction comes from `map.dirKeys` mapping UP/DOWN/LEFT/RIGHT →
// code strings; SHIFT modifier comes from `map.hotkeys.modifier_key`.
//
// Text-field gate: if document.activeElement is an editable element
// (input, textarea, contenteditable) we suspend the entire source
// for that frame — refresh() returns false. This way typing in slot
// titles, search boxes, etc. doesn't fire phantom fight tokens.
//
// preventDefault: we DO call preventDefault on consumed fight keys
// (J/K/L/U/I/O/W/A/S/D/Arrow keys/Shift) while NOT in a text field
// and while the editor page is the focus context. Without this, the
// browser's own keypress handling (e.g. tabbing focus on Tab, scrolling
// on space/arrow) would interfere. We don't preventDefault inside
// text fields so typing works normally there.
function createKeyboardSource() {
  // Set of currently held key codes. Populated by keydown listener
  // (after de-dup against repeat fires), cleared by keyup.
  const held = new Set();
  // The set of codes considered "fight inputs" for this profile —
  // populated each frame from the current mapping. Used by the
  // event handler to decide whether to preventDefault.
  let consumedCodes = new Set();
  // Whether the page currently has a text-input focused. Computed
  // each refresh; the event handler reads this to skip preventDefault
  // when typing.
  let textFieldFocused = false;

  function isTextFieldActive() {
    if (typeof document === 'undefined') return false;
    const el = document.activeElement;
    if (!el) return false;
    const tag = el.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return true;
    if (el.isContentEditable) return true;
    return false;
  }

  // Handlers must persist across refresh() calls so we can detach
  // them in cleanup(). React StrictMode double-invokes useEffect
  // mount/unmount in dev, so a missing cleanup leaks listeners.
  const onKeyDown = (e) => {
    // Ignore auto-repeat fires — we only want true presses; the
    // poll loop handles "held" naturally via the persistent set.
    if (e.repeat) return;
    held.add(e.code);
    if (consumedCodes.has(e.code) && !textFieldFocused) {
      e.preventDefault();
    }
  };
  const onKeyUp = (e) => {
    held.delete(e.code);
    if (consumedCodes.has(e.code) && !textFieldFocused) {
      e.preventDefault();
    }
  };
  // Lose focus → clear held set so a key stuck-down at blur time
  // doesn't appear permanently held when focus returns. Mirrors
  // the gamepad path's focus-blur reset.
  const onBlur = () => { held.clear(); };

  if (typeof window !== 'undefined') {
    window.addEventListener('keydown', onKeyDown);
    window.addEventListener('keyup', onKeyUp);
    window.addEventListener('blur', onBlur);
  }

  return {
    type: 'keyboard',
    refresh(map) {
      // Rebuild the consumed-codes set from the current map so
      // preventDefault stays in sync with calibration changes.
      consumedCodes = new Set();
      const keys = map.keys || {};
      for (const k in keys) if (keys[k]) consumedCodes.add(keys[k]);
      const dirKeys = map.dirKeys || {};
      for (const k in dirKeys) if (dirKeys[k]) consumedCodes.add(dirKeys[k]);
      const hk = map.hotkeys || {};
      if (hk.modifier_key) consumedCodes.add(hk.modifier_key);
      textFieldFocused = isTextFieldActive();
      // Suspend everything when a text field has focus — typing
      // shouldn't fire fight tokens.
      if (textFieldFocused) return false;
      return true;
    },
    getRawDirection(map) {
      const dk = map.dirKeys || {};
      const up    = !!(dk.UP    && held.has(dk.UP));
      const down  = !!(dk.DOWN  && held.has(dk.DOWN));
      const left  = !!(dk.LEFT  && held.has(dk.LEFT));
      const right = !!(dk.RIGHT && held.has(dk.RIGHT));
      // Numpad: 7 8 9 / 4 5 6 / 1 2 3
      if (up    && left)  return 7;
      if (up    && right) return 9;
      if (down  && left)  return 1;
      if (down  && right) return 3;
      if (up)             return 8;
      if (down)           return 2;
      if (left)           return 4;
      if (right)          return 6;
      return 5;  // neutral
    },
    isLabelPressed(map, label) {
      const code = map.keys?.[label];
      if (typeof code !== 'string') return false;
      return held.has(code);
    },
    isShiftHeld(map) {
      const hk = map.hotkeys || {};
      const code = hk.modifier_key;
      if (typeof code !== 'string') return false;
      return held.has(code);
    },
    cleanup() {
      if (typeof window !== 'undefined') {
        window.removeEventListener('keydown', onKeyDown);
        window.removeEventListener('keyup', onKeyUp);
        window.removeEventListener('blur', onBlur);
      }
      held.clear();
    },
  };
}

function useGamepadInput(onToken, onAction, mapping, enabled, onCollapseMotion, getControlScheme) {
  const COMBO_WINDOW = 3;   // frames to wait for a paired button before emitting solo
  const stateRef = useRef({
    lastDir: 5,                 // numpad direction emitted last frame (5 = neutral)
    btnEdge: {},                // last pressed state per button index
    pendingBtn: null,           // { label, frame } awaiting combo partner
    // Direction transition buffer for motion detection. Mirrors the
    // SF6_Overlay.lua dir_buffer: append on every direction transition
    // (including transitions to/from neutral 5), capped at 60 entries.
    // Each entry: { dir: 1-9, frame: monotonic counter }.
    dirBuffer: [],
    // Charge motion state. SF6's [4]6 and [2]8 require holding back/down
    // for ~45 frames before transitioning forward/up. dir_buffer's
    // recency-windowed sequence matcher can't represent this — a sustained
    // hold doesn't appear as a transition. So we track charge separately.
    //   chargeStart: { dir, frame } when 4 or 2 is currently being held.
    //   chargeReady: { motion, releaseFrame } once a valid charge has been
    //                released into 6 (for [4]6) or 8 (for [2]8). Consumed
    //                by the next attack press within CHARGE_RELEASE_WINDOW.
    chargeStart: null,
    chargeReady: null,
  });
  // Refs used so the rAF loop sees current values without re-binding
  const onTokenRef = useRef(onToken);
  const onActionRef = useRef(onAction);
  const onCollapseMotionRef = useRef(onCollapseMotion);
  const mappingRef = useRef(mapping);
  const enabledRef = useRef(enabled);
  // Per-character control scheme getter. Returns 'classic' or 'modern'.
  // Read every frame inside the loop so flipping the toggle on the
  // character page takes effect immediately without re-binding.
  const getControlSchemeRef = useRef(getControlScheme);
  // Focus gate: pause polling whenever the browser window/tab loses
  // focus or visibility. Without this, leverless/keyboard input fires
  // through to the editor while the user is in another app (e.g. SF6
  // itself), recording every press they make in the actual game.
  // Tracks two signals because they cover different cases:
  //   - 'focus'/'blur': window lost focus to another app (game,
  //     another browser, alt-tab) — fires even while the tab is visible.
  //   - 'visibilitychange': tab itself was hidden (different tab, minimized).
  // Initialized using both so reload-while-unfocused doesn't miss the state.
  const focusedRef = useRef(
    typeof document !== 'undefined' &&
    document.hasFocus() && !document.hidden
  );
  useEffect(() => { onTokenRef.current = onToken; }, [onToken]);
  useEffect(() => { onActionRef.current = onAction; }, [onAction]);
  useEffect(() => { onCollapseMotionRef.current = onCollapseMotion; }, [onCollapseMotion]);
  useEffect(() => { mappingRef.current = mapping; }, [mapping]);
  useEffect(() => { enabledRef.current = enabled; }, [enabled]);
  useEffect(() => { getControlSchemeRef.current = getControlScheme; }, [getControlScheme]);

  // Wire focus/visibility listeners. Also reset transient input state on
  // focus loss so a held button doesn't "stick" — when focus returns,
  // the next press registers as a fresh transition rather than a repeat.
  useEffect(() => {
    const update = () => {
      const f = document.hasFocus() && !document.hidden;
      if (!f && focusedRef.current) {
        // Just lost focus — clear in-flight state so we don't emit
        // a phantom token when focus returns.
        stateRef.current.lastDir = 5;
        stateRef.current.btnEdge = {};
        stateRef.current.pendingBtn = null;
        stateRef.current.dirBuffer = [];
        stateRef.current.chargeStart = null;
        stateRef.current.chargeReady = null;
      }
      focusedRef.current = f;
    };
    window.addEventListener('focus', update);
    window.addEventListener('blur', update);
    document.addEventListener('visibilitychange', update);
    return () => {
      window.removeEventListener('focus', update);
      window.removeEventListener('blur', update);
      document.removeEventListener('visibilitychange', update);
    };
  }, []);

  useEffect(() => {
    let raf = 0;
    let frame = 0;
    // Attack button labels — searched against the active profile's
    // calibrated map.buttons. Per-scheme:
    //   Classic profiles bind LP/MP/HP/LK/MK/HK (the Classic palette
    //   labels match the calibration step labels exactly).
    //   Modern profiles bind LIGHT/MEDIUM/HARD/SP/AUTO/THROW/DI/DP
    //   from GP_CALIBRATION_STEPS_MODERN. Note these are the
    //   *calibration* labels — the on-screen palette uses shorter
    //   display labels (L/M/H/Auto/Throw). MODERN_EMIT_LABEL maps
    //   from calibration label → emission label so tokens line up
    //   with the palette's BTN_COLORS / glyph rendering.
    const ATTACK_BUTTONS_CLASSIC = ['LP','MP','HP','LK','MK','HK'];
    const ATTACK_BUTTONS_MODERN  = ['LIGHT','MEDIUM','HARD','SP','AUTO','THROW','DI','DP'];
    // Translation table: profile-calibration label → on-screen palette
    // label. Only the Modern long-form labels need shrinking; the
    // others are emitted as-is.
    const MODERN_EMIT_LABEL = {
      LIGHT:  'L',
      MEDIUM: 'M',
      HARD:   'H',
      AUTO:   'Auto',
      THROW:  'Throw',
      // SP / DI / DP pass through unchanged.
    };
    const UTILITY_BUTTONS = ['BACKSPACE','CLEAR'];   // editor-only actions; fire on press, no combo window
    // Pairs that emit a combined token instead of two separate buttons.
    // Classic-only — Modern profiles bind DI and DP as single buttons,
    // so Modern uses an empty pair table (no two-button shortcuts).
    // The COMBO_WINDOW frame delay is also scheme-aware: Modern presses
    // emit immediately since there's no pair to wait for.
    const COMBO_PAIRS_CLASSIC = {
      'HP+HK': 'DI',   // Drive Impact
      'HK+HP': 'DI',
      'MP+MK': 'DR',   // Drive Parry / Drive Rush input
      'MK+MP': 'DR',
    };
    const COMBO_PAIRS_MODERN = {};
    // Charge motion timing. CHARGE_HOLD = required dwell on back (4)
    // or down (2) before the charge becomes valid. CHARGE_RELEASE_WINDOW
    // = how long after releasing into forward/up the charge stays
    // armed for an attack press to consume it. SF6's actual values
    // are around 45F hold and ~13-15F release; using the middle of
    // those ranges since the editor is forgiving.
    const CHARGE_HOLD = 45;
    const CHARGE_RELEASE_WINDOW = 15;

    // emitButton: direction emits on its own when held, so button
    // presses don't need to flush any buffered direction state.
    //
    // If a motion (236/214/623/etc.) was captured at PRESS time —
    // detected by walking the dirBuffer with the right-facing matchers
    // ported from SF6_Overlay.lua — the trailing direction tokens are
    // collapsed into a single motion token via onCollapseMotion. The
    // matched span's emitted-direction count is passed so the slot's
    // tail can be popped atomically. DI/DR (multi-button combo emits)
    // skip motion detection — they're not attached to motions.
    //
    // pendingEntry: optional { motion: {name, startIdx} | null,
    //                          emittedCount: number }. When present,
    // these are used directly (snapshot from press time). Without it
    // (DI/DR auto-emit path), motion detection is skipped.
    // System buttons that bypass motion-collapse — they emit a literal
    // token and clear any pending motion window because they're not
    // motion-attachable. Includes BOTH the calibration label form and
    // the on-screen display form, since the gamepad poller calls
    // emitButton with calibration labels (THROW, AUTO) but the
    // COMBO_PAIRS table emits using shortened labels (DI, DR).
    // Classic: DI (HP+HK pair) and DR (MP+MK pair).
    // Modern: DI/DP single-button system actions; THROW/AUTO non-motion attacks.
    // SP keeps the motion path since 236+SP / 214+SP / 623+SP are
    // valid Modern specials.
    const SYSTEM_BUTTONS = new Set([
      'DI', 'DR', 'DP',
      'THROW', 'Throw',
      'AUTO',  'Auto',
    ]);
    // Translate a label from its calibration form to the on-screen
    // emission form. Most labels pass through; only Modern's long
    // form labels (LIGHT/MEDIUM/HARD/AUTO/THROW) need shrinking so
    // they line up with the palette buttons and the BTN_COLORS map.
    const emitLabelOf = (label) => MODERN_EMIT_LABEL[label] || label;
    const emitButton = (st, label, pendingEntry) => {
      if (SYSTEM_BUTTONS.has(label)) {
        onTokenRef.current({ t: 'btn', v: emitLabelOf(label) });
        // System buttons consume any pending motion window — clear
        // dirBuffer so the next attack doesn't re-match the directions
        // that happened to come before this press.
        st.dirBuffer = [];
        return;
      }
      // Translate the label before building the token so motion
      // collapse and plain emission both write the on-screen form.
      const emitLabel = emitLabelOf(label);
      const attackTok = tokenForCell(emitLabel, 'attack', 0);
      const m = pendingEntry && pendingEntry.motion;
      const emittedCount = pendingEntry ? (pendingEntry.emittedCount || 0) : 0;
      if (m && emittedCount > 0) {
        const motionTok = tokenForCell(m.name, 'motion');
        const collapse = onCollapseMotionRef.current;
        const ok = collapse && collapse(emittedCount, motionTok, attackTok);
        if (typeof window !== 'undefined' && window.__SF6_GP_DEBUG) {
          console.log('[GP] emit', emitLabel, '(cal:', label + ')', 'motion', m.name, 'emittedCount', emittedCount, 'collapseOk', ok, 'collapseFn?', !!collapse);
        }
        if (ok) {
          // Successful collapse — clear dirBuffer so the next
          // button press starts fresh and doesn't rematch the same
          // directions for a different button.
          st.dirBuffer = [];
          return;
        }
        // collapse returned false (tail didn't match expected dir
        // tokens — user inserted a non-dir token mid-stream via
        // the on-screen palette). Fall through to plain emission.
      }
      onTokenRef.current(attackTok);
    };

    // ── INPUT SOURCE ABSTRACTION ─────────────────────────────
    // Select the right factory for the mapping's type. The factories
    // live at module scope (createGamepadSource / createKeyboardSource
    // above). Each implements:
    //
    //   refresh(map)            — per-frame init, returns false to skip frame
    //   getRawDirection(map)    — numpad 1-9
    //   isLabelPressed(map, l)  — fight-button held check (label-driven)
    //   isShiftHeld(map)        — SHIFT modifier held check
    //   cleanup()               — detach event listeners (keyboard only)
    //
    // The map's `type` field decides which factory to use:
    //   undefined / 'gamepad' → createGamepadSource (back-compat default)
    //   'keyboard'            → createKeyboardSource
    //
    // useEffect's dependency array includes `mapping?.type` so a
    // user switching from a gamepad profile to a keyboard profile
    // re-runs the effect and rebuilds the source with the correct
    // factory. The keyboard source also gets its listeners detached
    // via cleanup() on unmount.
    const sourceType = mapping?.type === 'keyboard' ? 'keyboard' : 'gamepad';
    const source = sourceType === 'keyboard'
      ? createKeyboardSource()
      : createGamepadSource();

    function tick() {
      raf = requestAnimationFrame(tick);
      frame++;
      if (!enabledRef.current) return;
      // Skip polling entirely when the browser is unfocused or the tab
      // is hidden — prevents recording inputs while the user is in
      // another app (e.g. playing SF6 itself).
      if (!focusedRef.current) return;
      const map = mappingRef.current;
      if (!map) return;
      // Refresh the input source for this frame. If it returns false
      // (gamepad not connected, etc.), abort — nothing to read.
      if (!source.refresh(map)) return;

      // Resolve which button set + combo pairs to use this frame.
      // Pulled from the active CombosTab via the gamepad context —
      // the tab reads the character's notes.json control_scheme and
      // exposes it through getControlScheme(). Falls back to classic
      // when no tab is mounted (idle on roster page) or when the
      // getter returns nothing.
      const getCs = getControlSchemeRef.current;
      const scheme = (getCs && getCs()) === 'modern' ? 'modern' : 'classic';
      const ATTACK_BUTTONS = scheme === 'modern' ? ATTACK_BUTTONS_MODERN : ATTACK_BUTTONS_CLASSIC;
      const COMBO_PAIRS    = scheme === 'modern' ? COMBO_PAIRS_MODERN    : COMBO_PAIRS_CLASSIC;

      // Resolve the actual button/direction maps for this frame's
      // scheme. The profile root holds Classic by default (root
      // fields are mirrored from the Classic calibration on save).
      // For Modern, overlay the profile's `calibrations.modern`
      // mapping so the poller scans for LIGHT/MEDIUM/HARD/etc. instead
      // of LP/MP/HP/etc., and reads the Modern-calibrated D-pad/stick
      // layout (which may be physically the same as Classic, but is
      // captured under its own calibration).
      //
      // Build a per-frame `mapForScan` that has the right button/
      // direction keys. Falls back to root if the per-scheme record
      // doesn't exist (e.g. user has only Classic calibrated but the
      // character is set to Modern — they get nothing matched until
      // they calibrate Modern, which is the correct UX).
      let mapForScan = map;
      if (scheme === 'modern') {
        const mc = map.calibrations && map.calibrations.modern;
        if (mc && mc.buttons) {
          mapForScan = {
            ...map,
            buttons:  mc.buttons,
            dpad:     mc.dpad     || map.dpad     || {},
            axisDirs: mc.axisDirs || map.axisDirs || {},
          };
        }
        // If no Modern calibration exists, fall through with root —
        // the scan won't match Modern labels and emissions will be
        // silent. Better than crashing or emitting Classic tokens
        // under a Modern character.
      }

      const st = stateRef.current;
      const dir = source.getRawDirection(mapForScan);

      // Direction emits on TRANSITION: neutral→direction or direction→different
      // direction. Held directions don't repeat. Releasing to neutral doesn't
      // emit (but resets state so the next press registers cleanly).
      // This is the natural model for an editor: each distinct direction the
      // user pushes appears once in the combo sequence.
      //
      // Every transition (INCLUDING transitions to/from neutral) is also
      // appended to st.dirBuffer for motion detection — the matchers
      // walk this buffer when an attack button rises, looking for
      // QCF/QCB/DP/HCF/HCB sequences ending within the recency window.
      // Neutral entries are kept in the buffer but never emitted as
      // tokens; this matches the SF6_Overlay.lua implementation.
      if (st.lastDir == null) st.lastDir = 5;
      if (dir !== st.lastDir) {
        // Append to dirBuffer (capped at 60 entries — same as Lua).
        st.dirBuffer.push({ dir, frame });
        if (st.dirBuffer.length > 60) st.dirBuffer.shift();
        if (typeof window !== 'undefined' && window.__SF6_GP_DEBUG) {
          console.log('[GP] dir transition', st.lastDir, '→', dir, 'frame', frame, 'buffer', st.dirBuffer.map(e => e.dir).join(','));
        }

        // ── Charge tracking ────────────────────────────────────
        // Update on every transition. Cases:
        //   1. Started holding 4 (back) or 2 (down): begin charge timer.
        //      Going from a non-4 to 4 (or non-2 to 2) resets the timer
        //      even if we were already charging — this models real-stick
        //      behaviour where a brief release breaks the charge.
        //   2. Brief neutral (5) during a charge: don't cancel. Analog
        //      sticks routinely pass through 5 between 4 and 6. We keep
        //      chargeStart alive; the eventual release into 6/8 still
        //      checks the timer against the original 4/2 frame.
        //   3. Released into 6 (after holding 4) or 8 (after holding 2)
        //      with sufficient dwell: arm chargeReady, consumed by the
        //      next attack press within CHARGE_RELEASE_WINDOW frames.
        //   4. Any other transition cancels both chargeStart and
        //      chargeReady. This is intentional: transitioning from 4
        //      to 1 (down-back) doesn't extend the charge — the input
        //      went through a different cardinal first.
        if (dir === 4 || dir === 2) {
          st.chargeStart = { dir, frame };
        } else if (dir === 5 && st.chargeStart) {
          // Pass-through neutral: keep chargeStart, don't reset.
          // (No-op — chargeStart untouched.)
        } else if (dir === 6 && st.chargeStart && st.chargeStart.dir === 4
                   && (frame - st.chargeStart.frame) >= CHARGE_HOLD) {
          st.chargeReady = { motion: '[4]6', releaseFrame: frame };
          st.chargeStart = null;
          if (typeof window !== 'undefined' && window.__SF6_GP_DEBUG) {
            console.log('[GP] charge READY [4]6, held', frame - (st.chargeReady.releaseFrame - CHARGE_HOLD), 'frames+');
          }
        } else if (dir === 8 && st.chargeStart && st.chargeStart.dir === 2
                   && (frame - st.chargeStart.frame) >= CHARGE_HOLD) {
          st.chargeReady = { motion: '[2]8', releaseFrame: frame };
          st.chargeStart = null;
          if (typeof window !== 'undefined' && window.__SF6_GP_DEBUG) {
            console.log('[GP] charge READY [2]8');
          }
        } else {
          // Any other transition — cancel charge progress.
          st.chargeStart = null;
        }

        if (dir !== 5) {
          // Emit the new direction immediately
          onTokenRef.current(tokenForCell(String(dir), 'numpad'));
        }
        st.lastDir = dir;
      }
      // (pendingDir / dirHeldFrames from the old grammar are no longer used —
      // direction is now emitted directly rather than buffered for an attack.)

      // ── SHIFT modifier state ─────────────────────────────────
      // Read whether the user-defined SHIFT button is currently held.
      // Shift can be either a raw button index OR an axis (rare —
      // some sticks expose paddles as positive-only axes). When held,
      // attack-button rising edges are intercepted: instead of emitting
      // the attack token, we look up the bound action in
      // mapping.hotkeys.bindings and dispatch via onAction. This also
      // suppresses the COMBO_PAIRS pairing window so SHIFT+HP doesn't
      // get queued waiting for a partner.
      const hk = map.hotkeys || {};
      // Pick which binding set to use based on the active scheme.
      // Classic stays on the legacy `bindings` key (back-compat);
      // Modern reads from `bindings_modern`. Falls through to empty
      // object if the profile predates the per-scheme split.
      const bindings = scheme === 'modern'
        ? (hk.bindings_modern || {})
        : (hk.bindings || {});
      // SHIFT held check. Delegates to the source so the gamepad
      // path can inspect button + axis configs and the keyboard
      // path can check its modifier_key code.
      const shiftHeld = source.isShiftHeld(mapForScan);
      // Invert bindings: { sep: 'LP', xx: 'MP', ... } → { LP: 'sep', MP: 'xx', ... }
      // Built every frame because it's a handful of entries — cheaper
      // than refs/memos. Modern profiles use calibration labels here
      // (LIGHT/MEDIUM/HARD/...), Classic uses LP/MP/HP/... — matches
      // what pressedThisFrame produces from ATTACK_BUTTONS_*.
      const labelToAction = {};
      for (const action of Object.keys(bindings)) {
        const lbl = bindings[action];
        if (lbl) labelToAction[lbl] = action;
      }

      // Utility buttons (BACKSPACE / CLEAR) — editor actions, not part
      // of the combo grammar. Fire on rising edge only; don't pass
      // through the combo window since they have no partner.
      // After firing, reset the hook's emission tracking (lastDir,
      // pendingBtn). Reason: BACKSPACE/CLEAR mutates the slot
      // independently of the gamepad's internal state. If the user
      // was still holding a direction when they pressed BACKSPACE,
      // the just-popped direction token is gone from the slot, but
      // st.lastDir still reads "I already emitted that". The next
      // frame would skip emission because dir === lastDir, leaving
      // the held direction unrepresented in the slot. Resetting
      // lastDir to 5 forces a re-emit on the next non-neutral read.
      for (const label of UTILITY_BUTTONS) {
        // source-agnostic check: gamepad source looks up
        // map.buttons[label] internally; keyboard source looks
        // up map.keys[label].
        const pressed = source.isLabelPressed(mapForScan, label);
        const wasPressed = !!st.btnEdge[label];
        if (pressed && !wasPressed) {
          const fn = onActionRef.current;
          if (fn) fn(label === 'BACKSPACE' ? 'pop' : 'clear');
          // Resync hook state with the now-mutated slot
          st.lastDir = 5;
          st.pendingBtn = null;
        }
        st.btnEdge[label] = pressed;
      }

      // Detect button rising edges this frame
      const pressedThisFrame = [];
      for (const label of ATTACK_BUTTONS) {
        const pressed = source.isLabelPressed(mapForScan, label);
        const wasPressed = !!st.btnEdge[label];
        if (pressed && !wasPressed) pressedThisFrame.push(label);
        st.btnEdge[label] = pressed;
      }

      // SHIFT-modified path: each rising-edge attack button maps to a
      // hotkey action (sep, xx, undo, backspace, clear) via the user's
      // bindings. Fire the action and DON'T fall through to the
      // combo-pair window. If the held attack button isn't bound, do
      // nothing — silent, predictable.
      if (shiftHeld && pressedThisFrame.length) {
        const fn = onActionRef.current;
        for (const label of pressedThisFrame) {
          const action = labelToAction[label];
          if (action && fn) fn(action);
        }
        // Flush any pending non-shifted button so it doesn't get
        // wrongly paired with a future press across the modifier.
        if (st.pendingBtn) {
          emitButton(st, st.pendingBtn.label, st.pendingBtn);
          st.pendingBtn = null;
        }
        // Resync direction state — same rationale as BACKSPACE/CLEAR.
        // The slot was just mutated by an action insert/undo/clear, so
        // the next held direction needs to re-emit cleanly.
        st.lastDir = 5;
        // Skip the combo-pair processing block below for this frame.
        return;
      }

      // Process new presses
      for (const label of pressedThisFrame) {
        // Capture motion at PRESS time (not emit time). The combo-pair
        // window delays emit by COMBO_WINDOW frames; by the time the
        // pending button flushes, the matcher's staleness check
        // (last.frame within 3 frames of current) will reject the
        // motion. Snapshot it now while it's fresh.
        //
        // Charge motions take priority over sequence motions: if the
        // user held back for 45F+ and released into forward within the
        // release window, that's unambiguous intent — even if the
        // recent dirBuffer would also satisfy a 236 match.
        let motionSnap = null;
        let emittedSnap = 0;
        if (st.chargeReady && (frame - st.chargeReady.releaseFrame) <= CHARGE_RELEASE_WINDOW) {
          // Charge consumed. emittedSnap = 2: the 4 (or 2) and the 6
          // (or 8) tokens that were emitted as the user held and
          // released. replaceTrailingDirs will pop those two.
          motionSnap = { name: st.chargeReady.motion, startIdx: -1 /* not used for charge */ };
          emittedSnap = 2;
          st.chargeReady = null;
        } else {
          // Stale charge — clear it so it doesn't fire on a much later press.
          if (st.chargeReady && (frame - st.chargeReady.releaseFrame) > CHARGE_RELEASE_WINDOW) {
            st.chargeReady = null;
          }
          motionSnap = detectMotion(st.dirBuffer, frame);
          if (motionSnap) {
            for (let i = motionSnap.startIdx; i < st.dirBuffer.length; i++) {
              if (st.dirBuffer[i].dir !== 5) emittedSnap++;
            }
          }
        }
        if (typeof window !== 'undefined' && window.__SF6_GP_DEBUG) {
          console.log('[GP] press', label, 'frame', frame,
            'buffer', st.dirBuffer.map(e => e.dir).join(','),
            'motion', motionSnap ? motionSnap.name : 'none',
            'emittedCount', emittedSnap);
        }
        if (st.pendingBtn) {
          // Check if this completes a combo
          const key = st.pendingBtn.label + '+' + label;
          if (COMBO_PAIRS[key]) {
            emitButton(st, COMBO_PAIRS[key]);
            st.pendingBtn = null;
            continue;
          }
          // Not a combo — flush the pending button first, then queue this one
          emitButton(st, st.pendingBtn.label, st.pendingBtn);
          st.pendingBtn = { label, frame, motion: motionSnap, emittedCount: emittedSnap };
        } else {
          // First press of a potential combo — wait COMBO_WINDOW frames
          st.pendingBtn = { label, frame, motion: motionSnap, emittedCount: emittedSnap };
        }
      }

      // Time out the pending button if no partner arrived
      if (st.pendingBtn && (frame - st.pendingBtn.frame) >= COMBO_WINDOW) {
        emitButton(st, st.pendingBtn.label, st.pendingBtn);
        st.pendingBtn = null;
      }
    }
    raf = requestAnimationFrame(tick);
    return () => {
      cancelAnimationFrame(raf);
      // Detach source listeners. The keyboard source attached
      // window-level keydown/keyup/blur handlers; the gamepad source
      // is a no-op here. Without this, switching profiles between
      // gamepad and keyboard (which triggers useEffect re-run via the
      // mapping?.type dep) would leak handlers.
      try { source.cleanup(); } catch (e) {}
    };
  }, [mapping?.type]);
}

// Calibration modal. Walks the user through GP_CALIBRATION_STEPS,
// capturing button indexes and stick axes. Live-displays detected
// gamepad state so the user can verify the controller is recognized.
// Context bridge between the global gamepad poller (mounted at App
// root) and the active CombosTab (which knows the current slot's
// addToken). CombosTab registers its addToken on mount; the App-level
// hook reads context.addToken every frame. When no character page is
// open, addToken is null and inputs are silently dropped.
const GamepadInputCtx = React.createContext({ setHandlers: null });

function GamepadCalibration({ onClose, onSave, onSkip, existing, target }) {
  const [step, setStep] = useState(0);
  // Resolve which calibration sequence to use.
  // Priority: target.controlType (set by the caller — single phase or
  // add-flow phase) → existing.controlType (rare; legacy field) →
  // 'classic' fallback. Stable across this modal's lifetime; the
  // App tears down + remounts the modal between phases so this hook
  // re-runs cleanly and `step` resets to 0 for the next scheme.
  const controlType = target?.controlType || existing?.controlType || 'classic';
  const STEPS = gpStepsFor(controlType);
  // Pad slot is fixed by the caller (the device picker chose it).
  // We still track it as state so reconnects can update it if the
  // gamepad slot changes, but the user can't edit it from here.
  const [padIndex, setPadIndex] = useState(target?.padIndex || 0);
  const [pads, setPads] = useState([]);
  const [draft, setDraft] = useState(() => {
    // Initial draft state — per scheme. The profile root holds whatever
    // calibration is currently wired to the runtime (Classic), but
    // each scheme has its own truth under `existing.calibrations`.
    // Modern recal must start from `calibrations.modern` (empty if
    // never set), NOT the root, otherwise Classic's button assignments
    // pre-populate the Modern draft and every Modern press collides
    // with a Classic label in the conflict check (rejecting it
    // silently and stalling at the first attack-button step).
    const schemeCal = existing && existing.calibrations
      ? existing.calibrations[controlType]
      : null;
    // For Add Controller's Modern phase: there's no `existing` profile
    // yet, so schemeCal stays null and the draft is empty. Good.
    // For RECAL of an unset scheme: schemeCal is null too — empty draft.
    // For RECAL of a previously-set scheme: pre-fill from that scheme.
