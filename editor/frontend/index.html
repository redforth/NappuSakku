        // Start position: random x along the bottom edge, slightly
        // jittered y so they don't all emit from the exact same line
        x: titleRect.x + Math.random() * titleRect.w,
        y: titleRect.y + (Math.random() * 4 - 2),
        // Initial velocity: slow downward + tiny horizontal jitter.
        // Lava drips don't shoot — they ooze and accelerate via gravity.
        vx: (Math.random() - 0.5) * 8,
        vy: 5 + Math.random() * 15,
        // Physics
        gravity: 220 + Math.random() * 120,    // px/sec² — moderate gravity
        // Lifetime + visuals
        age: 0,
        ttl: 1.4 + Math.random() * 1.4,        // 1.4–2.8 sec lifespan
        radius: 1.0 + Math.random() * 1.6,
        baseAlpha: 0.7 + Math.random() * 0.3,
        flickerPhase: Math.random() * Math.PI * 2,
        flickerFreq:  4 + Math.random() * 6,    // faster flicker than embers
        color,
        // Trail length — how many history positions to keep for a streak.
        // Longer trails read as "molten flow" rather than discrete sparks.
        // 10-18 frames at 60fps = 0.16-0.3 sec of motion blur visible.
        trail: [],
        maxTrail: 10 + Math.floor(Math.random() * 9),
      });
    }

    function frame(now) {
      const dt = Math.min(0.05, (now - lastT) / 1000);
      lastT = now;
      const t = now / 1000;

      // Emit new sparks. emitRate is sparks/sec; fractional counts
      // accumulate so emitRate=18 across two 30fps frames still yields
      // an integer 1 spark per frame on average instead of dropping
      // the fractional remainder each tick.
      emitAccumulator += emitRate * dt;
      while (emitAccumulator >= 1) {
        spawnSpark();
        emitAccumulator -= 1;
      }

      ctx.clearRect(0, 0, width, height);
      ctx.globalCompositeOperation = 'lighter';

      // Update + draw
      for (let i = sparks.length - 1; i >= 0; i--) {
        const s = sparks[i];
        s.age += dt;
        if (s.age >= s.ttl) { sparks.splice(i, 1); continue; }

        // Update trail (push current pos before integration)
        s.trail.push({ x: s.x, y: s.y });
        if (s.trail.length > s.maxTrail) s.trail.shift();

        // Physics
        s.vy += s.gravity * dt;
        s.x  += s.vx * dt;
        s.y  += s.vy * dt;

        // Off-bottom?
        if (s.y > height + 10) { sparks.splice(i, 1); continue; }

        // Lifetime fade — alpha drops linearly with age, with a brief
        // brightness peak in the first 10% of life (the molten "still
        // hot" phase before cooling)
        const lifeT = s.age / s.ttl;
        const fadeAlpha = lifeT < 0.1
          ? 1
          : Math.max(0, 1 - (lifeT - 0.1) / 0.9);
        const flicker = 0.7 + 0.3 * Math.sin(t * s.flickerFreq * Math.PI * 2 + s.flickerPhase);
        const alpha = s.baseAlpha * fadeAlpha * flicker;
        const [r, g, b] = s.color;

        // Trail — fading dots behind the head that read as a streak.
        // Each trail dot is dimmer the further back it sits in history;
        // older dots are smaller too, tapering naturally toward the tail.
        for (let j = 0; j < s.trail.length; j++) {
          const tp = s.trail[j];
          const ageRatio = j / s.trail.length;          // 0 = oldest, 1 = newest
          const tAlpha = alpha * ageRatio * 0.7;
          if (tAlpha <= 0.01) continue;
          // Fatter trail dots — radial gradient like the head but smaller,
          // so the trail glows softly rather than reading as discrete dots
          const tRadius = s.radius * (0.5 + ageRatio * 0.5);
          const tGrad = ctx.createRadialGradient(tp.x, tp.y, 0, tp.x, tp.y, tRadius * 3);
          tGrad.addColorStop(0,   `rgba(${r},${g},${b},${tAlpha})`);
          tGrad.addColorStop(1,   `rgba(${r},${g},${b},0)`);
          ctx.fillStyle = tGrad;
          ctx.beginPath();
          ctx.arc(tp.x, tp.y, tRadius * 3, 0, Math.PI * 2);
          ctx.fill();
        }

        // Head — radial gradient core for the bright spark
        const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.radius * 4);
        grad.addColorStop(0,    `rgba(255,255,255,${alpha * 0.9})`);  // white-hot core
        grad.addColorStop(0.25, `rgba(${r},${g},${b},${alpha})`);
        grad.addColorStop(1,    `rgba(${r},${g},${b},0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.radius * 4, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.globalCompositeOperation = 'source-over';
      raf = requestAnimationFrame(frame);
    }

    function start() {
      if (raf) return;
      lastT = performance.now();
      raf = requestAnimationFrame(frame);
    }
    function stop() { if (raf) { cancelAnimationFrame(raf); raf = 0; } }

    function onResize() { resizeCanvas(); measureTitle(); }
    function onVisibility() { if (document.hidden) stop(); else start(); }

    resizeCanvas();
    measureTitle();
    start();

    window.addEventListener('resize', onResize);
    window.addEventListener('scroll', measureTitle, { passive: true });
    document.addEventListener('visibilitychange', onVisibility);
    // Re-measure periodically to catch font load, layout reflows from
    // the intro animations, and any post-mount layout shifts.
    const measureInterval = setInterval(measureTitle, 3000);

    // One-shot delayed re-measure for font loading. Web fonts often
    // load shortly after first paint — without this, sparks would
    // emit from a stale bbox computed before the display font loaded.
    const fontTimer = setTimeout(measureTitle, 800);
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(measureTitle);
    }

    return () => {
      stop();
      clearInterval(measureInterval);
      clearTimeout(fontTimer);
      window.removeEventListener('resize', onResize);
      window.removeEventListener('scroll', measureTitle);
      document.removeEventListener('visibilitychange', onVisibility);
    };
  }, [targetSelector, emitRate]);

  return React.createElement('canvas', {
    ref: canvasRef,
    'aria-hidden': 'true',
    style: {
      position: 'fixed',
      inset: 0,
      width: '100vw',
      height: '100vh',
      pointerEvents: 'none',
      // Same blend mode as ember field — additive lightening, never
      // occludes content. Sparks paint over UI but only the lit pixels
      // contribute to the final image.
      mixBlendMode: 'screen',
      // z-index 0 same as ember field — siblings on the same layer
      zIndex: 0,
    },
  });
}

// ── App root ───────────────────────────────────────────────
function App() {
  const [serverOk, setServerOk] = useState(false);
  const [folderPath, setFolderPath] = useState('');
  const [roster, setRoster] = useState(null);
  const [currentChar, setCurrentChar] = useState(null);
  const [charData, setCharData] = useState(null);
  const [folderDialog, setFolderDialog] = useState(false);
  const [settingsDialog, setSettingsDialog] = useState(false);
  // First-run welcome modal. Reads localStorage synchronously on mount
  // so the initial render either shows it or doesn't — no flash. The
  // seen-flag is written only when the user dismisses (GOT IT) or
  // jumps into Settings (OPEN SETTINGS); a backdrop-click also counts
  // as dismiss so the modal can't pin a user who clicks away.
  const [welcomeDialog, setWelcomeDialog] = useState(() => {
    try { return !localStorage.getItem(WELCOME_SEEN_KEY); }
    catch { return false; }
  });
  const dismissWelcome = () => {
    try { localStorage.setItem(WELCOME_SEEN_KEY, '1'); } catch {}
    setWelcomeDialog(false);
  };
  // When the legend's "Configure SHIFT" button is clicked, we set
  // this to the profile ID we want SettingsDialog → GamepadProfilesPanel
  // to auto-open its shift-config modal for. Cleared by the panel
  // once it consumes the value, so closing + reopening Settings
  // afterwards doesn't re-trigger the modal.
  const [pendingShiftCfgProfileId, setPendingShiftCfgProfileId] = useState(null);
  const [settings, setSettingsState] = useState(loadSettings);
  const [toastState, showToast] = useToast();

  // Global gamepad state — lives at App root so it persists across
  // navigation between roster and character pages.
  // - gamepadStore: profile registry persisted to localStorage. Holds
  //   any number of named mappings, each tied to a deviceId.
  // - gamepadCal: when truthy, calibration modal is open. Carries
  //   { profileId? , deviceId, deviceName, padIndex } indicating which
  //   profile we're (re)calibrating and which pad slot to read from.
  // - gamepadEnabled: master on/off (separate from store; lets user
  //   disable input without deleting profiles).
  // - gamepadAddToken: callback registered by the active CombosTab.
  //   Stored in a ref so the polling hook always sees the latest
  //   without re-mounting the rAF loop.
  const [gamepadStore, setGamepadStore] = useState(loadGamepadStore);
  const [gamepadCal, setGamepadCal] = useState(null);
  // Keyboard calibration modal state. Same shape as gamepadCal but
  // for keyboard profile creation / recal:
  //   { profileId, deviceName, controlType }
  // profileId is null for new-profile flow, set for recals.
  const [keyboardCal, setKeyboardCal] = useState(null);
  // Holds the in-flight Add Controller flow's accumulated state.
  // The add flow is a two-phase walk (Classic → Modern), but no
  // profile is committed to the store until both phases have either
  // completed or been skipped. This ref accumulates calibrations
  // across phases; if BOTH phases skip, it's discarded with no
  // profile created. A ref (not state) avoids re-rendering on every
  // step capture, and survives the modal unmount/remount between
  // phases. null when no add flow is in progress.
  const addFlowDraftRef = useRef(null);
  const [gamepadEnabled, setGamepadEnabled] = useState(true);
  // Tracks gamepad connect/disconnect events so we re-resolve the
  // active mapping (same store, different pad slot when device reattaches).
  const [gamepadTick, setGamepadTick] = useState(0);
  useEffect(() => {
    const bump = () => setGamepadTick(t => t + 1);
    window.addEventListener('gamepadconnected', bump);
    window.addEventListener('gamepaddisconnected', bump);

    // Polling fallback: the gamepadconnected event ONLY fires when the
    // page receives a fresh connect after it loaded with focus. If the
    // user plugs in their controller BEFORE opening the editor (or the
    // tab loaded in the background), the event never fires — but the
    // browser's Gamepad API will eventually return a non-null pad once
    // it's been woken (typically after the user clicks anywhere on the
    // page or presses a button on the gamepad).
    //
    // We poll every 1s and bump the tick whenever the count of non-null
    // pads changes. This is cheap (one array iteration per second) and
    // closes the wake-up gap that breaks first-load editor input.
    let lastCount = -1;
    const poll = setInterval(() => {
      if (!navigator.getGamepads) return;
      const list = navigator.getGamepads();
      let count = 0;
      for (const g of list) if (g) count++;
      if (count !== lastCount) {
        lastCount = count;
        bump();
      }
    }, 1000);

    return () => {
      window.removeEventListener('gamepadconnected', bump);
      window.removeEventListener('gamepaddisconnected', bump);
      clearInterval(poll);
    };
  }, []);
  // Resolve which profile feeds the polling hook. Recomputed when the
  // store changes or a gamepad connect/disconnect fires.
  // eslint-disable-next-line react-hooks/exhaustive-deps
  const activeMapping = useMemo(() => resolveActiveMapping(gamepadStore), [gamepadStore, gamepadTick]);

  // Bag of handlers registered by the active CombosTab — each is a
  // ref-wrapped closure that always points to the latest version.
  // `null` when no character page is open (inputs silently dropped).
  const gamepadHandlersRef = useRef(null);
  const gamepadDispatch = useCallback((tok) => {
    const h = gamepadHandlersRef.current;
    if (h && h.addToken) h.addToken(tok);
  }, []);
  // Utility action dispatcher — called by the polling hook for actions
  // that aren't plain token inserts. Includes the original BACKSPACE /
  // CLEAR and the SHIFT-modified hotkey actions (sep, xx, undo).
  const gamepadAction = useCallback((action) => {
    const h = gamepadHandlersRef.current;
    if (!h) return;
    if (action === 'pop' && h.popToken) h.popToken();
    else if (action === 'clear' && h.clearTokens) h.clearTokens();
    else if (action === 'undo' && h.undo) h.undo();
    else if (action === 'sep' && h.addToken) h.addToken({ t: 'sep' });
    else if (action === 'xx' && h.addToken) h.addToken({ t: 'btn', v: 'xx' });
    else if (action === 'backspace' && h.popToken) h.popToken();
    // Token-insert actions: SHIFT-bindable palette tokens. The action
    // string is `insert:<TOKEN>` where TOKEN matches the v field used
    // by the on-screen palette buttons (CH, DR, DRC, MW, PC, F.Kill,
    // SHM). Emits the same { t: 'btn', v: TOKEN } object the palette
    // click would, so the token renders identically.
    else if (action && action.startsWith('insert:') && h.addToken) {
      const tokenName = action.slice(7); // strip 'insert:' prefix
      if (tokenName) h.addToken({ t: 'btn', v: tokenName });
    }
  }, []);
  // Motion-collapse dispatcher — called by the polling hook when a
  // motion (236, 623, 41236, etc.) is detected ending on an attack
  // press. Atomically replaces the trailing N direction tokens with a
  // single motion token + the attack token. Returns true on success;
  // poller falls back to plain attack emission on false.
  const gamepadCollapseMotion = useCallback((n, motionTok, attackTok) => {
    const h = gamepadHandlersRef.current;
    if (!h || !h.replaceTrailingDirs) return false;
    return !!h.replaceTrailingDirs(n, motionTok, attackTok);
  }, []);
  // Active character's control scheme. Read by the gamepad hook every
  // frame to pick the right ATTACK_BUTTONS list and COMBO_PAIRS table.
  // Returns null when no character page is mounted; the hook treats
  // null/missing as classic.
  const gamepadGetControlScheme = useCallback(() => {
    const h = gamepadHandlersRef.current;
    return h && h.getControlScheme ? h.getControlScheme() : null;
  }, []);
  const gamepadCtxValue = useMemo(() => ({
    setHandlers: (factory) => { gamepadHandlersRef.current = factory(); },
  }), []);
  useGamepadInput(gamepadDispatch, gamepadAction, activeMapping, gamepadEnabled && !!activeMapping, gamepadCollapseMotion, gamepadGetControlScheme);

  // Persist any change to the store. Wrapped helper used by the
  // settings dialog and calibration save handler.
  const updateGamepadStore = useCallback((updater) => {
    setGamepadStore(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      saveGamepadStore(next);
      return next;
    });
  }, []);

  // Live ref to gamepadCal so advanceAddFlow can read the current
  // phase without the side-effect-in-updater hazard. The `prev`
  // argument to a state setter must be pure — calling other state
  // setters or generating IDs inside it breaks under React 18 strict
  // mode (updaters get invoked twice, once for diffing). Reading
  // through a ref keeps the side effects in the outer function body.
  const gamepadCalRef = useRef(null);
  useEffect(() => { gamepadCalRef.current = gamepadCal; }, [gamepadCal]);

  // Advance the Add-Controller flow's two-phase walk. Called from
  // both the modal's onSave (when a phase completes) and onSkip
  // (when the user opts out of a phase). Both paths share commit
  // logic so a Skip-then-Skip results in NO profile created, while
  // Save-then-Skip / Skip-then-Save commit a profile with one
  // calibration, and Save-then-Save commit both.
  //
  // Argument: justCompletedScheme — 'classic' | 'modern' | null (skip).
  // Reads phase from the gamepadCalRef rather than the state setter's
  // prev arg, so commit-time side effects (ID gen, store write) live
  // outside any reducer.
  const advanceAddFlow = useCallback((justCompletedScheme) => {
    const cur = gamepadCalRef.current;
    if (!cur || cur.profileId != null) return; // not an add flow — bail
    const draft = addFlowDraftRef.current;
    if (!draft) { setGamepadCal(null); return; }

    // Phase 1 → Phase 2 (regardless of save/skip).
    if (cur.phase === 1) {
      setGamepadCal({
        ...cur,
        controlType: 'modern',
        phase: 2,
      });
      return;
    }

    // Phase 2 done — commit the profile (or abort if both skipped).
    const hasC = calibrationIsPresent(draft.calibrations.classic);
    const hasM = calibrationIsPresent(draft.calibrations.modern);
    if (!hasC && !hasM) {
      // Both phases skipped → no profile gets created. Discard
      // the draft and dismiss the modal.
      addFlowDraftRef.current = null;
      setGamepadCal(null);
      return;
    }
    // Build the profile from the accumulated draft. Root-level
    // mapping fields mirror Classic if present (so the runtime
    // works); otherwise Modern (so a Modern-only profile still
    // feeds polling — temporary; the per-character switch will
    // overwrite this once built). Either way the per-scheme
    // truth lives under `calibrations`.
    const id = gpProfileId();
    const rootCal = hasC ? draft.calibrations.classic : draft.calibrations.modern;
    // Hotkeys: use captured shift if any, else defaults.
    let hotkeys = DEFAULT_HOTKEYS();
    if (draft.shiftIndex != null) {
      hotkeys = {
        ...hotkeys,
        modifier_index: draft.shiftIndex,
        modifier_axis: null,
        modifier_label: draft.shiftLabel || ('Button ' + draft.shiftIndex),
        modifier: (draft.shiftLabel && /^[A-Z]+$/.test(draft.shiftLabel))
          ? draft.shiftLabel : '',
      };
    } else if (draft.shiftAxis) {
      hotkeys = {
        ...hotkeys,
        modifier_index: null,
        modifier_axis: { index: draft.shiftAxis.index, sign: draft.shiftAxis.sign },
        modifier_label: draft.shiftLabel || '',
        modifier: '',
      };
    }
    const profile = {
      id,
      name: draft.deviceName || 'Controller',
      deviceId: draft.deviceId,
      buttons: rootCal.buttons || {},
      dpad: rootCal.dpad || {},
      axisDirs: rootCal.axisDirs || {},
      padIndex: draft.padIndex || 0,
      shiftIndex: draft.shiftIndex,
      shiftAxis: draft.shiftAxis,
      shiftLabel: draft.shiftLabel,
      hotkeys,
      calibrations: {
        classic: draft.calibrations.classic,
        modern: draft.calibrations.modern,
      },
    };
    updateGamepadStore(s => ({
      ...s,
      activeProfileId: id,
      profiles: { ...s.profiles, [id]: profile },
    }));
    addFlowDraftRef.current = null;
    setGamepadCal(null);
  }, [updateGamepadStore]);

  // ── KEYBOARD ADD-FLOW CHAIN ──────────────────────────────────
  // Mirror of advanceAddFlow but for keyboard profiles. Same Phase 1
  // (Classic) → Phase 2 (Modern) → commit pattern. The committed
  // profile has type:'keyboard', and uses `keys`/`dirKeys` fields
  // instead of `buttons`/`axisDirs`. Root-level fields mirror the
  // Classic scheme (or Modern if Classic skipped) so the runtime
  // can read the active mapping without scheme-routing logic.
  const keyboardCalRef = useRef(null);
  useEffect(() => { keyboardCalRef.current = keyboardCal; }, [keyboardCal]);

  const advanceKeyboardAddFlow = useCallback((justCompletedScheme) => {
    const cur = keyboardCalRef.current;
    if (!cur || cur.profileId != null) return;
    const draft = addFlowDraftRef.current;
    if (!draft) { setKeyboardCal(null); return; }

    // Phase 1 → Phase 2
    if (cur.phase === 1) {
      setKeyboardCal({
        ...cur,
        controlType: 'modern',
        phase: 2,
      });
      return;
    }

    // Phase 2 done — commit
    const hasC = draft.calibrations.classic && Object.keys(draft.calibrations.classic.keys || {}).length > 0;
    const hasM = draft.calibrations.modern && Object.keys(draft.calibrations.modern.keys || {}).length > 0;
    if (!hasC && !hasM) {
      addFlowDraftRef.current = null;
      setKeyboardCal(null);
      return;
    }
    const id = 'kb_' + Math.random().toString(36).slice(2, 10);
    const rootCal = hasC ? draft.calibrations.classic : draft.calibrations.modern;
    let hotkeys = DEFAULT_HOTKEYS();
    if (draft.modifier_key) {
      hotkeys = {
        ...hotkeys,
        modifier_key: draft.modifier_key,
      };
    }
    const profile = {
      id,
      type: 'keyboard',
      name: draft.name || 'Keyboard',
      keys: rootCal.keys || {},
      dirKeys: rootCal.dirKeys || {},
      hotkeys,
      calibrations: {
        classic: draft.calibrations.classic,
        modern: draft.calibrations.modern,
      },
    };
    updateGamepadStore(s => ({
      ...s,
      activeProfileId: id,
      profiles: { ...s.profiles, [id]: profile },
    }));
    addFlowDraftRef.current = null;
    setKeyboardCal(null);
  }, [updateGamepadStore]);

  // Transition state: 'roster' | 'exiting' | 'character'
  // 'exiting' = roster still mounted, but cards playing the .card-out
  // animation. After EXIT_MS we swap to 'character' which mounts the
  // detail page with its own enter choreography.
  const [view, setView] = useState('roster');
  const [pendingChar, setPendingChar] = useState(null); // name being flown to
  // Bounding rect of the clicked card at click time, used to drive the
  // folderExpand animation's CSS custom props (translate + scale to
  // fullscreen). Null when no expansion is in flight.
  const [pickedRect, setPickedRect] = useState(null);
  const EXIT_MS = 900;  // matches folderExpand animation duration

  const refreshRoster = useCallback(async () => {
    try {
      const r = await API.roster();
      setRoster(r);
      setFolderPath(r.framedata_path);
      setServerOk(true);
    } catch (e) {
      setServerOk(false);
      showToast('Cannot reach server. Is sf6_editor.exe running?', 'bad');
    }
  }, [showToast]);

  useEffect(() => { refreshRoster(); }, [refreshRoster]);

  const pickChar = useCallback(async (name, rect) => {
    if (view !== 'roster') return;             // ignore double-clicks mid-transition
    setPendingChar(name);                      // triggers exit animation in RosterPage
    setPickedRect(rect || null);
    setView('exiting');
    try {
      // Fetch in parallel with the exit animation — usually data arrives
      // before the animation finishes, so the swap feels instant.
      const [d] = await Promise.all([
        API.character(name),
        new Promise(r => setTimeout(r, EXIT_MS)),
      ]);
      setCharData(d);
      setCurrentChar(name);
      setView('character');
      setPickedRect(null);
      window.scrollTo({ top: 0, behavior: 'instant' });
    } catch (e) {
      setView('roster');                       // recover
      setPendingChar(null);
      setPickedRect(null);
      showToast('Failed to load character: ' + e.message, 'bad');
    }
  }, [view, showToast]);

  const back = () => {
    setCurrentChar(null);
    setCharData(null);
    setPendingChar(null);
    setPickedRect(null);
    setView('roster');
    refreshRoster();
  };

  const saveSection = async (section, body) => {
    if (section === 'notes') return API.saveNotes(currentChar, body);
    if (section === 'combos') return API.saveCombos(currentChar, body);
    if (section === 'combos_modern') return API.saveCombosModern(currentChar, body);
    throw new Error('Unknown section ' + section);
  };

  const saveFolder = async (path) => {
    try {
      await API.setFolder(path);
      setFolderDialog(false);
      showToast('Folder updated', 'good');
      refreshRoster();
    } catch (e) {
      showToast('Could not set folder: ' + e.message, 'bad');
    }
  };

  // Pulled out so AudioPlayer can re-read custom audio from IndexedDB
  // when the active track has just changed.
  const [customAudioVersion, setCustomAudioVersion] = useState(0);

  const handleSaveSettings = async (next) => {
    // Split off the transient pending custom audio data — never persist
    // this in localStorage (it'd blow the quota).
    const pending = next._pendingCustomData;
    const clean = { ...next };
    delete clean._pendingCustomData;

    try {
      // 1. Write custom audio to IndexedDB FIRST. If this fails (disk
      //    full, quota, browser denied), abort the whole save so the
      //    user knows nothing changed. This is the failure mode that
      //    was previously silent.
      if (pending) {
        await setCustomAudio(pending);
        setCustomAudioVersion(v => v + 1);
      }
      // 2. Persist the rest to localStorage. Throws on quota errors.
      saveSettings(clean);
      setSettingsState(clean);
      setSettingsDialog(false);
      showToast('Settings saved', 'good');
    } catch (e) {
      // Surface real errors instead of silently swallowing them.
      const msg = (e && e.name === 'QuotaExceededError')
        ? 'Storage full — try a smaller audio file or clear browser data'
        : ('Save failed: ' + (e && e.message ? e.message : 'unknown error'));
      showToast(msg, 'bad');
    }
  };

  // Decide which view to render
  let body;
  if (!roster) {
    body = React.createElement('div', {
      className: 'max-w-7xl mx-auto p-16 text-center text-paper-mute font-mono text-sm',
    }, 'LOADING…');
  } else if (view === 'character' && currentChar && charData) {
    body = React.createElement(CharacterPage, {
      key: currentChar,    // force fresh mount → enter animations replay
      name: currentChar, data: charData, onSave: saveSection, toast: showToast,
      // Active gamepad profile for the SHIFT legend. Read directly
      // from the store (NOT from resolveActiveMapping) so the legend
      // shows the user's SAVED bindings regardless of whether their
      // controller has been "woken up" with a button press. Browsers

          let finalHotkeys = baseHotkeys;
