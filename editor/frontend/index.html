    // Shift fields come from the per-scheme record when present, else
    // from the profile root (legacy / cross-scheme carryover).
    if (schemeCal) {
      return {
        padIndex: target?.padIndex || 0,
        buttons: { ...(schemeCal.buttons || {}) },
        dpad: { ...(schemeCal.dpad || {}) },
        axisDirs: { ...(schemeCal.axisDirs || {}) },
        shiftIndex: schemeCal.shiftIndex ?? existing?.shiftIndex ?? null,
        shiftAxis: schemeCal.shiftAxis || existing?.shiftAxis || null,
        shiftLabel: schemeCal.shiftLabel || existing?.shiftLabel || '',
      };
    }
    // Fallback: legacy profile with no `calibrations` and we're
    // recal'ing Classic — read root fields. Modern recal on a legacy
    // profile starts empty (no Modern data exists yet).
    if (existing && controlType === 'classic') {
      return {
        padIndex: target?.padIndex || 0,
        buttons: { ...(existing.buttons || {}) },
        dpad: { ...(existing.dpad || {}) },
        axisDirs: { ...(existing.axisDirs || {}) },
        shiftIndex: existing.shiftIndex ?? null,
        shiftAxis: existing.shiftAxis || null,
        shiftLabel: existing.shiftLabel || '',
      };
    }
    return {
      padIndex: target?.padIndex || 0,
      buttons: {}, dpad: {}, axisDirs: {},
      shiftIndex: null, shiftAxis: null, shiftLabel: '',
    };
  });
  const [liveState, setLiveState] = useState({ buttons: [], axes: [] });
  const baselineRef = useRef(null);   // axis baseline at step start (for axis-direction detection)
  // Live ref to draft. The capture-effect closure captures `draft` at
  // the moment the effect runs (when step or padIndex changes), but
  // commit() may run many frames later — by which point setDraft from
  // PRIOR steps may have been clobbered or the effect's snapshot may
  // be stale. The ref is updated synchronously every render, so
  // commit() always sees the latest draft when looking up the button
  // index → label mapping for the SHIFT step.
  const draftRef = useRef(null);
  draftRef.current = draft;

  // Re-locate the target controller if it gets reassigned to a
  // different slot (e.g. user unplugs and replugs during calibration).
  // Runs IMMEDIATELY on mount AND every 1s after, because at click-time
  // the Gamepad API may have been asleep — saved padIndex from the
  // RECAL handler can be stale, which means the calibration loop polls
  // the wrong slot until this interval re-locates. Immediate run + a
  // few rapid retries closes the window where presses go to nowhere.
  // Match strategy delegated to findGamepadIdx (exact → fingerprint
  // → first-non-null fallback) so this survives browser ID reformats.
  useEffect(() => {
    if (!target?.deviceId) return;
    const tryLocate = () => {
      const list = navigator.getGamepads ? Array.from(navigator.getGamepads()) : [];
      const idx = findGamepadIdx(list, target.deviceId);
      if (idx >= 0 && idx !== padIndex) setPadIndex(idx);
    };
    tryLocate();
    const fastIds = [50, 100, 200, 400, 800].map(ms =>
      setTimeout(tryLocate, ms)
    );
    const steady = setInterval(tryLocate, 1000);
    return () => {
      fastIds.forEach(clearTimeout);
      clearInterval(steady);
    };
  }, [target?.deviceId, padIndex]);

  // Poll gamepad state for both calibration capture and live display
  useEffect(() => {
    let raf = 0;
    function tick() {
      raf = requestAnimationFrame(tick);
      const list = navigator.getGamepads ? Array.from(navigator.getGamepads()) : [];
      setPads(list.map((p, i) => p ? { i, id: p.id, buttons: p.buttons.length, axes: p.axes.length } : null));
      const gp = list[padIndex];
      if (!gp) return;
      setLiveState({
        buttons: Array.from(gp.buttons).map(b => !!b.pressed),
        axes: Array.from(gp.axes),
      });
    }
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [padIndex]);

  // Per-step capture state machine (press-then-release model):
  //   'waiting'  → listening for any press (button or axis movement)
  //   'holding'  → press detected; we've identified the input candidate
  //                and are waiting for the user to release it
  //   'captured' → input released; flashing confirmation for CONFIRM_MS
  //                before advancing to the next step
  // Why release-to-commit instead of press-to-commit: if we commit on
  // press, the next step starts while the user is still holding the
  // previous input, and rAF re-fires on the same input for the new step.
  // Waiting for release guarantees the controller is at neutral before
  // we advance, with no separate "wait for clear" phase needed — the
  // release IS the all-clear signal.
  const [captureState, setCaptureState] = useState('waiting');
  const [capturedInfo, setCapturedInfo] = useState(null);   // { label, detail } shown during 'holding' & 'captured'
  const CONFIRM_MS = 600;
  // Detection thresholds — generous to handle controllers with stick
  // drift and PS5/SDL hat-axis encodings (which report 0.43 for cardinals).
  const MOVE_AXIS = 0.4;

  // Capture input for current step
  useEffect(() => {
    if (step >= STEPS.length) return;
    const { label, kind, optional, description } = STEPS[step];

    setCaptureState('waiting');
    setCapturedInfo(null);

    let localState = 'waiting';
    let advanceTimer = null;
    // The candidate input identified during 'holding' phase.
    // - For buttons:   { type: 'btn',  index: i }
    // - For axis dirs: { type: 'axis', index: i, sign: -1 | +1 }
    // - For D-pad:     { type: 'btn',  index: i, isDpad: true }
    let candidate = null;
    // Snapshot taken at start of step so we measure CHANGES rather
    // than absolute states. This handles stick drift (axes that
    // never read 0.0) and any button somehow held across steps.
    let baseAxes = null;
    let baseBtns = null;

    // The Gamepad API can return null for `gp` for several frames after
    // a modal mounts. We can't take baseline until gp is non-null.
    // The loop's first valid-gp frame initializes baseline; from there
    // detection runs normally. If the user happens to be holding a
    // button at mount (rare for RECAL, since they have to click the
    // RECAL button immediately before), it gets captured as already-
    // pressed in baseline; releasing and re-pressing yields a clean
    // rising edge.
    // Baseline snapshot. Captures the gamepad state at step start so
    // detection looks for CHANGES rather than absolute states. Two
    // requirements must be met before we snapshot:
    //   1. gp is reachable (Gamepad API can return null right after
    //      mount until the user wakes the controller).
    //   2. No buttons are currently pressed.
    //
    // Requirement 2 is the fix for an intermittent registration bug:
    // if the user mashes the next button before the previous step's
    // 600ms confirm flash finishes, baseline can capture that button
    // as already-pressed. The detection filter then treats their
    // subsequent press as no-change and silently ignores it. This
    // hits Modern recal more often than Classic because Modern users
    // tend to tap through buttons fast.
    //
    // We can't gate on axes being at rest — sticks drift, hat axes
    // sit at non-zero rest values — so axes are snapshotted as-is.
    // Direction detection uses |delta| from baseline anyway, which
    // tolerates the resting position correctly.
    function trySnapshotBaseline() {
      const gp = (navigator.getGamepads ? navigator.getGamepads() : [])[padIndex];
      if (!gp) return false;
      // Wait until no buttons are pressed. Returns false (try again
      // next frame) if the user is still holding something from the
      // previous step or pre-emptively pressing the next one.
      for (let i = 0; i < gp.buttons.length; i++) {
        if (gp.buttons[i].pressed) return false;
      }
      baseAxes = Array.from(gp.axes);
      baseBtns = Array.from(gp.buttons).map(b => !!b.pressed);
      return true;
    }
    // Don't try eagerly — the loop's first tick handles it once
    // navigator.getGamepads() returns a non-null entry.

    // Commit candidate to draft and start the confirmation flash.
    function commit() {
      if (!candidate) return;
      // Helper: which label currently owns this button index, if any.
      // Used in conflict checks so re-binding the same label during
      // RECAL is allowed (returning the same owner means we accept it).
      const labelOwning = (idx) => {
        for (const k of Object.keys(draft.buttons || {})) {
          if (draft.buttons[k] === idx) return k;
        }
        for (const k of Object.keys(draft.dpad || {})) {
          if (draft.dpad[k] === idx) return k.toUpperCase();
        }
        return null;
      };
      let detail = '';
      if (candidate.type === 'btn') {
        if (kind === 'btn') {
          // Reject only if the button is bound to a DIFFERENT label.
          // Same-label re-press is fine (RECAL flow). Defensive double-
          // check after the detection-time filter.
          const owner = labelOwning(candidate.index);
          if (owner !== null && owner !== label) {
            candidate = null;
            localState = 'waiting';
            setCaptureState('waiting');
            return;
          }
          setDraft(d => ({ ...d, buttons: { ...d.buttons, [label]: candidate.index }, padIndex }));
          detail = `button ${candidate.index}`;
        } else if (kind === 'dir') {
          // Same logic for direction steps — allow re-binding the same
          // direction; reject only if bound to another label.
          const owner = labelOwning(candidate.index);
          if (owner !== null && owner !== label) {
            candidate = null;
            localState = 'waiting';
            setCaptureState('waiting');
            return;
          }
          const dpadKey = label.toLowerCase();
          setDraft(d => ({ ...d, dpad: { ...d.dpad, [dpadKey]: candidate.index }, padIndex }));
          detail = `button ${candidate.index} (d-pad)`;
        } else if (kind === 'shift') {
          // Shift can be ANY button on the controller — no need for it
          // to be in the calibrated 10. Store the raw button index.
          // Lua reads it via btn_flags(<index>) directly.
          // Also record any matching label for display purposes
          // (so the UI can show "shift = MK" if the user picked one of
          // the calibrated buttons; falls back to "button 9" otherwise).
          const live = draftRef.current || draft;
          let matchedLabel = null;
          for (const k of Object.keys(live.buttons || {})) {
            if (live.buttons[k] === candidate.index) { matchedLabel = k; break; }
          }
          if (!matchedLabel) {
            const dpadMap = { up: 'UP', down: 'DOWN', left: 'LEFT', right: 'RIGHT' };
            for (const k of Object.keys(live.dpad || {})) {
              if (live.dpad[k] === candidate.index) {
                matchedLabel = dpadMap[k] || k.toUpperCase();
                break;
              }
            }
          }
          setDraft(d => ({
            ...d,
            shiftIndex: candidate.index,
            shiftLabel: matchedLabel || ('Button ' + candidate.index),
            padIndex,
          }));
          detail = matchedLabel
            ? `shift = ${matchedLabel} (button ${candidate.index})`
            : `shift = button ${candidate.index}`;
        }
      } else if (candidate.type === 'axis') {
        if (kind === 'shift') {
          // Axis-direction modifier (rare but valid — e.g. user picks
          // a trigger-as-axis as their shift). Store axis index + sign
          // so the runtime can detect it the same way as during
          // calibration: |axis - rest| > deadzone in matching direction.
          // The label is best-effort — if the axis matches a calibrated
          // direction, use that; otherwise show as "axis N+/-".
          const live = draftRef.current || draft;
          let matchedLabel = null;
          for (const dir of ['UP','DOWN','LEFT','RIGHT']) {
            const d = (live.axisDirs || {})[dir];
            if (d && d.index === candidate.index && d.sign === candidate.sign) {
              matchedLabel = dir; break;
            }
          }
          setDraft(d => ({
            ...d,
            shiftAxis: { index: candidate.index, sign: candidate.sign },
            shiftLabel: matchedLabel || ('Axis ' + candidate.index + (candidate.sign > 0 ? '+' : '-')),
            padIndex,
          }));
          detail = matchedLabel
            ? `shift = ${matchedLabel} (axis ${candidate.index})`
            : `shift = axis ${candidate.index} ${candidate.sign > 0 ? '+' : '-'}`;
        } else {
          // Store axisDirs[LABEL] = { index, sign, value, rest }.
          // - index, sign: legacy fields, kept for non-hat analog sticks
          // - value: literal axis reading when the direction was held
          // - rest:  axis reading at calibration baseline (neutral)
          // The runtime can use (value, rest) to detect hat-axis
          // directions where multiple directions share the same index.
          // For analog sticks (X-axis swung between -1 and +1 with rest
          // at 0), value/rest are still present but the legacy sign
          // path also works fine.
          setDraft(d => ({
            ...d,
            axisDirs: {
              ...(d.axisDirs || {}),
              [label]: {
                index: candidate.index,
                sign: candidate.sign,
                value: candidate.value,
                rest: (baseAxes && baseAxes[candidate.index]) || 0,
              },
            },
            padIndex,
          }));
          detail = `axis ${candidate.index} = ${candidate.value.toFixed(2)}`;
        }
      }
      localState = 'captured';
      setCaptureState('captured');
      setCapturedInfo({ label, detail });
      advanceTimer = setTimeout(() => setStep(s => s + 1), CONFIRM_MS);
    }

    let raf = 0;
    // Frame counter for the baseline-quiescence wait. If we can't
    // get a clean (no-buttons-pressed) snapshot within ~3 seconds,
    // fall back to snapshotting whatever the live state is. Prevents
    // a stuck button (rare) from softlocking the calibration step.
    let baselineWaitFrames = 0;
    const BASELINE_MAX_WAIT = 180; // ~3s at 60fps
    function loop() {
      raf = requestAnimationFrame(loop);
      const gp = (navigator.getGamepads ? navigator.getGamepads() : [])[padIndex];
      if (!gp) return;
      // Baseline init: keep retrying until we get a frame where the
      // gamepad is reporting AND nothing is pressed. This guards
      // against the API being asleep on modal mount AND against the
      // user pre-emptively pressing the next step's button before the
      // previous step's confirm flash completes.
      if (!baseAxes) {
        baselineWaitFrames++;
        if (!trySnapshotBaseline()) {
          // Escape hatch: stuck button → force a snapshot rather
          // than spinning forever. Detection then treats the held
          // button as part of the resting state and the user can
          // still press anything else to advance.
          if (baselineWaitFrames > BASELINE_MAX_WAIT) {
            const gpNow = (navigator.getGamepads ? navigator.getGamepads() : [])[padIndex];
            if (gpNow) {
              baseAxes = Array.from(gpNow.axes);
              baseBtns = Array.from(gpNow.buttons).map(b => !!b.pressed);
            } else {
              return;
            }
          } else {
            return;
          }
        }
      }

      // Captured: no input handling, just waiting for setTimeout
      if (localState === 'captured') return;

      if (localState === 'waiting') {
        // Look for any active input that wasn't active in the baseline.
        // First check: a button rising edge (same logic for both 'btn'
        // and 'dir' steps — D-pads register as buttons too).
        //
        // RECAL conflict resolution: when recalibrating, the draft is
        // pre-populated from the existing profile. So every button is
        // "already assigned" — we must allow buttons to be re-pressed
        // for the SAME label they currently hold, only skipping buttons
        // bound to OTHER labels. Helper below figures out which label
        // (if any) currently owns this button index.
        const labelOwning = (idx) => {
          for (const k of Object.keys(draft.buttons || {})) {
            if (draft.buttons[k] === idx) return k;
          }
          for (const k of Object.keys(draft.dpad || {})) {
            if (draft.dpad[k] === idx) return k.toUpperCase();
          }
          return null;
        };
        for (let i = 0; i < gp.buttons.length; i++) {
          if (gp.buttons[i].pressed && baseBtns && !baseBtns[i]) {
            // Shift step accepts ANY button, calibrated or not —
            // no conflict checks. The user can pick SELECT, START,
            // a paddle, an unbound shoulder, etc.
            if (kind !== 'shift') {
              const owner = labelOwning(i);
              // Skip if this button is bound to a DIFFERENT label.
              // Allow if it's unassigned (owner === null) or already
              // bound to the label we're (re)calibrating.
              if (owner !== null && owner !== label) continue;
            }
            candidate = {
              type: 'btn', index: i,
              isDpad: kind === 'dir',
            };
            localState = 'holding';
            setCaptureState('holding');
            setCapturedInfo({ label, detail: `button ${i} — release to confirm` });
            return;
          }
        }
        // Axis movement: relevant for 'dir' steps and 'shift' (since the
        // user can pick an axis direction as their modifier too).
        // Capture the actual VALUE held (not just sign-of-delta) because
        // hat axes (PS4 D-pad on axis 9) encode 8 directions on a single
        // axis with distinct fractional values — sign alone collapses
        // them to two buckets and can't distinguish UP from LEFT.
        if ((kind === 'dir' || kind === 'shift') && baseAxes) {
          for (let i = 0; i < gp.axes.length; i++) {
            const cur = gp.axes[i];
            const delta = cur - (baseAxes[i] || 0);
            if (Math.abs(delta) > MOVE_AXIS) {
              candidate = {
                type: 'axis',
                index: i,
                sign: Math.sign(delta),
                // value: the literal axis reading at the moment the
                // direction is held. Used at runtime to disambiguate
                // hat-axis directions on a shared axis index.
                value: cur,
              };
              localState = 'holding';
              setCaptureState('holding');
              setCapturedInfo({ label, detail: `axis ${i} = ${cur.toFixed(2)} — release to confirm` });
              return;
            }
          }
        }
        return;
      }

      if (localState === 'holding') {
        // Wait for the candidate to return to its baseline state.
        if (candidate.type === 'btn') {
          if (!gp.buttons[candidate.index].pressed) {
            commit();
          }
        } else if (candidate.type === 'axis') {
          const delta = gp.axes[candidate.index] - (baseAxes[candidate.index] || 0);
          // Released = within half the trigger threshold of baseline
          if (Math.abs(delta) < MOVE_AXIS / 2) {
            commit();
          }
        }
        return;
      }
    }
    raf = requestAnimationFrame(loop);
    return () => {
      cancelAnimationFrame(raf);
      if (advanceTimer) clearTimeout(advanceTimer);
    };
  }, [step, padIndex]);

  const done = step >= STEPS.length;
  const currentStep = done ? null : STEPS[step];
  const currentLabel = currentStep?.label || null;
  const currentKind = currentStep?.kind || null;
  const currentDescription = currentStep?.description || null;
  const currentOptional = !!currentStep?.optional;

  const skip = () => setStep(s => s + 1);

  return React.createElement('div', {
    style: {
      position: 'fixed', inset: 0, zIndex: 100,
      background: 'rgba(6,7,10,0.85)', backdropFilter: 'blur(6px)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: 'Inter Tight, system-ui, sans-serif',
    },
    onClick: e => { if (e.target === e.currentTarget) onClose(); },
  },
    React.createElement('div', {
      style: {
        background: '#10131a', border: '1px solid #2c3445',
        width: '560px', maxWidth: '92vw', padding: '24px',
        boxShadow: '0 10px 40px rgba(0,0,0,0.6)',
      },
    },
      React.createElement('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: '16px' } },
        React.createElement('h2', { style: { fontFamily: 'Bebas Neue', fontSize: '28px', letterSpacing: '0.05em', color: '#f0eee6', margin: 0 } },
          controlType === 'modern' ? 'GAMEPAD CALIBRATION — MODERN' : 'GAMEPAD CALIBRATION — CLASSIC'),
        React.createElement('button', {
          onClick: onClose,
          style: { background: 'none', border: 'none', color: '#9aa3b2', fontSize: '20px', cursor: 'pointer' },
        }, '✕')
      ),

      // Instruction banner — derived from the active STEPS array so
      // Modern (LIGHT/MEDIUM/HARD/SP/AUTO/THROW/DI/DP) and Classic
      // (LP/MP/HP/LK/MK/HK) calibrations always show the right labels.
      // Also surfaces the add-flow phase ("1 of 2 — Classic") when
      // calibrating both schemes back-to-back during Add Controller.
      !done && (() => {
        const dirLabels = STEPS.filter(s => s.kind === 'dir').map(s => s.label);
        const btnLabels = STEPS.filter(s => s.kind === 'btn' && !s.optional).map(s => s.label);
        const optLabels = STEPS.filter(s => s.optional).map(s => s.label);
        const phaseTag = target?.phase
          ? ` — PHASE ${target.phase} OF ${target.totalPhases || 2}`
          : '';
        const headerText = (controlType === 'modern' ? 'INSTRUCTIONS — MODERN CONTROLS' : 'INSTRUCTIONS — CLASSIC CONTROLS') + phaseTag;
        return React.createElement('div', {
          style: {
            padding: '12px 14px', marginBottom: '16px',
            background: '#06070a', borderLeft: '3px solid #e7223a',
            fontSize: '12px', color: '#f0eee6', lineHeight: '1.5',
          },
        },
          React.createElement('div', {
            style: { fontFamily: 'JetBrains Mono, monospace', fontSize: '10px', color: '#e7223a', letterSpacing: '0.15em', marginBottom: '4px' },
          }, headerText),
          'You\'ll be prompted to press a series of inputs: ',
          React.createElement('strong', { style: { color: '#f0eee6' } }, [...dirLabels, ...btnLabels].join(', ')),
          optLabels.length > 0 && ', then optional editor controls (',
          optLabels.length > 0 && React.createElement('strong', { style: { color: '#f0eee6' } }, optLabels.join(', ')),
          optLabels.length > 0 && ')',
          '. For each one: ',
          React.createElement('strong', { style: { color: '#f5c518' } }, 'press, hold briefly, then release'),
          '. The input is recorded when you release. Optional steps can be skipped.',
          // Skip-this-scheme button — only shown when caller provided
          // an onSkip handler (the Add Controller flow does; standalone
          // recals don't, since "skip" makes no sense for a single
          // explicit recalibration).
          onSkip && React.createElement('div', {
            style: { marginTop: '10px', display: 'flex', justifyContent: 'flex-end' },
          },
            React.createElement('button', {
              type: 'button',
              onClick: onSkip,
              title: controlType === 'modern'
                ? 'Skip Modern calibration. The profile will only have a Classic mapping.'
                : 'Skip Classic calibration. You\'ll continue to the Modern step.',
              style: {
                fontFamily: 'JetBrains Mono, monospace', fontSize: '10px',
                color: '#9aa3b2', background: 'transparent',
                border: '1px solid #2c3445', padding: '4px 10px', cursor: 'pointer',
              },
            }, `SKIP ${controlType.toUpperCase()}`)
          )
        );
      })(),

      // Fixed target device — picker happens upstream in the
      // settings dialog. Show which device is being calibrated and
      // surface a warning if it's not currently connected.
      React.createElement('div', {
        style: {
          marginBottom: '16px', padding: '10px 12px',
          background: '#06070a', border: '1px solid #1f2532',
          fontSize: '12px', fontFamily: 'JetBrains Mono, monospace',
        },
      },
        React.createElement('div', {
          style: { fontSize: '10px', color: '#9aa3b2', letterSpacing: '0.15em', marginBottom: '4px' },
        }, 'CALIBRATING'),
        React.createElement('div', { style: { color: '#f0eee6', display: 'flex', alignItems: 'center', gap: '8px' } },
          React.createElement('span', {
            style: {
              width: '8px', height: '8px', borderRadius: '50%',
              background: pads[padIndex] ? '#22c55e' : '#ff5e5e',
            },
          }),
          React.createElement('span', { style: { flex: 1 } }, target?.deviceName || pads[padIndex]?.id || 'Controller'),
          React.createElement('span', { style: { color: '#9aa3b2', fontSize: '10px' } }, `slot ${padIndex}`)
        ),
        !pads[padIndex] && React.createElement('div', {
          style: { color: '#ff5e5e', fontSize: '11px', marginTop: '6px' },
        }, '⚠ Controller not detected on this slot. Press any button to wake it, or close and re-pick from the device list.')
      ),

      // Calibration step or completion
      !done && React.createElement('div', {
        style: {
          padding: '32px 16px', textAlign: 'center',
          background: captureState === 'captured' ? '#0a1f12'
                    : captureState === 'holding'  ? '#0a1612'
                                                  : '#06070a',
          border: '1px solid ' + (
            captureState === 'captured' ? '#22c55e' :
            captureState === 'holding'  ? '#f5c518' :
                                          '#1f2532'
          ),
          marginBottom: '16px',
          transition: 'border-color 120ms, background 120ms',
        },
      },
        React.createElement('div', { style: { fontSize: '11px', fontFamily: 'JetBrains Mono, monospace', color: '#9aa3b2', marginBottom: '8px' } },
          `STEP ${step + 1} / ${STEPS.length}`),
        React.createElement('div', {
          style: {
            fontFamily: 'Bebas Neue', fontSize: '48px',
            color: captureState === 'captured' ? '#22c55e'
                 : captureState === 'holding'  ? '#f5c518'
                                               : '#e7223a',
            letterSpacing: '0.08em', margin: '4px 0',
            transition: 'color 120ms',
          },
        },
          captureState === 'captured' ? '✓ ' + currentLabel
          : captureState === 'holding' ? '◉ ' + currentLabel
          : currentLabel
        ),
        // Status line
        React.createElement('div', {
          style: {
            fontSize: '13px',
            color: captureState === 'captured' ? '#22c55e'
                 : captureState === 'holding'  ? '#f5c518'
                                               : '#f0eee6',
            fontWeight: captureState === 'waiting' ? 400 : 600,
            minHeight: '1.4em',
          },
        },
          captureState === 'captured'
            ? `CAPTURED${capturedInfo ? ' — ' + capturedInfo.detail : ''}`
            : captureState === 'holding'
              ? `Got it — release to confirm${capturedInfo ? ' (' + capturedInfo.detail.replace(' — release to confirm','') + ')' : ''}`
              : (currentKind === 'btn'
                  ? `Press and release the ${currentLabel} button`
                  : `Push and release the stick or D-pad ${currentLabel}`)
        ),
        // Per-step description — used to explain non-obvious bindings
        // like BACKSPACE / CLEAR. Only shown during the active waiting
        // phase; collapses out during holding/captured to keep focus
        // on the action the user just took.
        currentDescription && captureState === 'waiting' && React.createElement('div', {
          style: {
            marginTop: '12px', padding: '10px 12px',
            background: '#0f1218', border: '1px solid #2c3445',
            fontSize: '11px', color: '#c8cdd8', lineHeight: '1.5',
            textAlign: 'left',
          },
        },
          React.createElement('div', {
            style: { fontFamily: 'JetBrains Mono, monospace', fontSize: '9px', color: '#f5c518', letterSpacing: '0.15em', marginBottom: '4px' },
          }, 'WHAT THIS DOES'),
          currentDescription
        ),
        React.createElement('button', {
          onClick: skip,
          disabled: captureState === 'captured' || captureState === 'holding',
          style: {
            marginTop: '14px', background: 'none',
            border: '1px solid ' + (currentOptional ? '#5b6478' : '#2c3445'),
            color: currentOptional ? '#c8cdd8' : '#9aa3b2',
            padding: '4px 12px', fontSize: '11px',
            fontFamily: 'JetBrains Mono, monospace',
            cursor: (captureState === 'captured' || captureState === 'holding') ? 'default' : 'pointer',
            opacity: (captureState === 'captured' || captureState === 'holding') ? 0.4 : 1,
          },
        }, currentOptional ? 'SKIP — DON\'T BIND THIS' : 'SKIP THIS INPUT')
      ),

      done && React.createElement('div', {
        style: { padding: '20px', textAlign: 'center', background: '#06070a', border: '1px solid #22c55e', marginBottom: '16px' },
      },
        React.createElement('div', { style: { fontFamily: 'Bebas Neue', fontSize: '24px', color: '#22c55e', letterSpacing: '0.05em' } }, '✓ CALIBRATION COMPLETE'),
        React.createElement('div', { style: { fontSize: '12px', color: '#9aa3b2', marginTop: '6px' } }, 'Test below, then save.')
      ),

      // Live state display (helps user verify mapping & diagnose issues)
      React.createElement('div', {
        style: { marginBottom: '6px', display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' },
      },
        React.createElement('span', { style: { fontSize: '10px', fontFamily: 'JetBrains Mono, monospace', color: '#9aa3b2' } }, 'LIVE STATE:'),
        !done && React.createElement('span', {
          style: {
            fontSize: '10px', fontFamily: 'JetBrains Mono, monospace',
            color: captureState === 'captured' ? '#22c55e'
                 : captureState === 'holding'  ? '#f5c518'
                                               : '#9aa3b2',
            fontWeight: 700, letterSpacing: '0.1em',
          },
        }, '● ' + captureState.toUpperCase())
      ),
      React.createElement('div', {
        style: {
          padding: '10px', background: '#06070a', border: '1px solid #1f2532',
          fontSize: '11px', fontFamily: 'JetBrains Mono, monospace', color: '#f0eee6',
          marginBottom: '16px', minHeight: '70px',
        },
      },
        // Buttons row — active buttons highlighted in green
        React.createElement('div', null,
          'Buttons: ',
          liveState.buttons.length === 0
            ? React.createElement('span', { style: { color: '#5b6478' } }, '(no controller)')
            : (liveState.buttons.some(p => p)
                ? liveState.buttons.map((p, i) => p ? i : null).filter(x => x != null).map((i, k) =>
                    React.createElement('span', {
                      key: k,
                      style: {
                        display: 'inline-block', padding: '1px 6px', margin: '0 2px',
                        background: '#22c55e', color: '#06070a', fontWeight: 700, borderRadius: '2px',
                      },
                    }, i)
                  )
                : React.createElement('span', { style: { color: '#5b6478' } }, '(none pressed)'))
        ),
        // Axes row — active (non-neutral) axes highlighted
        React.createElement('div', { style: { marginTop: '4px' } },
          'Axes: ',
          liveState.axes.length === 0
            ? React.createElement('span', { style: { color: '#5b6478' } }, '—')
            : liveState.axes.map((v, i) =>
                React.createElement('span', {
                  key: i,
                  style: {
                    display: 'inline-block', padding: '1px 5px', margin: '0 2px',
                    background: Math.abs(v) > 0.25 ? '#22c55e' : 'transparent',
                    color: Math.abs(v) > 0.25 ? '#06070a' : '#9aa3b2',
                    fontWeight: Math.abs(v) > 0.25 ? 700 : 400,
                    borderRadius: '2px',
                  },
                }, `${i}:${v.toFixed(2)}`)
              )
        ),
        done && React.createElement('div', {
          style: { marginTop: '8px', color: '#e7223a' },
        }, 'Numpad direction: ' + (() => {
          const gp = (navigator.getGamepads ? navigator.getGamepads() : [])[padIndex];
          if (!gp) return '—';
          return readDirection(gp, draft);
        })())
      ),

      // Mapping summary
      React.createElement('details', { style: { marginBottom: '16px' } },
        React.createElement('summary', { style: { cursor: 'pointer', fontSize: '11px', fontFamily: 'JetBrains Mono, monospace', color: '#9aa3b2' } }, 'CURRENT MAPPING'),
        React.createElement('pre', {
          style: { fontSize: '10px', color: '#f0eee6', background: '#06070a', padding: '8px', marginTop: '6px', overflow: 'auto', maxHeight: '120px' },
        }, JSON.stringify(draft, null, 2))
      ),

      // Footer buttons
      React.createElement('div', { style: { display: 'flex', gap: '8px', justifyContent: 'flex-end' } },
        React.createElement('button', {
          onClick: () => { setDraft({ padIndex: target?.padIndex || 0, buttons: {}, dpad: {}, axisDirs: {} }); setStep(0); },
          style: { background: 'none', border: '1px solid #2c3445', color: '#9aa3b2', padding: '8px 14px', fontSize: '11px', fontFamily: 'JetBrains Mono, monospace', cursor: 'pointer', letterSpacing: '0.1em' },
        }, 'RESTART'),
        React.createElement('button', {
          onClick: onClose,
          style: { background: 'none', border: '1px solid #2c3445', color: '#9aa3b2', padding: '8px 14px', fontSize: '11px', fontFamily: 'JetBrains Mono, monospace', cursor: 'pointer', letterSpacing: '0.1em' },
        }, 'CANCEL'),
        React.createElement('button', {
          // onSave is now solely responsible for dismissing the modal.
          // For single-phase recals it calls setGamepadCal(null); for
          // the Add Controller flow it transitions to phase 2 instead.
          // Calling onClose here would race with onSave's transition
          // (firing in the same tick) and wipe the in-flight draft
          // before phase 2 ever mounts.
          onClick: () => onSave({ ...draft, padIndex }),
          disabled: !done,
          style: {
            background: done ? '#e7223a' : '#2c3445',
            border: 'none', color: '#f0eee6', padding: '8px 18px',
            fontSize: '11px', fontFamily: 'JetBrains Mono, monospace',
            cursor: done ? 'pointer' : 'not-allowed', letterSpacing: '0.1em',
            fontWeight: 700,
          },
        }, 'SAVE MAPPING')
      )
    )
  );
}

// ── Character art ──────────────────────────────────────────
// Two image slots per character, both from `portraits/` next to the exe:
//
//   <Name>.png         — full-screen art for the hover backdrop
//   <Name>_editor.png  — art for the character editor page hero
//
// If <Name>_editor.png is missing, the editor page falls back to
// <Name>.png. If both are missing, falls back to the SVG silhouette.
//
// Probe order per slot: webp → png → jpg.
//
// Examples:
//   AKI.png, AKI_editor.png
//   M.Bison.png, M.Bison_editor.png
//   Dee Jay.png, Dee Jay_editor.png    (literal space preserved)
//
// Performance tip: 4K PNGs work but can be hefty. Convert to WebP for
// ~1/4 the size with no visible difference. From the portraits folder:
//   ffmpeg -i AKI.png -q:v 88 AKI.webp
// The component prefers .webp automatically — just drop it next to
// the .png and it takes over silently.

// Cache-bust token, regenerated on every page load. Browsers see
// /portraits/Ryu.png?_=1714680000000 as a different URL than the
// previous load, so they can't serve a cached version. Survives
// even Brave's stubborn image decoder cache.
const CACHE_BUST = '?_=' + Date.now();

function stillCandidates(name) {
  const enc = encodeURIComponent(name);
  return [
    `/portraits/${enc}.webp${CACHE_BUST}`,
    `/portraits/${enc}.png${CACHE_BUST}`,

// `<Name>2.*` candidates in order; uses an off-screen Image() to

// stays at opacity 0 — the grid + vignette still carry the page.

// ── KEYBOARD CALIBRATION MODAL ─────────────────────────────────
// Sibling of GamepadCalibration; same UX shape but listens for
// keydown events instead of polling navigator.getGamepads(). Walks
// through the same step list (gpStepsFor) so the calibrated profile
// is structurally identical to a gamepad profile — Classic = 10
// fight buttons + 4 directions + optional BACKSPACE/CLEAR/SHIFT;
// Modern = 8 buttons + 4 dirs + same optionals.
//
// Each step captures one KeyboardEvent.code string. Direction steps
// write to draft.dirKeys[LABEL]; button steps to draft.keys[LABEL];
// the SHIFT step to draft.hotkeys.modifier_key.
//
// Conflict check: no two steps can map to the same key code. When
// the user presses a key already bound by an earlier step, we
// flash a "Already used by <other label>" message and ignore the
// press. This mirrors the gamepad path's button-index conflict
// detection.
//
// The modal stays modal: all keydown events are captured globally
// while open (window-level listener) and preventDefault'd so the
// browser doesn't scroll/tab away. The user can cancel via the
// Cancel button or pressing Escape (which bubbles past our handler

function KeyboardCalibration({ onClose, onSave, onSkip, existing, target }) {

  const [draft, setDraft] = useState(() => {
    // Pre-populate from existing keyboard profile if we're
    // recalibrating. Same-scheme only — Modern recal doesn't
    // carry over Classic bindings, matching gamepad behavior.
    if (existing && existing.type === 'keyboard') {
      const schemeCal = existing.calibrations && existing.calibrations[controlType];
      if (schemeCal) {
        return {
          keys: { ...schemeCal.keys },
          dirKeys: { ...schemeCal.dirKeys },
        };
      }
      // No per-scheme record — use root for Classic, empty for Modern
      if (controlType === 'classic') {
        return {
          keys: { ...(existing.keys || {}) },
          dirKeys: { ...(existing.dirKeys || {}) },
        };
      }
    }
    return { keys: {}, dirKeys: {} };
  });
  const [shiftKey, setShiftKey] = useState(
    existing && existing.hotkeys && existing.hotkeys.modifier_key || ''

  // the next successful press.
  const [conflict, setConflict] = useState('');

  // name). Pre-populated with a sensible default for new keyboards.
  const [profileName, setProfileName] = useState(() =>
    (existing && existing.name) || 'Keyboard'
  );

  const cur = STEPS[step];
  const done = step >= STEPS.length;

  // Build a reverse lookup: which label currently owns each key code?
  // Used both for conflict detection and for the "✓ already calibrated"
  // hint when re-running the modal.
  const ownerOf = useMemo(() => {
    const map = {};
    for (const k in draft.keys) if (draft.keys[k]) map[draft.keys[k]] = k;
    for (const k in draft.dirKeys) if (draft.dirKeys[k]) map[draft.dirKeys[k]] = k;
    if (shiftKey) map[shiftKey] = 'SHIFT';

  }, [draft, shiftKey]);

  // to the current step, then advances. Auto-repeat fires are ignored
  // (e.repeat); only the rising edge counts. We DON'T preventDefault
  // Escape so the user can always escape the modal via that key
  // (handled by the parent's onClose binding).

        setDraft(d => ({ ...d, dirKeys: { ...d.dirKeys, [cur.label]: e.code } }));
      } else {
        setDraft(d => ({ ...d, keys: { ...d.keys, [cur.label]: e.code } }));
      }
      setStep(s => s + 1);
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [step, done, ownerOf, cur]);

  function handleSkip() {
    setConflict('');
    setStep(s => s + 1);
  }

  function handleFinish() {
    onSave({
      controlType,
      name: profileName.trim() || 'Keyboard',
      keys: draft.keys,
      dirKeys: draft.dirKeys,
      modifier_key: shiftKey || null,
    });
  }

  return React.createElement('div', {
    className: 'fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-[70]',
    onClick: (e) => { if (e.target === e.currentTarget) onClose(); },
  },
    React.createElement('div', {
      className: 'bg-ink-card border border-line-strong p-6 max-w-md w-full mx-4',
    },
      React.createElement('div', { className: 'text-[10px] font-mono uppercase tracking-[0.3em] text-blood mb-1' }, '⌨️ KEYBOARD CALIBRATION'),
      React.createElement('h2', { className: 'font-display text-3xl tracking-wider mb-4' },
        controlType === 'modern' ? 'MODERN' : 'CLASSIC'),
      // Profile name editor — only shown on new-profile flow (no profileId)
      !target?.profileId && React.createElement('div', { className: 'mb-4' },
        React.createElement('div', { className: 'text-[10px] font-mono uppercase tracking-wider text-paper-mute mb-1' }, 'Profile name'),
        React.createElement('input', {
          type: 'text',
          value: profileName,

          className: 'w-full bg-ink-deep border border-line-strong px-2 py-1 text-sm font-mono text-paper',
        }),
      ),
      // Progress indicator
      React.createElement('div', { className: 'text-[11px] text-paper-mute font-mono mb-3' },
        done ? 'All bindings captured.' : `Step ${step + 1} of ${STEPS.length}`),
      // Current-step display
      !done && React.createElement('div', { className: 'border border-line p-4 bg-ink-deep mb-3' },
        React.createElement('div', { className: 'text-[10px] font-mono uppercase tracking-wider text-paper-mute mb-1' }, 'Press the key for'),
        React.createElement('div', { className: 'font-display text-3xl tracking-wider text-paper mb-2' }, cur.label),
        cur.description && React.createElement('div', { className: 'text-[10px] text-paper-mute mb-2 italic' }, cur.description),
        // Existing binding hint (if recalibrating)
        cur.kind === 'shift' && shiftKey && React.createElement('div', { className: 'text-[10px] text-paper-mute font-mono' },
          'Currently: ', React.createElement('span', { className: 'text-paper' }, shiftKey)),
        cur.kind === 'dir' && draft.dirKeys[cur.label] && React.createElement('div', { className: 'text-[10px] text-paper-mute font-mono' },
          'Currently: ', React.createElement('span', { className: 'text-paper' }, draft.dirKeys[cur.label])),
        cur.kind === 'btn' && draft.keys[cur.label] && React.createElement('div', { className: 'text-[10px] text-paper-mute font-mono' },
          'Currently: ', React.createElement('span', { className: 'text-paper' }, draft.keys[cur.label])),
        // Conflict warning

          }, 'Save'),
        ),

    ),
  );
}

          total: sortedCharacters.length,
          isHovered: hoveredChar === c.name,
          exiting: !!exiting,
          isPicked: pendingChar === c.name,
          pickedRect: pendingChar === c.name ? pickedRect : null,
          // Capture the card's bounding rect at click time and forward
          // it up so App can drive the folder-expand animation.
          onClick: (e) => {
            const r = e.currentTarget.getBoundingClientRect();
            onPick(c.name, {
              x: r.left, y: r.top, w: r.width, h: r.height,
            });
          },
          onEnter: () => onCardEnter(c.name),
          onLeave: onCardLeave,
        }))
      )
    )
  );
}

// Full-screen background art stage. Mounts whenever a name is hovered.
// Uses internal state to flip the .in class on the next paint so the
// CSS transition actually plays (rather than snapping to the end state).
function BgArtStage({ name }) {
  const [shown, setShown] = useState(false);
  const [renderName, setRenderName] = useState(null);
  const [fastMode, setFastMode] = useState(false);
  const fadeOutTimer = useRef(null);
  const swapTimer = useRef(null);

  useEffect(() => {
    if (fadeOutTimer.current) { clearTimeout(fadeOutTimer.current); fadeOutTimer.current = null; }
    if (swapTimer.current)    { clearTimeout(swapTimer.current);    swapTimer.current = null; }

    if (!name) {
      // No card hovered — full cinematic fade-out
      setFastMode(false);
      setShown(false);
      fadeOutTimer.current = setTimeout(() => setRenderName(null), 540);
      return () => {
        if (fadeOutTimer.current) clearTimeout(fadeOutTimer.current);
      };
    }

    if (!renderName) {
      // First-time mount (null → name): cinematic enter
      setFastMode(false);
      setRenderName(name);
      requestAnimationFrame(() => requestAnimationFrame(() => setShown(true)));
      return;
    }

    if (renderName === name) return;

    // Cross-fade name1 → name2 — fast, brisk transition
    setFastMode(true);
    setShown(false);
    swapTimer.current = setTimeout(() => {
      setRenderName(name);
      requestAnimationFrame(() => requestAnimationFrame(() => setShown(true)));
    }, 200);

    return () => {
      if (swapTimer.current) clearTimeout(swapTimer.current);
    };
  }, [name, renderName]);

  if (!renderName) return null;
  return React.createElement('div', { className: 'bg-art-stage' },
    React.createElement('div', {
      key: renderName,
      className: 'bg-art-layer' + (shown ? ' in' : '') + (fastMode ? ' fast' : ''),
    },
      React.createElement(Portrait, {
        name: renderName,
        className: 'anim-bg-kenburns',
      })
    )
  );
}

function CharCard({ char, index, total, onClick, isHovered, exiting, isPicked, pickedRect, onEnter, onLeave }) {
  const status = [];
  if (char.has_combonotes) status.push('COMBOS');
  if (char.has_notes) status.push('NOTES');
  const badge = status.length ? status.join(' · ') : (char.folder_exists ? 'NO EDITS' : 'NO FOLDER');

  // Stagger logic. The picked card uses the folder-expand animation
  // INSTEAD of card-out — it morphs from grid rect to fullscreen
  // rather than sliding off-screen with its neighbors.
  let animClass, animDelay, extraStyle = {};
  if (exiting) {
    if (isPicked) {
      animClass = 'card-expand';
      animDelay = '0ms';
      // Compute CSS custom props from the rect we were handed.
      // Defensive defaults in case rect didn't make it through
      // (e.g. mid-resize race): fall back to a centered, modest
      // 1.4x scale so the picked card still feels distinct.
      if (pickedRect) {
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        // With transform-origin: 50% 50%, the translate value needs
        // to move the card's CENTER to the viewport's CENTER (not
        // its top-left to (0,0) — that was the old, corner-origin
        // approach which made rotation pivot off the top-left and
        // fling the card off-screen).
        //   card_center_x = rect.x + rect.w/2
        //   want card_center to land at vw/2
        //   so tx = (vw/2) - (rect.x + rect.w/2)
        const tx = (vw / 2) - (pickedRect.x + pickedRect.w / 2);
        const ty = (vh / 2) - (pickedRect.y + pickedRect.h / 2);
        const sx = vw / Math.max(pickedRect.w, 1);
        const sy = vh / Math.max(pickedRect.h, 1);
        extraStyle = {
          // Lock the card's position to where it was at click time
          // — once we switch to position:fixed in .card-expand, we
          // need explicit coords or it'd jump to (0,0).
          left: pickedRect.x + 'px',
          top:  pickedRect.y + 'px',
          width:  pickedRect.w + 'px',
          height: pickedRect.h + 'px',
          '--fx-tx': tx + 'px',
          '--fx-ty': ty + 'px',
          '--fx-sx': sx,
          '--fx-sy': sy,
        };
      }
    } else {
      animClass = 'card-out';
      const cols = 5;
      const row = Math.floor(index / cols);
      const col = index % cols;
      const diag = row + col;
      animDelay = `${Math.min(diag, 12) * 35}ms`;
    }
  } else {
    animClass = 'card-in';
    animDelay = `${Math.min(index, 30) * 60}ms`;
  }

  return React.createElement('button', {
    onClick,
    disabled: exiting,
    onMouseEnter: onEnter,
    onMouseLeave: onLeave,
    onFocus: onEnter,
    onBlur: onLeave,
    'data-hovered': isHovered ? 'true' : 'false',
    style: { animationDelay: animDelay, ...extraStyle },
    className: cx(
      animClass,
      'char-card group text-left bg-ink-card border border-line h-[112px] block focus:outline-none',
      isPicked && exiting && 'is-picked'
    ),
  },
    React.createElement('span', { className: 'char-index select-none' },
      String(index + 1).padStart(2, '0')
    ),
    // (In-card portrait intentionally omitted — the only character art
    //  shown is the full-screen background that flies in via BgArtStage.)
    React.createElement('div', { className: 'relative z-[2] p-3 h-full flex flex-col justify-between' },
      React.createElement('div', {
        className: 'flex items-center gap-2',
        style: { paddingRight: 56, minWidth: 0 },
      },
        React.createElement('span', {
          className: cx('status-dot', char.folder_exists ? 'on' : 'off'),
          style: { flexShrink: 0 },
        }),
        React.createElement('span', {
          className: 'char-name font-display text-xl tracking-wider text-paper leading-none',
          style: {
            minWidth: 0,
            overflow: 'hidden',
            textOverflow: 'ellipsis',
            whiteSpace: 'nowrap',
            display: 'block',
            flex: '1 1 auto',
          },
        }, char.name.toUpperCase())
      ),
      React.createElement('div', {
        className: 'char-meta text-[9px] font-mono uppercase tracking-[0.2em] text-paper-dim',
      }, badge)
    )
  );
}

// ── Character page ─────────────────────────────────────────
// Combo slot capacity constants — module-scope so CharacterPage,
// CombosTab, and VideoTab can all reference them without prop-drilling.
// These MUST match the Lua side (COMBO_MAX_SLOTS / COMBO_MAX_ACTIVE in
// SF6_Overlay.lua) and the Python side (server.py same names). If you
// bump one, bump all three or saved files will desync between the
// game-side overlay and the web editor.
const COMBO_MAX_SLOTS  = 30;
const COMBO_MAX_ACTIVE = 5;

function CharacterPage({ name, data, onSave, toast, activeProfile, onOpenShiftConfig }) {
  const [tab, setTab] = useState('combos');
  const [notes, setNotes] = useState(data.notes.notes || '');
  const [links, setLinks] = useState(Array.isArray(data.notes.links) ? data.notes.links : []);
  // Per-character video favorites — saved alongside notes & links in
  // notes.json. Each entry: { label, url, timestamp }. Rendered in
  // a table below the SHIFT legend on the left sidebar; populated
  // from the Video tab's "save current as favorite" button. URL
  // includes the timestamp baked in (?t=Ns) so click-loading takes
  // the player straight to the saved moment.
  const [favorites, setFavorites] = useState(
    Array.isArray(data.notes.favorites) ? data.notes.favorites : []
  );
  // Live player ref bridge — VideoTab registers its YouTube player
  // ref here on mount so other parts of the page (the favorites bar
  // in the sidebar, primarily) can read currentTime and load saved
  // URLs without having to live inside VideoTab's subtree. Null when
  // the Video tab isn't mounted.
  const playerBridgeRef = useRef(null);
  // Per-character control scheme. Defaults to 'classic' for back-compat
  // with notes.json files written before this field existed (server
  // returns the default when reading a file without the key, but we
  // also defensively fall back here in case the read path skips it).
  // 'modern' switches the combo palette to Light/Medium/Hard/SP/Auto/
  // Throw/DI/DP. Stored on notes.json (same channel as profile text /
  // links) since the Lua side doesn't write that file — preserves the
  // setting against round-trips through the in-game overlay.
  const [controlScheme, setControlScheme] = useState(
    data.notes.control_scheme === 'modern' ? 'modern' : 'classic'
  );
  // Two parallel slot sets — Classic and Modern combos are stored
  // separately on disk (combonotes.json vs moderncombonotes.json) so
  // a user who flips the per-character scheme keeps each set's combos
  // intact. The active set is selected by controlScheme; only that
  // set's setter is used while the user edits.

  // Pad a slot array up to COMBO_MAX_SLOTS. The server also pads on
  // read (pad_combonotes), but a defense-in-depth pad here means the
  // editor still renders 30 slot buttons even if a user happens to
  // open a stale file directly or the server pad regresses. Active
  // flags on new tail slots default to false so they can't push the
  // active count over COMBO_MAX_ACTIVE silently.
  const padSlots = (arr) => {
    const out = Array.isArray(arr) ? arr.slice(0, COMBO_MAX_SLOTS) : [];
    for (let i = out.length; i < COMBO_MAX_SLOTS; i++) {
      out.push({ title: `Slot ${i + 1}`, active: false, counter: 0, tokens: [] });
    }
    return out;
  };

  const [slotsClassic, setSlotsClassic] = useState(padSlots(data.combos.slots));
  const [slotsModern,  setSlotsModern]  = useState(
    padSlots(data.combos_modern && data.combos_modern.slots)
  );
  // Active slot index is shared across schemes — switching scheme
  // keeps you on the same slot number (1..30), just with the other
  // file's content. Both slot sets are pre-padded to COMBO_MAX_SLOTS
  // by padSlots() above, so no out-of-bounds check needed.
  const [activeSlot, setActiveSlot] = useState(0);
  // Dirty tracking is per-scheme: editing Classic combos doesn't
  // dirty the Modern set or vice versa. Notes/links remain a single
  // shared bucket since they're not scheme-specific.
  const [dirty, setDirty] = useState({
    notes: false,
    combosClassic: false,
    combosModern: false,
  });

  // ── Live refresh from disk ─────────────────────────────────
  // The in-game overlay (SF6_Overlay.lua) writes the same JSON files
  // this editor reads. Without polling, edits made in-game don't
  // appear in this page until the user backs out and re-enters the
  // character. We poll an mtime-only endpoint every 1.5s; when a
  // file's mtime changes AND that scheme is not dirty in the editor,
  // we refetch the full payload and silently swap the slots in.
  //
  // Rules to keep this "clean":
  //   1. Skip the poll entirely while the tab is hidden (visibility
  //      API). No background work when nobody's looking.
  //   2. Never overwrite a scheme that has unsaved edits — the user's
  //      draft wins. Their dirty flag stays set; the SAVE button
  //      will push their version on click (last-write-wins, which
  //      is also the existing behavior).
  //   3. Notes/links/favorites refresh only if dirty.notes is false.
  //   4. Mtime tracking lives in a ref so advancing the cursor
  //      doesn't cause a re-render — only an actual content swap
  //      goes through setState.
  //
  // The mtime baseline is seeded from data.mtime on initial load,
  // so polling never triggers a redundant refetch immediately after
  // the user navigates into the page.
  const lastMtimeRef = useRef({
    combos:        (data.mtime && data.mtime.combos)        || 0,
    combos_modern: (data.mtime && data.mtime.combos_modern) || 0,
    notes:         (data.mtime && data.mtime.notes)         || 0,
  });
  // Mirror the dirty flag set into a ref so the polling interval's
  // closure always reads current values without re-binding the
  // interval every render.
  const dirtyRef = useRef(dirty);
  useEffect(() => { dirtyRef.current = dirty; }, [dirty]);

  useEffect(() => {
    let cancelled = false;
    let inflight = false;

    const tick = async () => {
      if (cancelled || inflight) return;
      if (document.visibilityState !== 'visible') return;
      inflight = true;
      try {
        const m = await API.characterMtime(name);
        if (cancelled || !m) return;
        const seen = lastMtimeRef.current;
        const cur  = dirtyRef.current;
        // Decide which sections need refreshing. A section refreshes
        // only when its file mtime advanced AND it's clean in the
        // editor (so we don't clobber unsaved work).
        const needClassic = (m.combos        || 0) > (seen.combos        || 0) && !cur.combosClassic;
        const needModern  = (m.combos_modern || 0) > (seen.combos_modern || 0) && !cur.combosModern;
        const needNotes   = (m.notes         || 0) > (seen.notes         || 0) && !cur.notes;
        if (!needClassic && !needModern && !needNotes) {
          // Still advance baselines for sections that changed but are
          // dirty — once the user saves, we don't want to "rediscover"
          // the same external change. The save itself will refetch.
          // (Conservative: only bump baselines on a successful refetch
          // path. Skipping advance here is the safer choice and the
          // extra polls are negligible.)
          return;
        }
        const fresh = await API.character(name);
        if (cancelled || !fresh) return;
        // Re-read dirty in case the user started editing between the
        // mtime check and the fetch returning. Single-source-of-truth
        // is dirtyRef at the moment of swap.
        const cur2 = dirtyRef.current;
        if (needClassic && !cur2.combosClassic && fresh.combos && fresh.combos.slots) {
          setSlotsClassic(padSlots(fresh.combos.slots));
          lastMtimeRef.current.combos = (fresh.mtime && fresh.mtime.combos) || m.combos || 0;
        }
        if (needModern && !cur2.combosModern && fresh.combos_modern && fresh.combos_modern.slots) {
          setSlotsModern(padSlots(fresh.combos_modern.slots));
          lastMtimeRef.current.combos_modern = (fresh.mtime && fresh.mtime.combos_modern) || m.combos_modern || 0;
        }
        if (needNotes && !cur2.notes && fresh.notes) {
          if (typeof fresh.notes.notes === 'string') setNotes(fresh.notes.notes);
          if (Array.isArray(fresh.notes.links))      setLinks(fresh.notes.links);
          if (Array.isArray(fresh.notes.favorites))  setFavorites(fresh.notes.favorites);
          lastMtimeRef.current.notes = (fresh.mtime && fresh.mtime.notes) || m.notes || 0;
        }
      } catch (_e) {
        // Swallow polling errors — typical causes are a transient
        // 404 during folder rescan or the server momentarily
        // unavailable. The next tick will retry. We deliberately do
        // NOT toast: silent recovery is the goal here.
      } finally {
        inflight = false;
      }
    };

    // Fire one tick on focus return so the user sees fresh data
    // immediately after Alt-Tabbing back from the game, rather than
    // waiting up to a full poll interval.
    const onVisibility = () => {
      if (document.visibilityState === 'visible') tick();
    };
    document.addEventListener('visibilitychange', onVisibility);
    const id = setInterval(tick, 1500);
    return () => {
      cancelled = true;
      clearInterval(id);
      document.removeEventListener('visibilitychange', onVisibility);
    };
    // Re-bind only when the character changes. The mtime ref and
    // dirty ref shield us from needing other dependencies.
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [name]);

  // Active slots + setter routed by scheme. CombosTab/VideoTab work
  // on whichever scheme is currently selected; the inactive scheme's
  // state is held in reserve until the user switches back.
  const slots = controlScheme === 'modern' ? slotsModern : slotsClassic;
  const setSlots = controlScheme === 'modern' ? setSlotsModern : setSlotsClassic;
  // Dirty flag for the currently-active scheme. Tabs and SAVE button
  // use this; switching scheme switches which dirty flag is consulted.
  const dirtyCombosActive = controlScheme === 'modern' ? dirty.combosModern : dirty.combosClassic;

  // Supercombo wiki slug rules:
  //   - Page format is /w/Street_Fighter_6/<Slug>
  //   - Spaces -> underscores; hyphens and dots are preserved as-is.
  //   - Initialed names (E. Honda, M. Bison, A.K.I.) need explicit overrides
  //     because filesystem-friendly basenames strip the dots.
  const WIKI_SLUG_OVERRIDES = {
    'E_Honda':  'E._Honda',
    'M_Bison':  'M._Bison',
    'C_Viper':  'C.Viper',     // legacy/example — kept for completeness
    'AKI':      'A.K.I.',
    'A.K.I':    'A.K.I.',
    'A.K.I.':   'A.K.I.',
  };
  const wikiSlug = useMemo(() => {
    if (WIKI_SLUG_OVERRIDES[name]) return WIKI_SLUG_OVERRIDES[name];
    return name.replace(/ /g, '_');
  }, [name]);
  const wikiUrl = `https://wiki.supercombo.gg/w/Street_Fighter_6/${wikiSlug}`;
  const frameDataUrl = `${wikiUrl}/Frame_data`;

  const markNotesDirty = () => setDirty(d => ({ ...d, notes: true }));
  // Per-scheme dirty marker. The active scheme (decided by current
  // controlScheme) is what gets flagged when the user edits combos.
  // CombosTab/VideoTab call this without knowing the scheme — the
  // routing happens here.
  const markCombosDirty = () => setDirty(d => controlScheme === 'modern'
    ? { ...d, combosModern: true }
    : { ...d, combosClassic: true });

  const saveNotes = async () => {
    try {
      await onSave('notes', { notes, links, favorites, control_scheme: controlScheme });
      setDirty(d => ({ ...d, notes: false }));
      // Re-baseline the notes mtime so the live-refresh poll doesn't
      // fire a redundant refetch right after we just wrote the file.
      try {
        const m = await API.characterMtime(name);
        if (m) lastMtimeRef.current.notes = m.notes || lastMtimeRef.current.notes;
      } catch (_e) { /* best-effort */ }
      toast('Profile notes saved', 'good');
    } catch (e) { toast('Save failed: ' + e.message, 'bad'); }
  };

  // ── Favorites helpers ─────────────────────────────────────
  // Unlike notes/links/combos, favorites auto-persist on add/remove.
  // The user expectation matches Spotify/YouTube playlist behavior:
  // hit "favorite", it's saved, no separate SAVE button needed. We
  // also send the rest of the notes payload through so we don't
  // silently overwrite unsaved notes-tab edits — the user's draft
  // there stays intact in memory but on disk we round-trip the last
  // saved values for notes/links, which is the safest behavior.
  // The list mutation is passed in (rather than computed from
  // current state) so callers can append/remove cleanly.
  const persistFavorites = useCallback(async (nextFavorites) => {
    setFavorites(nextFavorites);
    try {
      await onSave('notes', {
        notes, links, favorites: nextFavorites, control_scheme: controlScheme,
      });
    } catch (e) {
      toast('Could not save favorite: ' + (e.message || 'unknown'), 'bad');
    }
  }, [notes, links, controlScheme, onSave, toast]);

  const addFavorite = useCallback(async (fav) => {
    // fav: { label, url, timestamp }. Dedupe on url+timestamp so
    // pressing the button twice on the same moment doesn't pile up
    // duplicates (each entry has a slight time delta otherwise).
    const exists = favorites.some(f =>
      f.url === fav.url && Math.abs((f.timestamp || 0) - (fav.timestamp || 0)) < 0.5
    );
    if (exists) {
      toast('Favorite already saved', 'good');
      return;
    }
    const next = [...favorites, fav];
    await persistFavorites(next);
    toast('Favorite added', 'good');
  }, [favorites, persistFavorites, toast]);

  const removeFavorite = useCallback(async (index) => {
    const next = favorites.slice();
    next.splice(index, 1);
    await persistFavorites(next);
  }, [favorites, persistFavorites]);

  // Load a favorite into the active VideoTab slot. Two cases:
  //   1. Video tab is mounted → use the player bridge to seek
  //      directly without a slot-state round-trip. Snappy.
  //   2. Video tab isn't mounted → switch to it; the URL is
  //      already in the favorite, but we don't have a way to push
  //      it into the active slot without knowing which slot is
  //      active. Simpler: tell the user to switch tabs. We auto-
  //      switch to Video tab as a courtesy.
  // The URL we save HAS the ?t=Ns timestamp baked in, so even
  // pasting it into a fresh slot works (parseTimestampParam will
  // pick up the t param and set videoTimestamp).
  const playFavorite = useCallback((fav) => {
    if (tab !== 'video') {
      setTab('video');
      toast('Switched to Video tab — paste the URL into a slot', 'good');
      return;
    }
    const bridge = playerBridgeRef.current;
    if (bridge && bridge.loadUrl) {
      bridge.loadUrl(fav.url, fav.timestamp || 0);
    } else {
      toast('Player not ready — try again in a second', 'bad');
    }
  }, [tab, toast]);

  // Scheme change. Two cases:
  //   1. The active scheme has unsaved combo edits → confirm first.
  //      Discarding switches and the unsaved edits stay in memory
  //      (they'd come back if the user flips back without leaving the
  //      page), but the dirty flag is cleared on the destination
  //      scheme so the SAVE button shows the correct state for the
  //      new view.
  //   2. No pending edits → switch immediately.
  // In both cases the new scheme is persisted to notes.json so it
  // survives page reloads. Saving notes here also keeps notes/links
  // intact (we send the current values rather than a partial update).
  const setControlSchemeAndSave = useCallback(async (next) => {
    if (next === controlScheme) return;
    const activeDirty = controlScheme === 'modern' ? dirty.combosModern : dirty.combosClassic;
    if (activeDirty) {
      const ok = confirm(
        `You have unsaved ${controlScheme} combo edits. ` +
        `Switching to ${next} will keep those edits in memory but they ` +
        `won't be saved to disk until you SAVE. Continue?`
      );
      if (!ok) return;
    }
    setControlScheme(next);
    try {
      await onSave('notes', { notes, links, favorites, control_scheme: next });
      toast(`Control scheme: ${next}`, 'good');
    } catch (e) {
      toast('Could not save scheme: ' + (e.message || 'unknown'), 'bad');
    }
  }, [controlScheme, dirty.combosModern, dirty.combosClassic, notes, links, favorites, onSave, toast]);

  // Manual save — fires when the user clicks SAVE CHANGES. Writes to
  // whichever per-scheme file matches the active scheme:
  //   classic → /api/character/{name}/combos        → combonotes.json
  //   modern  → /api/character/{name}/combos_modern → moderncombonotes.json
  // Toasts on both success and failure so the user gets clear
  // feedback. Each scheme's dirty flag clears independently after a
  // successful save.
  const saveCombos = async () => {
    const section = controlScheme === 'modern' ? 'combos_modern' : 'combos';
    const slotsToSave = controlScheme === 'modern' ? slotsModern : slotsClassic;
    try {
      await onSave(section, { slots: slotsToSave });
      setDirty(d => controlScheme === 'modern'
        ? { ...d, combosModern: false }
        : { ...d, combosClassic: false });
      // After a successful save, the file mtime has advanced on disk
      // but we already hold the canonical content. Re-baseline the
      // poll's mtime tracker so the next tick doesn't fire a redundant
      // refetch of the same data we just wrote.
      try {
        const m = await API.characterMtime(name);
        if (m) {
          if (controlScheme === 'modern') {
            lastMtimeRef.current.combos_modern = m.combos_modern || lastMtimeRef.current.combos_modern;
          } else {
            lastMtimeRef.current.combos = m.combos || lastMtimeRef.current.combos;
          }
        }
      } catch (_e) { /* baseline refresh is best-effort */ }
      toast(`${controlScheme === 'modern' ? 'Modern' : 'Classic'} combos saved`, 'good');
    } catch (e) {
      toast('Combo save failed: ' + (e.message || 'unknown'), 'bad');
    }
  };

  const tabs = [
    { id: 'combos', label: dirtyCombosActive ? 'Combos · ●'  : 'Combos' },
    { id: 'video',  label: dirtyCombosActive ? 'Video · ●'   : 'Video' },
    { id: 'notes',  label: dirty.notes       ? 'Profile · ●' : 'Profile' },
    { id: 'links',  label: dirty.notes       ? 'Links · ●'   : 'Links' },
  ];

  return React.createElement('div', { className: 'cp-page' },
    // Backdrop stack — fixed-position, mounted per character
    React.createElement('div', { className: 'cp-grid-bg' }),
    React.createElement(CharacterBackdrop, { name }),

// ── Combos tab ─────────────────────────────────────────────
// ── Combo tab fly-in helpers ───────────────────────────────
// `flyDelay()` returns an inline style with a randomized delay in
// the [0, 700) ms range, biased early via Math.pow(rand, 0.7) so
// the assembly opens fast and trails off naturally instead of
// crashing in at the end. Each call is independent → if you need
// matching delays for paired elements, hold a single value in a
// useMemo(). Re-render of CombosTab generates a fresh shuffle.
function flyDelay() {
  const t = Math.pow(Math.random(), 0.7) * 700;
  return { animationDelay: `${Math.round(t)}ms` };
}

// Inline notation pill — mirrors the SegmentedRow used in the Settings
// dialog but as a compact single-control widget for the character page
// header. Reads/writes the global notation setting via SettingsCtx.
// The two halves act as a connected two-state segmented control: the
// active half is filled (blood-red), the inactive half is outlined.
function NotationPill() {
  const settings = useSettings();
  const active = settings.notation || 'numpad';
  const set = (v) => {
    if (v !== active && settings.updateSettings) {
      settings.updateSettings({ notation: v });
    }
  };
  // Reuse cp-btn-link aesthetic so it sits naturally next to WIKI / FRAME DATA.
  // Connected pill = single border, internal divider, no gap between halves.
  const half = (label, value) => React.createElement('button', {
    onClick: () => set(value),
    title: value === 'numpad'
      ? 'Numpad notation: 1–9 (FAT/FGC standard)'
      : 'Letter notation: D/F/B/U + QCF/DP/HCB shorthand',
    style: {
      padding: '4px 12px',
      fontSize: '11px',
      fontFamily: 'JetBrains Mono, monospace',
      fontWeight: 700,
      letterSpacing: '0.1em',
      textTransform: 'uppercase',
      background: active === value ? '#9a0f1f' : 'transparent',
      color: active === value ? '#fff' : '#9aa3b2',
      border: 'none',
      cursor: active === value ? 'default' : 'pointer',
      transition: 'background 120ms, color 120ms',
    },
  }, label);
  return React.createElement('div', {
    style: {
      display: 'inline-flex',
      border: '1px solid #9a0f1f',
      borderRadius: '4px',
      overflow: 'hidden',
      marginLeft: '4px',
    },
  },
    half('Numpad', 'numpad'),
    React.createElement('div', { style: { width: '1px', background: '#9a0f1f' } }),
    half('Letters', 'letters'),
  );
}

// ShiftLegendPanel — shows the active controller profile's SHIFT
// modifier and per-action bindings for the current control scheme.
// Renders in the empty space on the left side of the character page
// (positioned absolutely so it sits outside the main 7xl-constrained
// content column). Hidden gracefully when there's no active profile,
// no modifier configured, or no bindings set for the active scheme —
// no point showing an empty legend.
//
// Reads from activeProfile.hotkeys:
//   - modifier_label / modifier — modifier button display name
//   - bindings (Classic) / bindings_modern (Modern) — action→button map
function ShiftLegendPanel({ activeProfile, controlScheme, onOpenShiftConfig, favorites, onPlayFavorite, onRemoveFavorite }) {
  // Read the modifier + bindings for the active scheme. Each block
  // can independently be "missing" and the panel surfaces that with
  // its own placeholder so the user knows WHY there's no binding row
  // for a given action (no profile? no modifier? unset bindings?
  // they all look the same without explicit messages).
  const hk = (activeProfile && activeProfile.hotkeys) || null;
  const modLabel = hk
    ? (hk.modifier_label
        || hk.modifier
        || (hk.modifier_index != null ? `Button ${hk.modifier_index}` : '')
        || (hk.modifier_axis ? `Axis ${hk.modifier_axis.index}` : ''))
    : '';
  const bindings = hk
    ? (controlScheme === 'modern' ? (hk.bindings_modern || {}) : (hk.bindings || {}))
    : {};
  const boundEntries = HOTKEY_ACTIONS
    .map(a => ({ action: a, btn: bindings[a.key] }))
    .filter(e => e.btn);

  // BTN_DISPLAY: same map as HotkeysPanel. Direction arrows + short
  // Modern button forms keep the chip compact.
  const BTN_DISPLAY = {
    UP: '↑', DOWN: '↓', LEFT: '←', RIGHT: '→',
    LP: 'LP', MP: 'MP', HP: 'HP', LK: 'LK', MK: 'MK', HK: 'HK',
    LIGHT: 'L', MEDIUM: 'M', HARD: 'H',
    SP: 'SP', AUTO: 'Au', THROW: 'Th', DI: 'DI', DP: 'DP',
  };
  const displayBtn = (b) => BTN_DISPLAY[b] || b;

  // Strip 'insert:' prefix for compactness — 'insert:CH' → 'CH'.
  // Editor actions keep their original "Insert >" / "Backspace" labels.
  const actionLabel = (a) => {
    if (a.key.startsWith('insert:')) return a.key.slice(7);
    return a.label;
  };

  // Permanent panel. No auto-hide — always renders with whatever
  // state is appropriate so the user always knows where to look for
  // their bindings. The three "incomplete" states each get a distinct
  // hint so the user knows what to do to fill them in.
  return React.createElement('div', {
    className: 'cp-side-card bg-ink-card border border-line p-3 h-fit',
  },
    // Header — title with scheme.
    React.createElement('div', {
      className: 'cp-label px-1 mb-2',
    }, controlScheme === 'modern' ? 'SHIFT · MODERN' : 'SHIFT · CLASSIC'),

    // Modifier badge or placeholder. The user holds this while
    // pressing action buttons to fire shortcuts in the editor.
    React.createElement('div', {
      className: 'flex items-center gap-2 mb-2 pb-2 border-b border-line',
    },
      React.createElement('span', {
        className: 'text-[10px] font-mono uppercase text-paper-mute',
      }, 'HOLD:'),
      modLabel
        ? React.createElement('span', {
            className: 'px-2 py-0.5 text-xs font-mono border border-blood text-paper bg-blood/20',
          }, modLabel)
        : React.createElement('span', {
            className: 'px-2 py-0.5 text-xs font-mono border border-line-strong text-paper-dim italic',
          }, 'not set')
    ),

    // State 1: No active profile at all (no controller calibrated).
    !hk && React.createElement('div', {
      className: 'text-[10px] font-mono text-paper-dim leading-relaxed py-2',
    },
      'No active controller profile. Calibrate one in Settings → Gamepad to enable in-editor SHIFT shortcuts.'
    ),

    // State 2: Profile exists but no modifier was set.
    hk && !modLabel && React.createElement('div', {
      className: 'text-[10px] font-mono text-paper-dim leading-relaxed py-2',
    },
      'No modifier configured for this profile. Set it during calibration (the SHIFT step) — RECAL the profile from Settings → Gamepad.'
    ),

    // State 3: Profile + modifier OK but no bindings for this scheme yet.
    hk && modLabel && boundEntries.length === 0 && React.createElement('div', {
      className: 'text-[10px] font-mono text-paper-dim leading-relaxed py-2',
    },
      `No ${controlScheme} bindings yet. Open Settings → Gamepad → SHIFT CONFIG and select the ${controlScheme === 'modern' ? 'MODERN' : 'CLASSIC'} tab to configure.`
    ),

    // State 4 (the happy path): bindings exist — render the list.
    hk && modLabel && boundEntries.length > 0 && React.createElement('div', { className: 'space-y-1' },
      boundEntries.map(({ action, btn }) =>
        React.createElement('div', {
