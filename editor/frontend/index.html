function CombosTab({ name, slots, setSlots, activeSlot, setActiveSlot, onSave, dirty, markDirty, controlScheme, activeProfile }) {
  const slot = slots[activeSlot] || { title: '', tokens: [], active: false, counter: 0 };

  // ── Cursor state ──────────────────────────────────────────
  // Insert position within slot.tokens. 0 = before token 1, N = after
  // token N. Behaves like a text-editor caret: clicking on a token's
  // left half moves cursor to its left, right half to its right.
  // New tokens insert at this position. Backspace deletes left of it.
  const [cursorIdx, setCursorIdx] = useState(0);

  // Reset cursor to end-of-slot whenever the active slot or character
  // changes — that way new clicks default to "append" (the old behavior).
  useEffect(() => {
    setCursorIdx((slot.tokens || []).length);
    // Intentionally NOT depending on slot.tokens.length — we only want
    // to reset on slot/char switches, not on every edit.
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [activeSlot, name]);

  // Bump key whenever the character changes so the fly-in replays
  // when the user navigates between roster entries. We DON'T bump on
  // every slot/token edit — that would cause every keystroke to
  // trigger a stamp-in (visually disastrous). Only the character
  // identity matters for replay.
  const shuffleKey = useMemo(() => `${name}-${Math.random()}`, [name]);

  const updateSlot = (changes) => {
    const next = slots.slice();
    next[activeSlot] = { ...slot, ...changes };
    setSlots(next);
    markDirty();
  };

  // ── Undo / Redo ────────────────────────────────────────────
  // History is an array of token-array snapshots. Each token-mutating
  // action (addToken, popToken, clearTokens) pushes a snapshot of the
  // PRIOR state onto undoStack and clears redoStack — standard undo
  // semantics. History is per-(character, slot): switching character
  // or slot resets both stacks. Cursor is NOT tracked; we park it at
  // end-of-tokens after each undo/redo (least-surprising default).
  const [undoStack, setUndoStack] = useState([]);
  const [redoStack, setRedoStack] = useState([]);
  useEffect(() => {
    setUndoStack([]);
    setRedoStack([]);
  }, [activeSlot, name]);

  // Snapshot helper — call BEFORE mutating tokens. Pushes current state
  // onto undoStack and clears redoStack (any new edit invalidates redo
  // history, mirroring text-editor convention). Capped at 100 entries.
  const snapshot = () => {
    setUndoStack(s => {
      const next = s.concat([slot.tokens || []]);
      return next.length > 100 ? next.slice(next.length - 100) : next;
    });
    setRedoStack([]);
  };
  const undo = () => {
    if (!undoStack.length) return;
    const prev = undoStack[undoStack.length - 1];
    setUndoStack(s => s.slice(0, -1));
    setRedoStack(s => s.concat([slot.tokens || []]));
    const next = slots.slice();
    next[activeSlot] = { ...slot, tokens: prev };
    setSlots(next);
    markDirty();
    setCursorIdx(prev.length);
  };
  const redo = () => {
    if (!redoStack.length) return;
    const fwd = redoStack[redoStack.length - 1];
    setRedoStack(s => s.slice(0, -1));
    setUndoStack(s => s.concat([slot.tokens || []]));
    const next = slots.slice();
    next[activeSlot] = { ...slot, tokens: fwd };
    setSlots(next);
    markDirty();
    setCursorIdx(fwd.length);
  };

  // Cursor-aware mutators. Insert splices at cursor and bumps it
  // forward; backspace deletes the token immediately left of cursor;
  // clear wipes everything and parks cursor at 0.
  //
  // Motion-collapse on attack: if the incoming token is a real attack
  // strike AND the trailing dir tokens spell out a recognized motion
  // (236/214/623/etc.), collapse them into a single motion token plus
  // the attack — matching the gamepad poller's behavior. Bare motions
  // without an attack stay as separate dirs so backspace gives natural
  // rollback. System/annotation/cancel buttons (xx, DR, DI, etc.) skip
  // collapse — see isCollapsingAttackToken.
  const addToken = (tok) => {
    const cur = (slot.tokens || []);
    const i = Math.max(0, Math.min(cursorIdx, cur.length));
    if (isCollapsingAttackToken(tok)) {
      const m = detectTailMotionAtCursor(cur, i);
      if (m) {
        const motionTok = tokenForCell(m.name, 'motion');
        const next = [...cur.slice(0, i - m.n), motionTok, tok, ...cur.slice(i)];
        snapshot();
        updateSlot({ tokens: next });
        // After collapse the cursor sits just past the inserted attack.
        // The tail had m.n dir tokens; we replaced them with 2 tokens
        // (motion + attack), so the new cursor is i - m.n + 2.
        setCursorIdx(i - m.n + 2);
        return;
      }
    }
    const next = [...cur.slice(0, i), tok, ...cur.slice(i)];
    snapshot();
    updateSlot({ tokens: next });
    setCursorIdx(i + 1);
  };
  const popToken = () => {
    const cur = (slot.tokens || []);
    if (cursorIdx <= 0 || cur.length === 0) return;
    const i = Math.min(cursorIdx, cur.length);
    const next = [...cur.slice(0, i - 1), ...cur.slice(i)];
    snapshot();
    updateSlot({ tokens: next });
    setCursorIdx(i - 1);
  };
  const clearTokens = () => {
    snapshot();
    updateSlot({ tokens: [] });
    setCursorIdx(0);
  };

  // Atomically replace the trailing N consecutive direction tokens
  // with a single motion token followed by an attack token. Used by
  // the gamepad poller's motion-detection path: when 2→3→6→HP is
  // detected, the three trailing dir tokens are collapsed into one
  // 236 motion token + the HP attack token. One snapshot, one
  // updateSlot — undo treats the whole motion as a single edit.
  //
  // Returns true on success. Returns false (and does nothing) if the
  // tail doesn't have N consecutive {t:'dir'} tokens — caller should
  // fall back to plain attack emission.
  const replaceTrailingDirs = (n, motionTok, attackTok) => {
    const cur = (slot.tokens || []);
    const i = Math.max(0, Math.min(cursorIdx, cur.length));
    // Walk back from cursor — must find n consecutive dir tokens with
    // single-digit numpad values (1-9, not motion strings like '236').
    if (i < n) return false;
    for (let k = 0; k < n; k++) {
      const t = cur[i - 1 - k];
      if (!t || t.t !== 'dir') return false;
      // Single-digit guard: avoid eating a previously-collapsed motion.
      if (typeof t.v !== 'string' || t.v.length !== 1) return false;

    const next = [...cur.slice(0, i - n), motionTok, attackTok, ...cur.slice(i)];
    snapshot();
    updateSlot({ tokens: next });
    setCursorIdx(i - n + 2);
    return true;

  const activeCount = slots.filter(s => s.active).length;

  // into the active slot. The ref pattern ensures the latest closures
  // (closing over current slot/tokens) are always used without
  // re-binding the poller.
  const gpCtx = React.useContext(GamepadInputCtx);
  const addTokenRef = useRef(addToken);
  const popTokenRef = useRef(popToken);
  const clearTokensRef = useRef(clearTokens);
  const undoRefForGp = useRef(undo);
  const replaceTrailingDirsRef = useRef(replaceTrailingDirs);
  // Live ref to the current scheme so the gamepad hook reads the
  // up-to-date value every frame without re-registering handlers.
  const controlSchemeRefForGp = useRef(controlScheme);
  useEffect(() => {
    addTokenRef.current = addToken;
    popTokenRef.current = popToken;
    clearTokensRef.current = clearTokens;
    undoRefForGp.current = undo;
    replaceTrailingDirsRef.current = replaceTrailingDirs;
    controlSchemeRefForGp.current = controlScheme;
  });
  useEffect(() => {
    if (!gpCtx.setHandlers) return;
    gpCtx.setHandlers(() => ({
      addToken:    (tok) => addTokenRef.current(tok),
      popToken:    ()    => popTokenRef.current(),
      clearTokens: ()    => clearTokensRef.current(),
      undo:        ()    => undoRefForGp.current(),
      replaceTrailingDirs: (n, mTok, aTok) => replaceTrailingDirsRef.current(n, mTok, aTok),
      // Read live so flipping the toggle takes effect on the next frame.
      getControlScheme: () => controlSchemeRefForGp.current,
    }));
    return () => gpCtx.setHandlers(() => null);
  }, [gpCtx]);

  // Keyboard shortcuts: Ctrl/Cmd+Z = undo, Ctrl/Cmd+Shift+Z (or Ctrl+Y) = redo.
  // Skip when a form field has focus so the browser's native undo for
  // text inputs (e.g. the slot title) keeps working as expected.
  const undoRef = useRef(undo);
  const redoRef = useRef(redo);
  // Refs for the bare-key editor shortcuts (Backspace / Left / Right) so
  // the window-level keydown handler always reads the latest closures
  // without re-binding on every cursor/token change.
  const popTokenRefKb = useRef(popToken);
  const cursorIdxRefKb = useRef(cursorIdx);
  const tokensLenRefKb = useRef((slot.tokens || []).length);
  useEffect(() => { undoRef.current = undo; });
  useEffect(() => { redoRef.current = redo; });
  useEffect(() => {
    popTokenRefKb.current = popToken;
    cursorIdxRefKb.current = cursorIdx;
    tokensLenRefKb.current = (slot.tokens || []).length;
  });
  useEffect(() => {
    const onKey = (e) => {
      const t = e.target;
      const tag = t && t.tagName;
      // Never hijack typing in form fields (slot title, search boxes etc.) —
      // browser's native Backspace / arrow behavior must keep working there.
      if (tag === 'INPUT' || tag === 'TEXTAREA' || (t && t.isContentEditable)) return;
      const mod = e.ctrlKey || e.metaKey;

          e.preventDefault();
          undoRef.current();
        } else if ((key === 'z' && e.shiftKey) || key === 'y') {
          e.preventDefault();
          redoRef.current();
        }

      // navigation shortcuts (Alt+Left = back).

        e.preventDefault();
        popTokenRefKb.current();
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();

          setCursorIdx(cursorIdxRefKb.current - 1);
        }
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();

  return React.createElement('div', {
    key: shuffleKey,                         // re-mount on character change to replay fly-ins
    className: 'grid grid-cols-1 lg:grid-cols-[1fr_300px] gap-6',
  },
    React.createElement('div', null,
      React.createElement('div', { className: 'flex items-center gap-3 mb-4' },
        React.createElement('span', {
          className: 'flyin text-[10px] font-mono uppercase tracking-[0.2em] text-paper-mute',
          style: flyDelay(),
        }, 'SLOT ' + (activeSlot + 1)),
        React.createElement('div', {
          className: 'flyin cp-input-wrap flex-1',
          style: flyDelay(),
        },
          React.createElement('input', {
            value: slot.title || '',
            onChange: e => updateSlot({ title: e.target.value }),
            maxLength: 32,
            placeholder: 'slot title…',
            style: { padding: '10px 14px' },
          }),
          React.createElement('span', { className: 'cp-bk-bl' }),
          React.createElement('span', { className: 'cp-bk-br' }),
        ),
        React.createElement('label', {
          className: 'flyin flex items-center gap-2 text-[10px] font-mono uppercase tracking-wider text-paper-mute cursor-pointer',
          style: flyDelay(),
        },
          React.createElement('input', {
            type: 'checkbox',
            checked: !!slot.active,
            onChange: e => updateSlot({ active: e.target.checked }),
            className: 'accent-blood w-4 h-4',
          }),
          'SHOW IN GAME'
        )
      ),

      React.createElement('div', {
        className: 'flyin flyin-slow cp-label',
        style: flyDelay(),
      }, 'SEQUENCE'),
      React.createElement('div', {
        className: 'flyin flyin-slow cp-seq mb-3',
        style: { ...flyDelay(), display: 'flex', flexWrap: 'wrap',
                 alignItems: 'center', minHeight: '40px' },
      },
        (slot.tokens || []).length === 0
          ? [
              // Empty slot: show placeholder + caret (so the user knows
              // where the first token will land).
              React.createElement('span', {
                key: '_empty',
                className: 'text-paper-dim text-sm italic font-mono mr-1',
              }, '— empty —'),
              React.createElement(SeqCaret, { key: '_caret' }),
            ]
          : (() => {
              // Chunk-aware render. Mirrors the Lua preview's separator
              // logic in SF6_Overlay.lua:
              //   - Standalone btns (DR/DRC/CH/PC/SHM/SAs) and directions
              //     get a '>' before them when a previous chunk closed.
              //   - xx and F.Kill are themselves separators — skip the '>'.
              //   - Directions stay glued to the button that follows them.
              //   - Each chunk closes when a button (any kind) appears.

                'DR','DRC','CH','PC','SHM',
                'SA1','SA2','SA2-2','SA3','SA3-2',

                }

                // Suppress auto-'>' if this token is a manual 'sep' (it
                // renders its own '>') or if the PREVIOUS token was a
                // manual 'sep' (already provides the break).
                const prevIsSep = i > 0 && tokens[i - 1].t === 'sep';

                    key: 's-' + i,
                    className: 'font-mono text-paper-mute select-none',
                    style: { margin: '0 4px', opacity: 0.6 },
                  }, '>'));
                }

                // Wrap each TokenPill in a clickable shell. The shell
                // overlays two zero-width buttons (left half / right half)
                // by using a flex split — clicking either side moves the
                // cursor accordingly. Pointer-events on the inner pill stay
                // disabled so the halves capture clicks reliably.
                out.push(
                  React.createElement('span', {
                    key: 't-' + i,
                    style: { position: 'relative', display: 'inline-block',
                             cursor: 'text', margin: '0 1px' },
                    title: 'Click left half to place cursor before; right half after',
                  },
                    React.createElement('span', {
                      style: { pointerEvents: 'none' },
                    },
                      React.createElement(TokenPill, { tok }),
                    ),
                    React.createElement('span', {
                      onClick: () => setCursorIdx(i),
                      style: { position: 'absolute', left: 0, top: 0,
                               width: '50%', height: '100%' },
                    }),
                    React.createElement('span', {
                      onClick: () => setCursorIdx(i + 1),
                      style: { position: 'absolute', right: 0, top: 0,
                               width: '50%', height: '100%' },
                    }),
                  )
                );

                // Update chunk-tracking state for next iteration:
                //   xx / fk / sep: explicit separator already, suppress next '>'.
                //   btn: closes the chunk it ended.
                //   dir: still open (waiting for the btn to close it).
                if (isXx || isFk || isSep) prevEndedChunk = false;
                else if (tok.t === 'btn') prevEndedChunk = true;
                else                       prevEndedChunk = false;
              }

              if (cursorIdx >= tokens.length) {
                out.push(React.createElement(SeqCaret, { key: 'c-end' }));
              }
              return out;
            })()
      ),
      React.createElement('div', { className: 'flex gap-2 mb-6 items-center' },
        React.createElement('button', {
          className: 'flyin cp-btn-ghost',
          style: flyDelay(),
          onClick: undo,
          disabled: !undoStack.length,
          title: 'Undo (Ctrl+Z)',
        }, '↶ UNDO'),
        React.createElement('button', {
          className: 'flyin cp-btn-ghost',
          style: flyDelay(),
          onClick: redo,
          disabled: !redoStack.length,
          title: 'Redo (Ctrl+Shift+Z)',
        }, '↷ REDO'),
        React.createElement('button', {
          className: 'flyin cp-btn-ghost',
          style: flyDelay(),
          onClick: popToken,
          disabled: !(slot.tokens || []).length || cursorIdx <= 0,
          title: 'Delete the token to the left of the cursor (Backspace)',
        }, '← BACKSPACE'),
        React.createElement('button', {
          className: 'flyin cp-btn-ghost',
          style: flyDelay(),
          onClick: clearTokens, disabled: !(slot.tokens || []).length,
        }, 'CLEAR'),
        React.createElement('div', { className: 'flex-1' }),
        // SAVE CHANGES — writes the active scheme's combos to disk.
        // Disabled when there's nothing to save (the page already shows

        // `●` so the user can see at a glance that there's unsaved work
        // even when they're on the slot list (where this button isn't
        // visible).
        React.createElement('button', {
          className: cx(
            'flyin px-4 py-1 text-xs font-mono uppercase tracking-wider border transition-colors',

              ? 'border-blood text-paper bg-blood/30 hover:bg-blood/50'
              : 'border-line-strong text-paper-mute cursor-not-allowed'
          ),
          style: flyDelay(),
          onClick: onSave,
          disabled: !dirty,
          title: dirty
            ? 'Save unsaved combo edits to disk'
            : 'No unsaved changes',
        }, 'SAVE CHANGES')
      ),

      // Token palettes (extracted to TokenPalette for reuse with VideoTab)
      React.createElement(TokenPalette, {
        slot, addToken, updateSlot, animated: true, controlScheme,
      })
    ),

    // Slot list sidebar.
    // With 30 slots the list is tall enough to overrun viewport on
    // smaller screens; the inner div gets a max-height + scrollbar so
    // the rest of the sidebar (active-count header) stays anchored.
    React.createElement('div', { className: 'cp-side-card bg-ink-card border border-line p-3 h-fit' },
      React.createElement('div', { className: 'cp-label px-1' },
        `SLOTS · ${activeCount}/${COMBO_MAX_ACTIVE} LIVE`),
      React.createElement('div', { className: 'space-y-1 max-h-[70vh] overflow-y-auto pr-1' },
        slots.map((s, i) => React.createElement('button', {
          key: i,
          onClick: () => setActiveSlot(i),
          className: cx(
            'w-full text-left px-3 py-2 flex items-center gap-2 text-sm transition-all border font-mono',
            i === activeSlot
              ? 'bg-ink-edge border-blood text-paper'
              : 'border-transparent hover:bg-ink-edge text-paper-mute'
          ),
          style: i === activeSlot ? { boxShadow: 'inset 3px 0 0 var(--blood)' } : null,
        },
          React.createElement('input', {
            type: 'checkbox', checked: !!s.active,
            onChange: e => {
              e.stopPropagation();
              const next = slots.slice();
              next[i] = { ...next[i], active: e.target.checked };
              setSlots(next); markDirty();
            },
            onClick: e => e.stopPropagation(),
            className: 'accent-blood w-4 h-4',
          }),

  const lighten = (amt) => `rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)})`;

  return `radial-gradient(circle at 35% 30%, ${lighten(60)} 0%, ${color} 50%, ${darken(50)} 100%)`;

// pill marble — that's what makes the button read as 3D-domed
// instead of flat-glass.

// ── Links tab ──────────────────────────────────────────────
// ── Video tab ──────────────────────────────────────────────
// Lets the user paste a YouTube URL or direct video file, then build
// combo notation tokens for the active slot while watching the video.
// Each slot can store a videoUrl + videoTimestamp so the user can
// jump back to the spot they were studying.
//
// Important: the token data is stored on the SAME slot that CombosTab
// edits — there's no separate "video combo" data type. videoUrl /
// videoTimestamp are extra fields on the slot that the overlay can
// safely ignore (it only reads tokens / title / counter / active).

// Parse a YouTube URL into a video ID. Supports the major formats:
//   - https://youtube.com/watch?v=ID
//   - https://www.youtube.com/watch?v=ID&t=Ns
//   - https://youtu.be/ID
//   - https://youtube.com/embed/ID
//   - https://youtube.com/shorts/ID

function parseYoutubeId(url) {
  if (!url) return null;
  try {
    const u = new URL(url);
    const host = u.hostname.replace(/^www\./, '');
    if (host === 'youtu.be') {
      return u.pathname.slice(1).split('/')[0] || null;
    }
    if (host === 'youtube.com' || host === 'm.youtube.com') {
      if (u.pathname === '/watch') return u.searchParams.get('v');
      const parts = u.pathname.split('/').filter(Boolean);
      if (parts[0] === 'embed' || parts[0] === 'shorts') return parts[1] || null;
    }
  } catch { /* not a valid URL */ }
  return null;
}

// Parse a YouTube timestamp param ("?t=" or "?start=") into seconds.
// Accepts plain seconds ("285", "285s"), or h/m/s combos ("4m45s",
// "1h23m45s"). Returns 0 when no timestamp is present or unparseable.
function parseTimestampParam(url) {
  if (!url) return 0;
  try {
    const u = new URL(url);
    const raw = u.searchParams.get('t') || u.searchParams.get('start') || '';
    if (!raw) return 0;
    // Plain integer ("285" or "285s") — most common case
    const plain = raw.match(/^(\d+)s?$/);
    if (plain) return parseInt(plain[1], 10) || 0;
    // h/m/s composite ("1h23m45s", "4m45s", "30m", etc.)
    const parts = raw.match(/(\d+)h|(\d+)m|(\d+)s/g) || [];
    let total = 0;
    for (const p of parts) {
      const n = parseInt(p, 10) || 0;
      if (p.endsWith('h')) total += n * 3600;
      else if (p.endsWith('m')) total += n * 60;
      else if (p.endsWith('s')) total += n;

  } catch { return 0; }

// sniffing because no network request is needed before deciding.

  if (!url) return false;
  return /\.(mp4|webm|ogg|mov|m4v)(\?|$)/i.test(url);

// Format seconds → "M:SS" or "H:MM:SS" for the timestamp display

  const s = Math.floor(seconds);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  const pad = (n) => String(n).padStart(2, '0');
  return h > 0 ? `${h}:${pad(m)}:${pad(sec)}` : `${m}:${pad(sec)}`;

// (?t=49s) and direct video files (#t=49 fragment form).

  const ts = Math.max(0, Math.round(seconds || 0));

    const u = new URL(url);
    const host = u.hostname.replace(/^www\./, '');
    const isYT = host === 'youtu.be'
      || host.endsWith('youtube.com')
      || host === 'youtube-nocookie.com';
    if (isYT) {

      // accepts plain seconds (no 's' suffix needed) but with-'s'
      // is the canonical form copy-pasted from the share menu.
      u.searchParams.delete('t');
      u.searchParams.delete('start');
      if (ts > 0) u.searchParams.set('t', `${ts}s`);

    if (isDirectVideoUrl(url)) {

    return ts > 0 ? `${url}${url.includes('?') ? '&' : '?'}t=${ts}s` : url;

  // Detected pads. Refreshed on a 500ms interval (polling is necessary
  // because the gamepadconnected event sometimes doesn't fire until the
  // user presses a button on the controller).
  const [pads, setPads] = useState([]);
  useEffect(() => {
    let alive = true;
    const refresh = () => {
      if (!alive) return;
      const list = navigator.getGamepads ? Array.from(navigator.getGamepads()) : [];
      setPads(list.map((p, i) => p ? { index: i, id: p.id, buttons: p.buttons.length, axes: p.axes.length } : null));
    };
    refresh();
    const id = setInterval(refresh, 500);
    return () => { alive = false; clearInterval(id); };
  }, [tick]);

  const profiles = Object.values(store.profiles || {});

  // is currently open. null = no modal. Opening from the SHIFT CONFIG
  // button on a profile row sets this; the modal's close action clears it.
  const [shiftCfgProfileId, setShiftCfgProfileId] = useState(null);
  // Dirty tracking for the shift-config modal. The HotkeysPanel writes
  // to this ref whenever its content diverges from the last-saved state;
  // closing the modal consults it to warn before discarding changes.
  // A ref (not state) avoids re-rendering the whole panel on every edit.
  const shiftCfgDirtyRef = useRef(false);

  // Deep-link entry: when the SettingsDialog was opened by the
  // character page's "Configure SHIFT" button, initialShiftCfgProfileId
  // names which profile's hotkey modal to open immediately. We open
  // it once on mount (or whenever a fresh value arrives) and then
  // call onClearInitialShiftCfg so the App-side pending state goes
  // back to null. Without the clear, closing + reopening Settings
  // would re-trigger the modal on every reopen.
  useEffect(() => {
    if (!initialShiftCfgProfileId) return;
    // Guard against the profile having been deleted between request
    // and mount — if it's gone, just no-op the deep link.
    if (!store.profiles[initialShiftCfgProfileId]) {
      if (onClearInitialShiftCfg) onClearInitialShiftCfg();
      return;
    }
    setShiftCfgProfileId(initialShiftCfgProfileId);
    if (onClearInitialShiftCfg) onClearInitialShiftCfg();

    // fire when the deep-link value changes, not on every store edit.

  // the backdrop click and the explicit CLOSE button.

        'You have unsaved hotkey changes. Closing now will lose them.\n\n' +
        'Click OK to discard changes, or Cancel to stay and save.'
      );

    }

    setShiftCfgProfileId(null);

  // Three-tier match: exact deviceId → VID:PID fingerprint → false. The
  // fingerprint fallback handles browser ID-string reformats (Chrome
  // updates have changed how DualSense and other pads are reported,
  // breaking exact-match across browser versions).

  const isProfileLive = (p) => {
    if (!p) return false;
    // Keyboard profiles are always considered live — a keyboard
    // is presumed connected to any system running a web browser,
    // so the gamepad-device-presence check doesn't apply. The user
    // can still activate/deactivate via the UI buttons.
    if (p.type === 'keyboard') return true;
    if (!p.deviceId) return false;
    // Exact match on cached state
    if (liveSlots.some(slot => slot.id === p.deviceId)) return true;
    // Fingerprint match on cached state

    if (fp && liveSlots.some(slot => gpFingerprint(slot.id) === fp)) return true;

                        title: 'Raw firmware HID — directional inputs may misbehave. If your controller has a fightstick emulation profile (Panthera, PS4, Xbox), use that instead.',
                      }, '⚠ NATIVE'),

// ── HotkeysPanel ────────────────────────────────────────────────
// In-game controller hotkey configurator. Lives inside the SHIFT
// CONFIG modal opened from the gamepad profile row. Builds a JSON
// payload consumed by SF6_Overlay.lua:
//
//   {
//     "version": 2,
//     "active": "<profile name>",
//     "profiles": {
//       "<profile name>": { "modifier": "MK", "bindings": {...} },
//       ...
//     }
//   }
//
// User flow (press-to-bind):
//   1. Click "Modifier" — panel enters capture mode (gold prompt).
//   2. Press the desired button on the controller — captured label
//      auto-fills the slot.
//   3. Click each action's slot, press its button. Repeat.
//   4. Click SAVE to write reframework/data/sf6_hotkeys.json.
//   5. Reload the script in-game.
//
// Capture works by polling the profile's gamepad through its existing
// calibration, so any of the 10 calibrated inputs (LP/MP/HP/LK/MK/HK/
// UP/DOWN/LEFT/RIGHT) can be assigned. Buttons not in the calibration
// can't be captured — calibrate them first via the RECAL button.
// Actions bindable to a SHIFT+button combo. The first group are
// editor actions (mutate the slot directly via onAction); the rest
// are token inserts that drop a fixed token at the cursor — same as
// clicking that token in the palette. Action `key` is what gets
// dispatched through onAction; the gamepad poller's labelToAction
// map routes any of these strings.
//
// All token inserts use the action prefix `insert:` so the handler
// knows to translate the token name into a token object and add it,
// rather than doing one of the editor mutations.
const HOTKEY_ACTIONS = [
  // Editor actions — mutate the slot directly.
  { key: 'sep',         label: 'Insert >',     hint: 'New chunk separator' },
  { key: 'xx',          label: 'Insert xx',    hint: 'Cancel marker'       },
  { key: 'backspace',   label: 'Backspace',    hint: 'Delete previous token' },
  { key: 'clear',       label: 'Clear All',    hint: 'Wipe slot tokens'    },
  { key: 'undo',        label: 'Undo',         hint: 'Revert last edit'    },
  // Token inserts — drop a fixed palette token at the cursor. The
  // `insert:` prefix is the contract with the action dispatcher.
  { key: 'insert:CH',     label: 'Insert CH',     hint: 'Counter Hit annotation' },
  { key: 'insert:DR',     label: 'Insert DR',     hint: 'Drive Rush'             },
  { key: 'insert:DRC',    label: 'Insert DRC',    hint: 'Drive Rush Cancel'      },
  { key: 'insert:MW',     label: 'Insert MW',     hint: 'Microwalk'              },
  { key: 'insert:PC',     label: 'Insert PC',     hint: 'Punish Counter'         },
  { key: 'insert:F.Kill', label: 'Insert F.Kill', hint: 'Frame kill / safejump'  },
  { key: 'insert:SHM',    label: 'Insert SHM',    hint: 'Shimmy'                 },
];

function HotkeysPanel({ value, onChange, onExport, onSave, dirtyRef, profile }) {
  // value: {
  //   modifier:        str             - shared modifier button (one per controller)
  //   bindings:        { [action]: btn|'' }   - Classic bindings
  //   bindings_modern: { [action]: btn|'' }   - Modern bindings
  // }
  // Which scheme's bindings are currently being edited. The Modern
  // tab is disabled if the underlying profile has no Modern
  // calibration (capture would have nothing to translate presses to).
  const [bindingScheme, setBindingScheme] = useState('classic');
  const profileHasModern = !!(profile && profile.calibrations && profile.calibrations.modern && profile.calibrations.modern.buttons);
  // If the profile loses its Modern calibration somehow while the
  // user is on the Modern tab, snap them back to Classic.
  useEffect(() => {
    if (bindingScheme === 'modern' && !profileHasModern) setBindingScheme('classic');
  }, [bindingScheme, profileHasModern]);

  // Local "selecting" state: which slot the next click will fill.
  // null = not selecting; { kind:'mod' } | { kind:'bind', action:'sep' }
  const [selecting, setSelecting] = useState(null);

  // Build a profile snapshot scoped to the active scheme's calibration.
  // useGamepadCapture reads `p.buttons`/`p.dpad`/`p.axisDirs` from the
  // root, which mirror Classic. For the Modern tab we overlay the
  // Modern calibration so press-to-capture recognizes LIGHT/MEDIUM/etc.
  // instead of LP/MP/HP/etc. Same overlay pattern the gamepad poller
  // uses for per-character schemes.
  const profileForCapture = useMemo(() => {
    if (!profile) return profile;
    if (bindingScheme === 'modern' && profileHasModern) {
      const mc = profile.calibrations.modern;
      return {
        ...profile,
        buttons:  mc.buttons,
        dpad:     mc.dpad     || profile.dpad     || {},
        axisDirs: mc.axisDirs || profile.axisDirs || {},
      };
    }
    return profile;
  }, [profile, bindingScheme, profileHasModern]);
  const capture = useGamepadCapture(profileForCapture);

  // Save state machine for the SAVE button:
  //   'idle'       — clean, last save succeeded (no badge)
  //   'dirty'      — content changed since last save (red dot)
  //   'saving'     — POST in flight (button disabled)
  //   'saved'      — just succeeded (green flash for ~1.5s)
  //   'error: msg' — last save failed (red text + message)
  const [saveState, setSaveState] = useState('idle');

  // Track the value snapshot at last successful save. When the current
  // `value` differs from this snapshot, the panel is dirty. Initialized
  // to the current value so freshly-opened panels start clean (matches
  // user intuition: they haven't changed anything yet).
  const savedSnapshotRef = useRef(JSON.stringify(value));
  useEffect(() => {
    const isDirty = JSON.stringify(value) !== savedSnapshotRef.current;
    if (isDirty && saveState === 'idle') setSaveState('dirty');
    if (!isDirty && saveState === 'dirty') setSaveState('idle');
    if (dirtyRef) dirtyRef.current = isDirty;
  }, [value]); // eslint-disable-line react-hooks/exhaustive-deps

  // Backwards-compat: if older saved settings had modifier as a 2-element
  // array, take the first element. Normalize to a string for the rest of
  // the component.
  const mod = (typeof value.modifier === 'string')
    ? value.modifier
    : (Array.isArray(value.modifier) ? (value.modifier[0] || '') : '');
  // Pick the active scheme's bindings map. Writes to onChange always
  // merge back into the right key (`bindings` vs `bindings_modern`).
  const bindings = bindingScheme === 'modern'
    ? (value.bindings_modern || {})
    : (value.bindings || {});
  const bindingsKey = bindingScheme === 'modern' ? 'bindings_modern' : 'bindings';

  // Helper to write a new bindings object back through onChange while
  // preserving the OTHER scheme's bindings, the shared modifier label,
  // AND the runtime-critical modifier_index / modifier_axis / modifier_label
  // fields. The poller checks modifier_index (not modifier) to decide
  // if SHIFT is held — dropping those fields silently breaks SHIFT
  // detection even though the panel still shows a label. All four
  // mutation paths (apply, unbind, clear-on-conflict, modifier change)
  // go through here so the inactive scheme + modifier fields stay intact.
  const commitBindings = (newBindings, newMod) => {
    onChange({
      // Preserve every field from the existing value, then override
      // only what changed. Spread-first means we keep modifier_index,
      // modifier_axis, modifier_label, and any future fields without
      // having to list them explicitly.
      ...value,
      modifier: newMod !== undefined ? newMod : mod,
      bindings: bindingScheme === 'modern' ? (value.bindings || {}) : newBindings,
      bindings_modern: bindingScheme === 'modern' ? newBindings : (value.bindings_modern || {}),
    });
  };

  // Compute "where is each button used right now" for highlighting.
  // Returns 'mod' | 'bind:<action>' | null. Conflict detection looks
  // only within the active scheme's bindings — assigning LP to xx in
  // Classic doesn't conflict with LIGHT bound to xx in Modern.
  const buttonRole = (btn) => {
    if (mod === btn) return 'mod';
    for (const a of HOTKEY_ACTIONS) {
      if (bindings[a.key] === btn) return 'bind:' + a.key;
    }
    return null;
  };

  // Shared assignment helper: takes the current selecting state and
  // a button label, applies the right onChange call with conflict
  // resolution (auto-clear other roles using this button).
  // Used by both the diagram click handler AND the press-to-capture
  // callback so both paths produce identical state mutations.
  const applyAssignment = (sel, btn) => {
    if (sel.kind === 'mod') {
      const role = buttonRole(btn);
      const newBindings = { ...bindings };
      if (role && role !== 'mod') {
        for (const k of Object.keys(newBindings)) {
          if (newBindings[k] === btn) newBindings[k] = '';
        }
      }
      commitBindings(newBindings, btn);
    } else if (sel.kind === 'bind') {
      if (mod === btn) return; // modifier can't double as binding
      const newBindings = { ...bindings };
      for (const k of Object.keys(newBindings)) {
        if (newBindings[k] === btn) newBindings[k] = '';
      }
      newBindings[sel.action] = btn;
      commitBindings(newBindings);
    }
  };

  // Trigger press-to-capture for a slot. Cancels any in-flight capture
  // (so re-clicking a slot lets the user retry without confusing UX).
  const startCapture = (sel) => {
    setSelecting(sel);
    capture.start((label) => {
      applyAssignment(sel, label);
      setSelecting(null);
    });
  };

  // Display map for button labels. Used by the slot picker chips to
  // show e.g. "↑ (UP)" so the symbol and the canonical name are both
  // legible. Keeps the label as the source-of-truth in stored config
  // while letting the UI show whichever form is clearer.
  const BTN_DISPLAY = {
    UP: '↑', DOWN: '↓', LEFT: '←', RIGHT: '→',
    LP: 'LP', MP: 'MP', HP: 'HP', LK: 'LK', MK: 'MK', HK: 'HK',
    // Modern attack button labels — what calibration writes for a
    // Modern profile. Shown as-is since they're already short.
    LIGHT: 'L', MEDIUM: 'M', HARD: 'H',
    SP: 'SP', AUTO: 'Au', THROW: 'Th', DI: 'DI', DP: 'DP',
  };

  // Status line — prompts the user. Three states:
  //   1. Selecting a slot (capturing) → gold "press a button" message
  //   2. Modifier unset (idle)        → red "set the modifier first" prompt
  //   3. Idle and configured          → neutral hint
  const modUnset = !mod;
  let statusText, statusColor;
  if (selecting) {
    // The capture prompt itself lives in the press-area block above;
    // keep this line subtle so we don't have two competing prompts.
    statusText = 'Waiting for input on your controller…';
    statusColor = '#f5c518';
  } else if (modUnset) {
    statusText = 'Set a modifier button to enable in-game shortcuts.';
    statusColor = '#f87171';
  } else {
    statusText = 'Click a slot below to rebind it. Hold modifier in-game + press action to fire.';
    statusColor = '#9aa3b2';
  }

  return React.createElement('div', {
    className: 'p-3 bg-ink-deep border border-line',
  },
    React.createElement('div', {
      className: 'text-[11px] font-mono uppercase tracking-[0.2em] text-paper-mute mb-2',
    }, 'In-Game Controller Hotkeys'),
    React.createElement('p', {
      className: 'text-xs text-paper-mute mb-3',
    }, 'Configure the action bindings — what each button does while the modifier is held. The modifier itself is set during controller calibration. Hold the modifier in-game + press an action button to fire the shortcut.'),

    // Capture-mode prompt — the user clicks a slot below, then this
    // panel listens for a press on any connected controller. The
    // profile's calibration translates the physical input to a label
    // ("LP", "MK", "LEFT" etc.), which fills the selected slot.
    React.createElement('div', {
      style: {
        padding: '24px 16px',
        backgroundColor: '#0a0c12',
        marginBottom: '12px',
        textAlign: 'center',
        border: '1px dashed ' + (capture.capturing ? '#f5c518' : '#2c3445'),
        minHeight: '88px',
        display: 'flex',
        flexDirection: 'column',
        alignItems: 'center',
        justifyContent: 'center',
      },
    },
      capture.capturing
        ? React.createElement(React.Fragment, null,
            React.createElement('div', {
              className: 'text-sm font-mono uppercase tracking-wider mb-1',
              style: { color: '#f5c518' },
            }, 'Press any button on your controller…'),
            React.createElement('button', {
              onClick: () => { capture.cancel(); setSelecting(null); },
              className: 'mt-2 text-[10px] text-paper-mute hover:text-paper underline',
            }, 'Cancel')
          )
        : React.createElement(React.Fragment, null,
            React.createElement('div', {
              className: 'text-xs text-paper-mute mb-1',
            }, 'Click an action below, then press the button on your controller you want to bind it to.'),
            React.createElement('div', {
              className: 'text-[10px] text-paper-mute',
              style: { opacity: 0.7 },
            }, 'Any of the calibrated buttons can be assigned. The modifier itself is set in calibration.')
          )
    ),

    // Status line — tells the user what's happening.
    React.createElement('div', {
      className: 'text-xs font-mono mb-3',
      style: { color: statusColor },
    }, statusText),

    // Modifier slot — READ ONLY. Set during controller calibration
    // (the SHIFT step in the calibration flow) so the user picks it
    // by physically pressing the button. To change it, click RECAL on
    // the profile row and re-press SHIFT during the calibration run.
    //
    // Display format: prefer modifier_label (e.g. "MK" or "Button 9"),
    // fall back to legacy `modifier` label, and show "—" if none set.
    // Underlying storage is modifier_index (raw button index), but the
    // index is meaningless to a human so we always render a label.
    (() => {
      const display =
        value.modifier_label ||
        (value.modifier_index != null ? `Button ${value.modifier_index}` : '') ||
        (value.modifier_axis ? `Axis ${value.modifier_axis.index}${value.modifier_axis.sign > 0 ? '+' : '-'}` : '') ||

// ── Backup & Restore panel ────────────────────────────────────
// Lives inside the Settings dialog. Two operations:
//   1. EXPORT — hits /api/backup/export which returns a ZIP. We use
//      a hidden <a download> click; Content-Disposition makes the
//      browser save the file rather than navigate. window.location=
//      would work but some browsers treat that as a hard navigation
//      and blow away the editor's React state.
//   2. IMPORT — file picker → FormData → /api/backup/import. The
//      restore_folder_path checkbox is opt-in because backups carry
//      the framedata folder path, and restoring it on a different
//      PC would point the editor at a non-existent folder.
// Result panel renders inline so per-file errors are visible even
// after the toast disappears.
function BackupPanel({ toast }) {
  const [busy, setBusy] = useState(false);
  const [result, setResult] = useState(null);
  const [restoreFolderPath, setRestoreFolderPath] = useState(false);
  const fileRef = useRef(null);

  const onExport = () => {
    setBusy(true);
    setResult(null);
    try {
      const a = document.createElement('a');
      a.href = '/api/backup/export';
      a.download = '';   // empty = use server-provided filename
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      toast && toast('Backup download started', 'good');
    } catch (e) {
      toast && toast('Export failed: ' + (e.message || 'unknown'), 'bad');
    } finally {
      // Brief lockout — browser may not have actually started the
      // download yet when click() returns
      setTimeout(() => setBusy(false), 600);
    }
  };

  const onPickImport = () => {
    if (fileRef.current) fileRef.current.click();
  };

  const onFileChosen = async (e) => {
    const f = e.target.files && e.target.files[0];
    // Reset input so picking the SAME file twice re-fires onchange
    e.target.value = '';
    if (!f) return;

    if (!f.name.toLowerCase().endsWith('.zip')) {
      toast && toast('Please choose a .zip backup file', 'bad');
      return;
    }

    setBusy(true);
    setResult(null);
    try {
      const fd = new FormData();
      fd.append('file', f);
      fd.append('restore_server_settings', restoreFolderPath ? 'true' : 'false');

      const r = await fetch('/api/backup/import', { method: 'POST', body: fd });
      const data = await r.json();
      setResult(data);

      if (data.ok) {
        const n = (data.files_restored || []).length;
        toast && toast(
          `Restored ${n} file${n === 1 ? '' : 's'}. Reload the in-game script to apply.`,
          'good',
        );
      } else {
        const errMsg = data.error
          || (data.errors && data.errors.length ? `${data.errors.length} file(s) failed validation` : 'unknown error');
        toast && toast('Restore failed: ' + errMsg, 'bad');
      }
    } catch (err) {
      setResult({ ok: false, error: err.message || 'network error' });
      toast && toast('Restore failed: ' + (err.message || 'network error'), 'bad');
    } finally {
      setBusy(false);
    }
  };

  return React.createElement('div', {
    className: 'border border-line-strong p-4 mb-4',
  },
    React.createElement('div', {
      className: 'text-[10px] font-mono uppercase tracking-[0.3em] text-blood mb-1',
    }, 'DATA'),
    React.createElement('h3', { className: 'font-display text-2xl tracking-wider mb-1' },
      'BACKUP & RESTORE'
    ),
    React.createElement('p', { className: 'text-sm text-paper-mute mb-4 font-mono' },
      'Export your combo notes, character notes, profile data, hotkeys, and overlay settings to a single ZIP file. Import the ZIP later — or on another PC — to restore everything.'
    ),

    React.createElement('div', { className: 'flex gap-2 mb-3' },
      React.createElement('button', {
        onClick: onExport,
        disabled: busy,
        className: cx(
          'px-4 py-2 text-xs font-mono uppercase tracking-wider border transition-colors',
          busy
            ? 'border-line text-paper-mute cursor-wait'
            : 'border-blood text-blood hover:bg-blood/10',
        ),
      }, busy ? 'WORKING…' : 'EXPORT BACKUP'),

      React.createElement('button', {
        onClick: onPickImport,
        disabled: busy,
        className: cx(
          'px-4 py-2 text-xs font-mono uppercase tracking-wider border transition-colors',
          busy
            ? 'border-line text-paper-mute cursor-wait'
            : 'border-line-strong text-paper hover:bg-paper/5',
        ),
      }, 'IMPORT BACKUP…'),

      React.createElement('input', {
        ref: fileRef,
        type: 'file',
        accept: '.zip,application/zip',
        onChange: onFileChosen,
        style: { display: 'none' },
      }),
    ),

    // Folder-path restore is opt-in because backups carry the path
    // from the originating PC. Different drive letters, different
    // user folders — overwriting blindly would break the editor
    // on the target PC until the user re-enters the path.
    React.createElement('label', {
      className: 'flex items-start gap-2 text-xs font-mono text-paper-mute cursor-pointer mb-2',
    },
      React.createElement('input', {
        type: 'checkbox',
        checked: restoreFolderPath,
        onChange: (e) => setRestoreFolderPath(e.target.checked),
        className: 'mt-0.5 accent-blood',
      }),
      React.createElement('span', null,
        'Also restore frame-data folder path. ',
        React.createElement('span', { className: 'text-paper-dim' },
          '(Leave off when restoring on a different PC.)'
        ),
      ),
    ),

    result && React.createElement('div', {
      className: cx(
        'mt-3 p-3 border text-xs font-mono',
        result.ok
          ? 'border-gold/40 bg-gold/5 text-gold'
          : 'border-blood/40 bg-blood/5 text-blood',
      ),
    },
      React.createElement('div', { className: 'font-bold mb-1' },
        result.ok
          ? `RESTORED ${(result.files_restored || []).length} FILE(S)`
          : 'RESTORE FAILED'
      ),
      result.error && React.createElement('div', { className: 'text-paper-mute mb-1' },
        result.error
      ),
      result.errors && result.errors.length > 0 && React.createElement('ul', {
        className: 'list-disc pl-5 text-paper-mute',
      }, result.errors.map((er, i) =>
        React.createElement('li', { key: i },
          `${er.file}: ${er.error}`
        )
      )),
      result.skipped && result.skipped.length > 0 && React.createElement('div', {
        className: 'text-paper-mute mt-1',
      }, `Skipped: ${result.skipped.join(', ')}`),
      result.ok && React.createElement('div', { className: 'mt-2 text-paper' },
        'Click ',
        React.createElement('span', { className: 'text-gold' }, 'Reload Script'),
        ' in the in-game Profiles menu to load the restored data.'
      ),
    ),
  );
}

// Mounts a single <audio> element driven by current settings.
// Handles: src updates, play/pause, volume, autoplay-block recovery.
//
// Browser autoplay policies block .play() until the user has interacted
// with the page. Toggling music ON inside the Settings dialog IS an
// interaction, so the first play after a user toggle works. But if the
// page reloads with musicEnabled already true, the browser blocks the
// initial play(). We listen for the next click anywhere on the page
// and retry once — the silent failure becomes "play starts on next
// click" which is the standard graceful-degradation pattern.
// Read the custom-audio bump value from a separate context so AudioPlayer
// re-reads IndexedDB after a save without prop-drilling.

// it's ready. Subsequent callers get the cached promise so we don't
// inject the script tag twice.

    // cached script). If so, resolve immediately.
    if (window.YT && window.YT.Player) { resolve(window.YT); return; }
    // YouTube's loader calls window.onYouTubeIframeAPIReady when done.
    // Chain into any existing handler in case some other code wants
    // the same callback.
    const prev = window.onYouTubeIframeAPIReady;
    window.onYouTubeIframeAPIReady = () => {
      if (typeof prev === 'function') { try { prev(); } catch {} }
      resolve(window.YT);
    };

    tag.src = 'https://www.youtube.com/iframe_api';
    tag.async = true;
    document.head.appendChild(tag);
  });

function AudioPlayer() {
  const settings = useSettings();

  const ytContainerRef = useRef(null);
  const ytPlayerRef = useRef(null);

  // Load custom audio data URL from IndexedDB whenever it changes.
  useEffect(() => {
    if (settings.audioSource !== 'custom') {
      setCustomDataUrl(null);
      return;
    }

    getCustomAudio()
      .then(d => { if (!cancelled) setCustomDataUrl(d || null); })
      .catch(() => { if (!cancelled) setCustomDataUrl(null); });

    settings.audioSource,
    settings.audioUrl, customDataUrl,

  // where the user switches from a YouTube URL to a bundled mp3 and
  // both keep playing.
  useEffect(() => {
    const a = audioRef.current;

      return;

  // source is a regular media URL.

      return;

          height: '2',
          width: '2',

            onStateChange: (e) => {

              // musicEnabled via ref (not closure) so toggling off
              // mid-video stops the loop.
              if (e.data === 0 && musicEnabledRef.current) {
                try { e.target.playVideo(); } catch {}
              }
            },
            onError: (e) => {

              //   2  - invalid video ID format
              //   5  - HTML5 player error
              //   100 - video not found / private / removed
              //   101, 150 - embedding disabled by uploader
              const msg = ({
                2: 'Invalid YouTube URL',
                5: 'YouTube player error',
                100: 'Video not found, private, or removed',
                101: 'Embedding disabled by the uploader',
                150: 'Embedding disabled by the uploader',

        // Always loadVideoById (which auto-plays); pauseVideo
        // immediately if music is disabled. Using cueVideoById meant
        // the video stayed cued and never played even after the user
        // toggled music ON.
        const player = ytPlayerRef.current;
        try {
          player.loadVideoById(src.value);

        }

  }, [src && src.kind, src && src.value]);

  // effect so a volume tweak doesn't restart the video.
  //
  // RACE NOTE: when the user toggles music ON before the YT IFrame
  // API finishes loading, ytPlayerRef.current is still null here.
  // We poll briefly so the toggle actually takes effect once the
  // player materializes; without this, the user has to toggle off
  // and back on to get audio.

    if (!src || src.kind !== 'youtube') return;
    let cancelled = false;
    let tries = 0;
    const apply = () => {
      if (cancelled) return;
      const yt = ytPlayerRef.current;
      if (!yt || !yt.playVideo) {
        // Player not ready yet — retry up to ~3s
        if (tries++ < 30) setTimeout(apply, 100);
        return;
      }
      try { yt.setVolume(Math.round(settings.audioVolume * 100)); } catch {}
      try {
        if (settings.musicEnabled) {
          yt.playVideo();
          // Verify playback actually started; if not, show gesture hint.
          setTimeout(() => {
            if (cancelled) return;
            try {
              const state = yt.getPlayerState && yt.getPlayerState();
              // PLAYING=1, BUFFERING=3 are both fine
              if (state !== 1 && state !== 3) setNeedsGesture(true);
            } catch {}
          }, 1500);
        } else {
          yt.pauseVideo();
        }
      } catch {}
    };

  }, [settings.audioVolume]);

      preload: 'auto',

        zIndex: 0,
        overflow: 'hidden',

      onClick: () => {
        const yt = ytPlayerRef.current;
        const a = audioRef.current;
        if (src.kind === 'youtube' && yt) { try { yt.playVideo(); setNeedsGesture(false); } catch {} }

    // YouTube error display — shows specific failure reason so users
    // know to pick a different video instead of staring at silence.

      && React.createElement('div', {
        className: 'fixed bottom-4 left-4 z-50 px-3 py-2 bg-ink-card border border-blood text-[10px] font-mono uppercase tracking-wider text-blood pointer-events-none max-w-sm',
      }, '⚠ ' + ytError)

// Ambient ember particles drifting left→right across the entire viewport,
// echoing the same airflow direction as the background portrait Ken Burns.
// Canvas 2D for performance — handles ~80 particles at <2% CPU on modern
// hardware vs CSS keyframe animations which would max out around 20-30
// before getting choppy.
//
// Particle behavior:
//   - X velocity: positive (rightward), varied per particle (~10-40 px/sec)
//   - Y velocity: small sine-based wobble (leaves-in-breeze feel)
//   - Off-screen on right edge: re-spawn on left edge with new randomized
//     y, size, opacity, speed — endless flow without visible respawn pop
//   - Sizes vary 1-3px with radial gradient glow so larger embers bloom
//   - Opacity flickers slightly (multiplicative noise) — prevents the
//     "uniform parade" look that exposes deterministic systems
//   - Color: warm ember palette (gold → orange → soft red) per-particle
//     so the field has color depth instead of uniform yellow
//
// Performance details:
//   - Pauses on document.hidden via Page Visibility API (no point burning
//     cycles when the tab isn't visible)
//   - DPR-aware: canvas backing store scales with devicePixelRatio for
//     crisp particles on retina; CSS size stays viewport-fixed
//   - Resize handler debounces via rAF — avoids thrashing on drag-resize
function EmberField() {
  const canvasRef = useRef(null);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;

    let width = 0, height = 0;
    let particles = [];
    let raf = 0;
    let lastT = performance.now();
    let resizePending = false;

    // Warm ember palette — drawn as RGB triples so we can blend opacity
    // into them per-frame without parsing hex colors in the hot path.
    const PALETTE = [
      [255, 200,  90],   // soft gold
      [255, 170,  60],   // amber
      [255, 130,  40],   // orange ember
      [255,  90,  60],   // burnt red
      [255, 235, 160],   // pale yellow (highlights)
    ];

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width  = Math.floor(width  * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width  = width  + 'px';
      canvas.style.height = height + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function spawn(initial) {
      const color = PALETTE[Math.floor(Math.random() * PALETTE.length)];
      return {
        // initial=true: scatter across the whole viewport so the page
        // doesn't load with an empty screen + visible advancing front.
        // initial=false: spawn just past the left edge for the steady-
        // state respawn loop.
        x: initial ? Math.random() * width : -10 - Math.random() * 40,
        y: Math.random() * height,
        // base horizontal velocity — varies so particles overtake each
        // other instead of moving as a uniform sheet
        vx: 10 + Math.random() * 30,           // 10–40 px/sec rightward
        // sine-wave wobble parameters — each particle has its own phase,
        // amplitude, and frequency so the field doesn't pulse in unison
        wobbleAmp:   3 + Math.random() * 12,    // px
        wobbleFreq:  0.3 + Math.random() * 0.7, // Hz
        wobblePhase: Math.random() * Math.PI * 2,
        // visual
        radius: 0.8 + Math.random() * 2.4,      // 0.8–3.2 px
        baseOpacity: 0.25 + Math.random() * 0.6,
        flickerPhase: Math.random() * Math.PI * 2,
        flickerFreq:  1 + Math.random() * 2,
        color,
      };
    }

    function init() {
      // ~1 particle per 25,000 px² — works out to ~80 on a 1920×1080
      // viewport, scales sensibly across screen sizes
      const count = Math.min(160, Math.max(30, Math.floor((width * height) / 25000)));
      particles = [];
      for (let i = 0; i < count; i++) particles.push(spawn(true));
    }

    function frame(now) {
      const dt = Math.min(0.05, (now - lastT) / 1000); // clamp big jumps after tab-switch
      lastT = now;
      const t = now / 1000;

      ctx.clearRect(0, 0, width, height);
      // Additive blending — particles glow brighter where they overlap,
      // matching the "embers floating in dark air" feel
      ctx.globalCompositeOperation = 'lighter';

      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        // Advance position
        p.x += p.vx * dt;
        // Vertical wobble: y stays anchored to base position but oscillates
        // around it. We compute current y as base + sine offset rather than
        // mutating y directly, so the wobble doesn't drift over time.
        const wobble = Math.sin(t * p.wobbleFreq * Math.PI * 2 + p.wobblePhase) * p.wobbleAmp;
        const drawY = p.y + wobble;

        // Off-screen right? respawn on left
        if (p.x > width + 20) {
          Object.assign(p, spawn(false));
          continue;
        }

        // Flicker — slight opacity modulation, multiplicative
        const flicker = 0.7 + 0.3 * Math.sin(t * p.flickerFreq * Math.PI * 2 + p.flickerPhase);
        const alpha = p.baseOpacity * flicker;
        const [r, g, b] = p.color;

        // Radial gradient = soft glow halo around a brighter core.
        // Inner radius 0 with strong color, outer = 4× radius with full
        // transparency. Cheap and visually convincing.
        const grad = ctx.createRadialGradient(p.x, drawY, 0, p.x, drawY, p.radius * 4);
        grad.addColorStop(0,    `rgba(${r},${g},${b},${alpha})`);
        grad.addColorStop(0.4,  `rgba(${r},${g},${b},${alpha * 0.4})`);
        grad.addColorStop(1,    `rgba(${r},${g},${b},0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(p.x, drawY, p.radius * 4, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.globalCompositeOperation = 'source-over';
      raf = requestAnimationFrame(frame);
    }

    function start() {
      if (raf) return;
      lastT = performance.now();
      raf = requestAnimationFrame(frame);
    }
    function stop() {
      if (raf) { cancelAnimationFrame(raf); raf = 0; }
    }

    function onResize() {
      // rAF-debounce: coalesce burst resize events into a single rebuild
      if (resizePending) return;
      resizePending = true;
      requestAnimationFrame(() => {
        resizePending = false;
        resize();
        init();
      });
    }
    function onVisibility() {
      if (document.hidden) stop(); else start();
    }

    resize();
    init();
    start();
    window.addEventListener('resize', onResize);
    document.addEventListener('visibilitychange', onVisibility);

    return () => {
      stop();
      window.removeEventListener('resize', onResize);
      document.removeEventListener('visibilitychange', onVisibility);
    };
  }, []);

  return React.createElement('canvas', {
    ref: canvasRef,
    'aria-hidden': 'true',
    style: {
      position: 'fixed',
      inset: 0,
      width: '100vw',
      height: '100vh',
      pointerEvents: 'none',
      // mix-blend-mode: screen makes the canvas additively brighten
      // whatever's behind it instead of occluding. Even though the
      // canvas paints "above" content in z-order (fixed-position at
      // z-index 0), screen blending means dark pixels in the canvas
      // (the cleared transparent areas around particles) contribute
      // nothing to the final pixel — only the lit ember pixels
      // brighten the content underneath. Net effect: embers feel like
      // atmospheric light suffusing the whole interface, not an
      // overlay covering it.
      mixBlendMode: 'screen',
      // z-index 0 keeps it above the body bg-gradient but below all UI
      // (the App content sits at z >= 1 via stacking contexts in the
      // existing layout). If embers ever appear above content, raise
      // the offending UI's z-index rather than dropping this below 0
      // (which would put it behind the body bg-gradient too).
      zIndex: 0,
    },
  });
}

// Molten lava-drip sparks emitted from the bottom edge of the hero title.
// Each spark spawns at a random x along the title's bounding rect's
// bottom, falls under gravity, fades over ~1-2 seconds, and dies.
//
// Color palette matches the holographic title fill — pink/cyan/violet/
// gold per-spark, picked at spawn, held for the spark's lifetime so each
// drip is one solid color rather than a chromatic-aberration blur.
//
// Title bounds are measured via getBoundingClientRect on a CSS selector
// passed in. Re-measured on resize, scroll, and a slow polling interval
// (3s) to catch font-loading and dynamic layout shifts. The polling is
// cheap — one DOM read every 3s — and survives the case where the title
// container reflows due to the wipe/glitch intro, even though clip-path
// itself doesn't change layout.

    const canvas = canvasRef.current;

    const dpr = window.devicePixelRatio || 1;

    // compositing. Range covers the molten metal lifecycle: white-hot
    // peak (handled by the radial gradient core) down through yellow,
    // orange, deep orange, and burnt red. Each spark picks one color
    // and holds it for its lifetime — combined with the per-spark
    // alpha fade, sparks visibly "cool" without needing per-frame
    // color interpolation.
    const PALETTE = [
      [255, 240, 180],   // pale yellow (just-emitted)
      [255, 210,  80],   // hot yellow
      [255, 170,  40],   // amber
      [255, 130,  30],   // orange
      [255,  90,  30],   // deep orange
      [220,  50,  30],   // burnt red (cooling tail)
    ];

    function resizeCanvas() {
      width  = window.innerWidth;
      height = window.innerHeight;
      canvas.width  = Math.floor(width  * dpr);
      canvas.height = Math.floor(height * dpr);

      titleRect = { x: r.left, y: r.bottom, w: r.width, h: r.height };

    function spawnSpark() {
      if (!titleRect || titleRect.w <= 0) return;
      const color = PALETTE[Math.floor(Math.random() * PALETTE.length)];
